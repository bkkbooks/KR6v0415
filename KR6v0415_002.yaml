body:
  text: 參學門人北庭臣僧慈寂上進小參瞿運使霆發卒哭藥師道場對靈小參大道只在目前要且目前難覩欲識大道真體不離聲色言語只如都運相公昨自皇慶元年十二月二十六日捐館至今年四月初七日其一百日內鼓螺互應金石交宣豈非聲耶華果委陳香燈羅列豈非色耶遍演金經廣宣玉偈豈非言語耶且聲色言語覿體全彰却喚甚麼作大道若以聲為大道聲自是聲若以色為大道色自是色若以言語為大道言語自是言語與麼分㭊將來古人話似作兩橛這裏撿點得出便見我都運相公與藥師如來握手共遊於一十二重清淨願海以衆寶光明而作佛事俾盡大地衆生不越一念俱成正覺到這裏既無聲色可求亦何言語可取總只是箇大光明藏如其不委更為下箇注腳良久云天共白雲曉水和明月流復舉石頭和尚問龐居士云子學道以來日用事作麼生居士呈偈曰日用事無別惟吾自偶諧頭頭非取舍處處沒張乖朱紫誰為號丘山絶點埃神通并妙用運水與搬柴且如何是日用事茲向第二門頭曲為注腳去也眼見色是日用事耳聞聲是日用事鼻嗅香是日用事舌噉味是日用事以至身覺觸意雜思是日用事乃至八萬四千諸塵勞應用等皆是日用事因甚麼說箇無別底道理雖則體用互陳萬塵交接一一皆是自心成就自心出生所以教中謂元依一精明分成六和合又云三界無別法惟是一心作以其洞見自心故雖一剎那頃泛應群緣會入一心曾無異致所以云無別也今之學道者往往向義路上以聰明之資一一領會自謂佛法無多子殊不知說箇自心早落情見於是龐居士謂惟吾自偶諧言偶諧二字直是注解不破穿鑿不入苟非具金剛正眼向聲色未彰已前一鑑鑑破物我未形之際一拶拶開自然頭頭上明物物上顯是謂偶諧者也其或未到這箇時節和箇偶諧俱成剩語所以云參須實參悟須實悟既到實參實悟之地則繁興大用舉必全真擬眨眼來劒去久矣這箇是老龐公棄家財於湘水跨諸祖門庭掠得些子汗臭氣便解如是發揮惟我都運相公即再世之龐居士也雖不效其棄家珍於水底却能轉為布施利益種種救援攝護方便等事而亦不妨其孜孜在道之心以至啓手足之際屏去血味及與玩好諸欲因緣惟單單舉箇所參話頭泊然而逝豈非多生熏習般若培植菩提而有如是操略耶既捐館已一百日內晝夜六時備陳佛事由是知相公雖天道人道皆不能以境緣攝取何則道念炳然豈肯為功名富貴諸殊勝事業之籠絡其不至佛地决知其終不已也因記得都運相公昔於至元辛卯二月十九登天目叩先師先師握竹篦問曰相公為遊山來為佛法來公答云為佛法來先師擲下竹篦曰會麼公云不會師曰不入虎穴爭得虎子本上座今日因齊慶讚重為舉揚為遊山來為佛法來舌頭拖地為佛法來將謂忘却擲下竹篦云會麼少賣弄不會明如杲日迅若怒雷不入虎穴爭得虎子醉後又添杯更有四句偈重為注腳為求佛法為遊山口縫才開落二三一十二重悲願海藥師燈現古優曇為趙承旨孟俯對靈小參大道在目前山是山水是水玄機超物表聖非聖凡非凡一念洞然萬緣廓爾水精宮秋容淡淡森羅萬象吞吐明月珠松雪齊灝氣沈沉屏几六窗交徹寶絲網無一物不彰至體無一㕝不演真乘莊周雖蝶悟枕邊敢保其當機罔措子韶固蛙聞月下未許其覿面施呈這一著子名不得狀不得即其知處已陷情圍事亦然理亦然與麼會時早沉識海所以道神光獨耀萬古徽猷入此門來莫存知解且不存知解底句如何指陳玉宇秋高無界限金園春事政敷共惟翰林學士承旨松雪居士趙公受知於九重聖主名聞於萬里黎元官一品未足謂公之榮爵萬鍾未足謂公之貴蓋其道超物表性徹玄初空諸見於眼根了群情於意地者也某記大德甲辰歲首蒙公賢夫婦相延於武林官舍丁未秋訪公於霅城之新第至大戊申復會于西湖明年己酉再會於松雪齊凡一會聚與夫尺書往復未嘗不以本來具足之道未悟未明為急務每論到至真切處悲泣垂涕不能自已此蓋出自真情遠從多劫熏鍊純熟必期徹證不肯與泛泛者恃其辨聰漁獵聞見便以為得也自佛法流布東土士大夫咨參扣問敲唱激揚莫盛於唐宋而尤盛於皇元往往滯於情解昧於識度求其真參實究者不曰無之窮其所因最初被箇本來具足不假外求之說一印印定次以聰明之資直下領過自以為易不復究明不覺置之無事甲裏殊不知本來具足之說如麵在麥中飯居穀內或不加舂炊礱磨之勞徒知具足之虛談終莫能得止飢之實效猶儒家論仁義亦豈心外之物故孟子謂我固有之矣非從外得也然不有真履實踐之功顛沛造次孳孳不忘則亦徒有仁義之本心耳故吾佛祖謂本來具足猶古鏡之有光奈何失於護念其愛憎塵習不覺蒙蔽况是積生纍劫未經磨治徒稱具足之有光終於鑑照之無補一箇所參話即是磨鏡之良具政當磨時只知朝也磨暮也磨不必問鏡上之塵何日破除鏡內之光何時發現苟存此等待之心則愈障矣學佛之要惟憑一念但信得及處譬之磨鏡未有磨極而塵不消塵消而光不現者故我相公與魏國夫人雖身抱冠世之奇才而不為其所惑雖身嬰畢世之塵纍而不為其所障每於真參正念孜孜然兀兀然猶林下老衲寂爾忘緣未嘗少棄當知此箇正念不由教導不依勸請不因造作不屬方便乃是無量劫中於諸佛所深種菩提種子雖百千塵勞百千生死同時現前終莫能昧也此念既堅則其成佛作祖超生越死如壯士屈臂豈假他力人徒見公英聲茂實振耀古今而不知公六十九年凡施為舉措莫不以積劫之事繫于真情自餘皆借路經過遊戲設施爾既啓手足後人皆謂公之亡我獨見公精操正念獨抱天真於大寂滅大解脫法中與佛祖聖賢混合於一切智智清淨之表曾何古今彼此而有間隔此皆公深信本來具足不假外求之道其靈驗若此記得華嚴經偈有謂若人欲識佛境界當淨其意如虛空遠離妄想及諸取令心所向皆無礙謂佛境界者即是本來具足不假外求之道是也原夫意根欲淨妄想欲離却不成本來具足矣但是所參之正念操之既精守之既密則其意根不待淨而自淨妄想不待離而自離至一切處不為一切法之所留礙其佛境界與松雪齊不即不離無異無別古所謂千山勢到嶽邊止萬派聲歸海上消者是也又圓覺淨諸業障章中極言四相其四相之因首惟執我相我相既忘如樹根斷則枝葉不除而自凋矣故經云彼修道者不除我相是故不能入清淨覺還知我相麼佛境界是我相淨意根是我相乃至坐寶蓮華成等正覺入微塵裏轉大法輪是我相自有宗乘以來分科列段指性說心敲繩牀搖麈拂縱橫放肆演唱激揚以至玉轉珠回神出鬼沒總不出這箇我相苟能除此我相之外安有所參之話所守之念所存之因所至之果直下如大火聚大風輪雖佛祖到來亦須退縮有分到這裏無位真人倒跨洞庭山遊戲三萬六千頃太湖直上兜率天與彌勒大士指白雪為青松荷葉團團團似鏡配青松為白雪菱角尖尖尖似錐混融物我以無痕超越死生而無作此說且置茲蒙大孝仲穆舍人以書入山謂先君問道二十年不料嬰此大變擬卒哭日內安厝東衡臨壙一語乞為舉似某以老病退臥巖穴惟我相公於湛寂光中自能照了今事不獲已勉為對衆引些葛藤以慰孝誠記得唐陸亘大夫問南泉弟子家中有片石也曾坐也曾臥還鐫作佛得麼泉云得亘云莫不得麼泉云不得不得大衆陸亘大夫問處放去何奢南泉和尚答時收來太儉須知問在答處答在問處狹路相逢了無回互雖然如是只如今日相公家中有一片石也不曾坐也不曾臥亦不要鐫作佛只要移置東衡原上蓋覆相公棺槨得與不得二俱屏除且道與陸亘大夫所見相去幾何良久云幻住忍俊不禁向無音韻中聊伸一偈南泉陸亘舌無筋圓覺華嚴語未真何似東衡原上月照空群象最相親音釋灝合老切夷曠也孳津私切孳孳猶汲汲也縮所六切斂也尖子廉切末鋭也錐朱惟切鑽也厝倉故切安著也鐫子泉切刻也

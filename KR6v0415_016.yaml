body:
  text: 參學門人北庭慈寂進幻住家訓幻人一日據幻室依幻座執幻拂時諸幻弟子俱來雲集有問松緣何直棘緣何曲鵠緣何白烏緣何玄幻人竪起拂子召大衆曰我此幻拂竪不自竪依幻而竪橫不自橫依幻而橫拈不自拈依幻而拈放不自放依幻而放諦觀此幻綿亘十方充塞三際竪時非竪橫時非橫拈時非拈放時非放如是了知洞無障礙便見松依幻直𣗥依幻曲鵠依幻白烏依幻玄離此幻見松本非直棘元無曲鵠既不白烏亦何玄當知此幻翳汝眼根而生幻見潛汝意地起幻分別見直非曲指白非玄遍計諸法執性橫生曠古逮今纏縛生死由是纍及雪山大沙門眼不耐見方出母胎便乃周行七步目顧四方指地指天大驚小怪將過去百千萬億劫所證底第一義諦向諸人淨潔田地上狼藉殆盡審如是奇特建立要且於幻法了無加損老雲門謂當時若見一棒打殺貴圖天下太平雖則增金以黃其奈又添一重幻翳當時四十九年三百餘會彼以幻問此以幻答文彩熾盛音響沸騰其幻頓幻漸幻偏幻圓且置之勿論末上以幻手拈幻花謂吾有正法眼藏涅槃妙心直得老飲光擘破幻顏兩肩負荷自爾一人傳虛萬人傳實幻幻相因授受不已至少林面幻壁安幻心懺幻罪解幻縛問幻姓書幻偈磨幻磚垂幻足挂幻拂聾幻耳摑幻掌就中引出箇掣風顛漢施一幻喝如青天怒雷乃至幻照幻用幻賔幻主縱橫交錯與奪殺活態千狀萬莫窺其涯逮今諸方無面目老比丘出其門嗣其宗承虛接響置一幻於口門藏諸幻於量外文其言巧其機高其風逸其韻峻其令大其家更無有一人能出其幻者幻乎其旨圓其義備其體大其用周與諸佛祖相為始終盡塵沙劫不可窮盡間有未能了此大幻於言象之表者或以某師説禪簡明或以某師説禪圓活或以孰為高古或以孰為峭峻孰為細密孰為文彩孰為粗暴孰為不工尚其優而效之鄙其劣而棄之亂真機於巧偽之場屈要旨於笙簧之域見聞日博是非日滋大義日乖真風日墜殊不知前輩深達大幻之士凡吐一辭出一令其簡明也是幻圓活也是幻高古也是幻細密也是幻至若直捷文彩粗暴不工等咸自廣大幻輪中流出此幻輪一轉如水就決似風行空逈絶安排了無揀擇隨機任器殺活臨時使古人存一點分別取捨之情潛於隨扣隨應之間則與雜毒無以異也豈甘露醍醐之謂哉更有人將箇禪册子廣讀博記欲契祖師西來意却成實法流布豈不立文字直指人心之道果如是迂曲耶若是真實要證此大幻法門便請全身直入直下更無一絲毫障礙苟或腳跟擬議意地躊躇切不可隨語生解道一切是幻本來見成我但拍盲坐斷更別有甚麼工夫可做門路可求是則固是爭奈你依情帶識墮在草窠欲較他古人獨脫悟明不翅天地懸隔只如香嚴擊竹靈雲見桃太原聞角洞山過水如此輩皆是偷心泯絶脫落知解能所兩盡得失俱忘如空合空似水投水既非強勉安許拍盲乃於不知不覺處脫落根塵自然語默動靜不帶枝葉此是大解脫門惟心死識忘情消見謝者乃能涉入或半點心意識不盡縱使透過古今超越言象欲與古人握手於真寂之海何異螢光之附太陽非其類也今日既是與諸人應箇時節不可只與麼説了便休借五須彌筆蘸四大海水向東弗于逮打箇直落復於南贍部洲轉箇曲角徐於北鬱單越著一點轉向西瞿耶尼亞箇半刀併作一箇幻字懸向盡十方虛空之頂使大地人有眼者見有耳者聞有身者覺有意者解乃知過去佛久遠於此已證涅槃現在佛今各於斯成等正覺未來佛將於其中開正法眼以至微塵數諸菩薩各各不離當處修六度運四心度衆生斷苦縛乃至無邊聖賢更無有一人不依此幻具大神變而獲自在者奈何諸人終日折旋俯仰動靜語默觸目無間剛不自悟將謂與他聖賢佛祖有無邊法界之所間隔自甘陸沉徒受輪轉今日特為你起模畫樣和盤托出如前所云便請全身直入直教一切處點畫分明一切處受用成現與三世佛歷代祖契理契事同出同沒更有何物為障為礙而尚存觀聽猶滯功勛者哉古今之下如有一佛一祖不由此大幻法門而獲菩提解脫者無有是處更教你知盡法界內無古無今但有情無情等如有一物不依此大幻法門而具生住異滅者亦無有是處當知幻無聖凡幻無彼此了得此幻在彼不見有菩提涅槃在此不見有生住異滅一切幻幻圓滿無二無二分無別無斷故非是強言法如爾也苟或於此未能脫白露淨全機超入且不要匆匆草草但辦取一片鐵石身心拌取一生兩生向所參底無義味話頭上拍盲立定丁字腳頭心憤憤地與之抵捱將去正當抵捱時都不要你向禪道佛法上別求解會只如撞著銀山鐵壁相似除却箇咬嚼不破底無義味話頭之外更無第二念蹲坐其懸懸之心如措足於百尺竿上著腳於萬仞崖巔前無可攀後無可援但與麼把教定靠教穩孜孜兀兀只如是去當知大幻法門在你腳底不曾移易一絲毫只待你情消見盡蹉步踏著則知太原聞角洞山過水之時節不我隔也到此更須和箇所入底大幻法門一踢踢不留眹迹始是丈夫脫或乍得入門苟存一念歡喜之心依舊與昨日之迷無間然也此事不是説了便休亦不是見了便休直須始終丈夫不受一法籠罩方堪為荷負大法之真實種草邇來法道不古人心懈怠為師為徒彼此只求解會日夕相誘築得一肚禪道佛法其如生死命根不曾於懸崖撒手處絶後再穌一回墮在惡毒海中不自知非此誠可愍參禪學道何所圖哉然本上座固非其人惟是不肯自昧參禪正因而况諸人幸不遭此邪謬各各是不肯墮人窠臼底端人正士既來遮裏相從我此間又非唱導之師建立門戶彼此相依於半間茅屋之下只圖真實以辦平生然此雖曰大幻法門苟非神悟決不可造次而入只如説箇幻字今古共知於中欲覔一人於此幻中掉臂而入橫身而坐肆足而行任意而用放開捏聚一切自由者極難乎人其故何哉蓋由心存所知而未嘗悟脫於一切處明知是幻不待旋踵而反為幻所縛以若所知則與不知者何以異也只如教家道一假一切假無中無空而不假此説之下了無剩法惟其不悟成文字語言流布豈佛法果有教禪之二哉以其神悟教即是禪以存所知禪即是教故圓覺謂末世衆生希望成道無令求悟惟益多聞增長我見斯言殆盡之矣只如會通和尚見鳥窠吹起布毛應時脫略德山見龍潭吹滅紙燭當下超宗今人但見前輩領悟如是之易而不知其未領悟時之難苟知其難則古人之易亦今人之易也苟不知其難欲效古人如此之易未免為情識虛妄引入相似般若中重生死之根塵深輪回之陷穽耳且古人領悟之易置之勿論如何是未領悟時之難只如二祖未悟之頃立齊腰之雪不知為寒斷娘生之臂莫知為痛只遮一箇樣子不惟今人之難在二祖分上亦未嘗不難以其求法之真所以忘其難也自二祖而降其親師為道痛為生死無常而有契有證之士於未領悟時未有一人不如是之難當知古人之生死即今人之生死也今人之道業即古人之道業也蓋古人負真誠而忘其難所以致其易今人逐虛妄而棄其難必欲效其易故於此一法中雖同知是幻而其利害優劣所以異也此是從上佛祖不易之論一時老婆引援及此在本色道流分上喚作惡口亦名實法綴人亦名教壞人又喚作瞎學人正眼今日彼此不獲已也然而遮許多做工夫底露布在當人為法之誠自然步步踏著豈是起模畫樣教得人底道理其或為法之心不真不誠不苦不切縱使百千方便束縛得他儼然如箇死人何異吹網欲滿又如溈山充典座雪峯做飯頭寶壽作街坊演祖為磨主此猥屑之務豈真龍象所當為哉蓋亦為道之真忘其鄙陋有如此者今人稍負聰敏或叢林補職不稱則掉臂譏主法者之誤於此觀之則古今之真妄判然矣幻人於幻法實未曾悟今日但路見不平竊論如此到遮裏索性將平昔所解底大幻法門重為發露去也過去是已去之幻見在是目前之幻未來是將至之幻一大藏教依幻而説千七百則陳爛葛藤由幻而生菩提涅槃根幻而成真如般若倚幻而現慈悲喜捨即幻而興六度萬行憑幻而立三乘十地仗幻而等差戒定慧貪瞋癡煩惱塵勞無常生死等從幻而出以至明暗色空見聞覺知未有不稟吾幻而有者豈但松直棘曲鵠白烏玄是幻乃至天以幻蓋地以幻擎海以幻涵春以幻育桃以幻紅李以幻白迷以幻難悟以幻易我以幻説爾以幻聞森羅萬象一幻所印此大幻印中固是不留剩法只如幻人手中拂子即今與須彌山王眉毛廝結且道是幻耶非幻耶若謂是幻帶纍幻人墮在幻網中萬劫出不得若謂非幻請去却語默動靜出來露箇消息音釋蘸莊陷切物淬水中也穽疾郢切坑也

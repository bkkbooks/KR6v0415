body:
  text: 參學門人北庭臣僧慈寂上進記大覺寺無盡燈記心法徧周鏡燈交徹本來成就不假安排迷涉妄情悟歸智體於畢竟空中鑿開有海向真實地上撥轉妄輪達一念之不生了諸法之無盡者矣是故諸佛鏡顯眾生之燈水流元在海眾生燈投諸佛之鏡月落不離天相收相入不圓而圓互攝互融非在而在以一燈之無盡周十界以全彰何則一乘獨朗萬德莊嚴斯佛燈之無盡者矣圓修六度緫貫四心菩薩燈之無盡者矣見𡱈因緣位標獨覺辟支佛燈之無盡者矣功歸四諦跡涉二乘聲聞燈之無盡者矣善根深密戒體輕安天燈之無盡者矣聿修百行躬踐五常人燈之無盡者矣偏求福果純執勝心脩羅燈之無盡者矣十習無間六交自纏地獄燈之無盡者矣識隨妄變貪與性成鬼趣燈之無盡者矣癡愛溺心噬吞積業畜生燈之無盡者矣良由染淨緣空聖凡情盡一心圓鑑萬法齊觀納須彌於芥中擲大千於方外此無盡燈之無盡者矣大圓覺場開蓮華峯有栴檀林龍象圍繞梅野居士張公叔夏施財造無盡燈一座復捨田若干畒用充膏油持以供養工師出巧珠轉玉回浮幢王剎殆不是過位置十面面各一鏡鏡各一佛中然一燈交光相攝外以彰法界之無盡內以標事理之不窮即圓覺之摩尼珠雜華之寶𮈔網也原夫燈無意於投鏡而鏡自含鏡何意於攝燈而燈自入是燈也使龍潭啟虛空口吹毘嵐風而不能滅是鏡也使東平展巨靈手奮須彌槌而不能破是故居士即之而興無盡之施匠氏因之而獻無盡之巧蓮峯得之而作無盡之莊嚴大眾觀之而為無盡之佛事或者遽以燈為心鏡為法界以燈為理性鏡為事相是皆謗也或緫不作是觀亦不能外吾謗之之說殊不知自諸佛達乎品類其無盡燈各各具足非心非法非理非事一烏出暘谷羣幽以之而亡一滴投禹門萬派以之而會乃天真之本然奚情識之能造苟欲耳吾無盡之名目吾無盡之光想吾無盡之量蹈吾無盡之域則燈斯昏鏡斯翳矣是謂無功用解脫法門惟超然於名相之表者乃能證之非念慮使之能入居士求余作記故引是說以告之復為說偈偈曰一燈穿十鏡非法亦非心理極空何廣功全海不深當機無得失應念絕追尋物物彰無盡垂光照覺林寂寂菴記大寂混於眾響之門太虛隱乎羣有之府非知道者孰能辨之或背響而執寂棄有而襲虛常情烏足與論道哉龍虎山道士孫悟真字從善族廣信之貴溪甞遊天台一旦棄所習結菴里之應天山北麓高其風韻以寂寂二字文菴之楣實延祐丙辰歲也遠來取證于幻住子因與論命名之旨乃曰杲日麗天盲者莫覩疾雷震地聵者無聞不待收視返聽而聲色不到者以其病在根也五目不覩其蹤二聽絕聞其響不待去聦黜明而耳目不及者以其體在位也彼亦寂寂也此亦寂寂也而僕不取焉吾甞內觀其心心無其心則寂存乎中矣外觀其形形無其形則寂居乎外矣寂寂之義聊寓於斯審如其說但無心無物耳真寂之理未知其可也徵問不已乃辭以似之辭曰天地一蘧廬萬物一屏几中有無位人太虛藏兩耳聲來空合空聲去水投水靈熖亘星壇光芒射衣袂百鳥不飛來琴鶴自相委寂寂復寂寂如是而已矣空明軒記人昧自心久矣既失本有之自心動為色空明暗執縛於遷變不常之域故聖人哀矜之不暇乃起而示之何謂色天地萬物之謂也何謂空與天地萬物相為邊際者是也何謂暗長夜黑月之謂也何謂明與長夜黑月相為表裏者是也以斯四者倐遷忽變窮劫迨今動搖心目由是無頃刻不與生滅相對有人於此厭離生滅必欲舍色而慕空背暗而投明自以為臻其極矣殊不知空乃色之基明乃暗之媒安有基存而色冺媒在而暗去者乎故聖人哀之謂非至理也空菴居士盛鎬以空明二字扁其軒或曰爾將舍吾色背吾暗耶乃曰吾之所謂空非離色而空亦非即色而空吾之所謂明非離暗而明亦非即暗而明我嘗於二千載前觀毗耶老人以一默答諸開士之所問不二法門如廓太虛於萬象之顛麗杲日於羣隂之表於斯時也不惟無色可見無暗可知惟空與明亦不可得而視矣何則真空為空非大明而不空大明為明非真空而不明即明之空混萬有而不雜即空之明處羣幽而不遷吾嘗啟吾軒之牎倚吾軒之檻敞吾軒之地納吾軒之境上下一色表裏混同不知為空惟天地萬物窮劫不能礙不知為明惟長夜黑月亘古不能昏而好事者以空明二字加之吾亦未嘗有所知也延祐丙辰冬余寄舟大江之岸空菴訪于無聞見之地請筆其說為空明軒記於是乎書大同菴記南嶽石頭詰老龐日用事答以日用事無別且語時不是默時行時不是坐時安有無別之理哉蓋神心悟見越常情一道虛融萬緣絕待轉歸日用政不待排遣而無別之旨炳然獨存千聖不能掩也大同菴乃丹陽菴居士蔣公善秉為幻住老杜多之所建也公世居桐村菴距村之北三里許素有結菴之志今適遂焉實延祐四年春正月也余既命名而復為之記乃記其所謂大同者也原夫迦文之鷲嶺飲光之雞足達磨之熊峯懶融之牛首雖後先千餘載其步驟標致詳略不同要其所歸乃所以大同也豈惟佛祖然淨法界性在天同天在人同人在物同物至若三教九流之雄唱百氏諸子之玄談與夫長岡之松風野田之麥浪暮雲接遠山之色疾雷振大江之聲六戶未扄一榻危坐青燈不夜古鏡無塵耿耿禪光照映今古非動非寂無自無他了不知其同而無往不同也昔毗耶離城淨名居士弘不思議解脫神力甞以一默與三萬二千開士同入不二法門迨今間不容髮今譯老龐之無別毗耶之不二證斯菴之大同然固然矣其未能忘情謂於能同所同之表者欲見菴中主人門外垣牆不翅三千丈之高且遠也平江幻住菴記清淨本然云何忽生山河大地楞嚴有是語昔僧問瑯瑘瑘返是語以答之僧頓悟玄旨人徒知山河大地是幻而不知清淨本然亦幻也鏡光本淨物像無狀而生水體元清月影不期而現原夫昭昭影像所現之幻跡也澄澄水鏡能現之幻體也幻與幻盡覺與覺空斯僧所以悟極也大德庚子余遊吳中郡人陸公德潤施松岡數畒于閶門之西地曰鴈蕩結茅以棲禪者踵至僅半千指凡三見青黃絕際上人永中與董菴務一日眾集請名其菴因謂眾曰二千年外大覺世尊棄王位臥深雪夜覩明星與無邊有情同時涉入如幻三昧嗟乎眾生迨今沉酣情妄而不自知我曹出家雖依此如幻三昧而住亦有所未悟者宜以幻住名之可乎時有避席而言者曰承教有言幻身滅故幻心亦滅幻心滅故幻塵亦滅幻塵滅故幻滅亦滅幻滅滅故非幻不滅其不滅者是住乎非住乎余曰子以識量分別欲知幻法是住非住無乃增益幻見安有悟入之理也爾但能蘊無義語於識藏以究其心捧應量器於檀門以正其命荷百丈不作不食之具以效其勞守諸祖萬慮冰消之誠以堅其志一旦能所頓盡功用兩忘廓爾無依劃然超悟則是住非住政不待借手於無臂之人也越十八年歲丁巳中忽相值於吳松江之舟中從容叙舊亟請筆以為幻住菴記擬相傳於久遠云爾弁山幻住菴記實無而有之謂幻鏡中像水底月豈有耶謂其無則昭昭影現未嘗無也山河大地諸色相等倚空而現靡有一法不依幻而住者余大德丁酉挾策淮江自匡廬而下抵金陵己亥冬憇吳興弁山彬澄二師之雲半間頃焉結茅于資福寺後之黃沙坑幻住菴之名乃於斯著明年庚子徙吳門越六年乙巳師禪上人訪余天目謂幻廬既墜幻木儼存主精嚴院沙門森公容遷于院山之麓明然上人奮力與俱已而珂月來從之至大己酉際菴水田一區四十畒有奇堤穿岸穴積年不稔然月共議以耕往扣其主以貿以施尋而市土填築頓成膏食觀方充禪侶亦集採樵之山植蔬之圃運載之舟楫掩藏之窣堵悉備焉惟棟宇陿隘延祐戊午均鳴化喙盡撤其舊而新大之效禪林制具體而微其司歲務者用或不給行乞以補然禪月淨凡三年循次任主菴之責乃從權也已而禪以老辭淨以病革復議然正而月副之終為甲乙之傳一日眾曰菴之未有也師之來菴之既有也師之闢或不記其顛末則何以憑余曰三世佛幻也歷代祖幻也菩提與煩惱生死及涅槃俱幻也爾其未證斯幻無義味話堅豎脊梁緊握空拳慎勿輕放外而行乞內而執事中而宴坐不見有閒忙動靜之相猛策痛鞭以悟為則如是受者雖幕天席地誰無此菴不如是受雖峻宇雕牆誰有此菴當知明暗色空同一幻住是說可憑乎不可憑乎青山白雲咸皆點首時管城子振起而記之報恩懺院記佛廬徧天下其弘麗莫甚於蘇杭秀水之間鶴沙距松江僅三舍地接海壖民居既鮮伽藍則未有也自瞿氏徙居此地世有積善慕義之風逮今運使公霆發及其從弟雲巖居士震發慨然以為非伽藍無以營善而聞道乃卜地得吉於先塋之側傾金捐田命里僧某董之不幾年而華池紺殿重門廣廡觀室講堂凡伽藍所宜有者悉備焉迎清淨行沙門十員晝夜六時頂禮散華深味禪觀幢旛象設華鯨清梵宣流法音互為佛事運使公喜其有成亦施田若干畒以報恩懺院為額大德間天子降璽書以護之謁余文為記余問何以謂之報恩乃曰恩莫大於君親報莫越於聖道聞西方聖人之禪觀圓悟一心該攝萬行推而廣之導物指迷莫不從化以斯道報斯恩不亦善乎余曰秉一心為禪照萬法為觀其為心也圓湛虛寂涉入無礙不可以相求不可以言詣舒之則萬法即之而彰卷之則萬法依之而冺無邊剎海十世古今未有不由斯而著焉凡夫迷昧引起輪回遷謝苦樂昇沉莫之能釋是故非禪那不足以契諸佛心非妙觀不足以破眾生惑圓覺以三觀互推為二十五輪無量壽以一佛分觀於十六處始則端坐靜室注想一方存注不休與想俱冺見法界中朗然明了所以一輪見諦而妙觀澄明一處功成則真佛圓具如當臺鏡如帝網珠萬象顯而無所照之功千光聚而絕能𭣣之跡如是觀者即見清淨願王白毫亘天紺目澄海如優曇華如紫金聚巍巍堂堂殊特相好徧界光明化為香雲寶樹樓殿臺沼車服器玩諸莊嚴具是時三昧行人即聞即見即覺即知一語一默一動一靜皆與無作清淨妙觀脗然混合者矣然後即斯妙觀於一切時散作無邊莊嚴佛事以之報國恩則聖祚保無疆之永以之報親恩則劬勞超有漏之纏至若天龍鬼神過現未來冤親賢聖草木昆蟲凡有纖恩則於功德亦相須而無盡噫公之志尚矣遂掇筆直書以為記圓照菴記無法不備之謂圓無時不在之謂照是心也曾何法之可離又何時之能昧離此心不可以圓舍此心莫之能照圓也照也即心之謂乎空谷道人少負叢林之傑結菴於天目山之墺塢乃生緣之所也扁其菴曰圓照匄余記之余曰圓照之體不可以目覩不可以耳聞不可以意知不可以識解擬涉毫芒則圓不得為圓照不得為照矣道人深掩六䆫密扄八戶經行坐臥屏絕塵緣萬慮不遣而自忘一念不澄而自瑩於斯時也圓照之體與蒼松翠竹蒲團禪板覿體交叅了無回互庶其近矣不則圓照一菴名徒具耳於實奚取焉旅泊室記老莊譏孔氏旅泊於仁義而不知老莊亦旅泊於芒乎天運窅爾神化之域故吾佛有云諸比丘等不自熟食寄於殘生旅泊三界示一往還去已無返此說蓋曲為二乘發機視三界為逆旅以四大殘質棲泊於其間了證本空於一生一死之外不復來矣以至理求之皆非了義之旨焉昔直翁居士洪君證不二法門於吾先師笑談之頃甞囑俊用二上人搆山舟一區於師子巖之景踈菴舟成則君逝矣實至大戊申九月十一日也越二年上人徙山舟於谷川之西來菴又五年盡撤舟廬之舊廣而新之更山舟曰旅泊客有以問之曰三界旅泊竊甞知矣其有泥犂旅泊於十惡天人旅泊於眾善聲聞旅泊於四諦辟支旅泊於十二緣菩薩旅泊於六度如來旅泊於一乘諸教已明吾亦何惑蓋不能出於三界諸法也然則三界諸法能無所泊乎余曰汝問甚善當知三界旅泊於太虛其十方虛空旅泊於大圓鏡而大圓鏡獨旅泊於吾靈知之府惟吾靈知無所泊而無所不泊也且置是論還知眾生旅泊於諸佛心海之中諸佛旅泊於眾生識田之內大法輪旅泊於微塵裏寳王剎旅泊於一毫端五須彌旅泊於芥心四大海旅泊於毛腹百千華藏境旅泊於蟭螟之睫無邊世界種旅泊於藕𮈔之尖至若三萬二千師子座旅泊於吾方方一丈之室是可泊耶不可泊耶爾還知旅泊亦旅泊於吾旅泊之地而吾旅泊之地無受其旅泊者無不受其旅泊者亦無知其受與不受者如是悟明如是證入則大小促延短長迷悟互相旅泊當念洞明更不待思而知慮而解也校訛六十葉十二行已誤作巳今改正六十二葉十三行音釋壖而宣切岸邊地也塋音營葬地也脗音冺脗合無貌匄居太切乞也睫即涉切目旁毛也

body:
  text: 參學門人北庭臣僧慈寂上進東語西話下昌黎韓公唐之大儒也以不知佛氏之教有補於治道發為詞章而詆訶之逮遇大顛固心降之其譏毀之聲尚斑斑見於簡牘柳子厚與之同時亦以文鳴於世作諸祖碑碣發揮佛氏之學雖非極至初未嘗效韓之詆毀也宋歐陽氏出文章宗韓作本論以拒佛謂攻之愈堅撲之愈熾而不知有不可攻不可撲之大本於其間徒𧧣𧧣多言又何加損於吾佛也明教和尚著書非韓非非韓也乃諭歐也後儒相倣效詆佛者頗衆吾教之士往往謂彼嫉佛余謂彼非嫉佛也實不知佛也使彼知之則將外護之不暇雖強使其詆毀寧無愧於中乎復以因緣果報言之亦可以𭣣謗也如佛纍遭提婆達多以惡計陷於死地而不動念者乃知其有宿冤也當其狹路相逢返觀報盡還無之理如飲甘露又何念之可動哉彼韓歐之怒排力詆又安知其非提婆達多之餘蘊未消者乎但堅持正念待彼之餘蘊消盡則逆耳之聲將不求息而自息矣永嘉謂從他謗任他非把火燒天徒自疲永嘉之説雖盡善惟從他任他似亦未能當念融化之也靈芝照公取文中子何以息謗曰無辨謂嘗事斯語矣且無辨與從他任他之語然亦俱未盡理也故圓覺謂若知我空無毀我者則從他任他以至無辨贅且剩矣嗟乎近代之持公論者不鑑其本惟見彼斥我為異端我則非彼為外道與閭巷倚門而相罵者無異又何以表無生慈忍之力因緣果報之理哉昔有國王放五百醉象害佛佛竪五指迎之象皆馴伏時阿那律見佛五指端各現金毛師子時一弟子白佛云嘗聞佛説此身是夢不可愛樂今現師子之威禦醉象之難豈非愛樂其夢中之身耶佛曰我何有心於禦象哉我積劫以來修慈忍三昧今竪指入此三昧任其踐害以我三昧之力成熟故師子之威不期自現觀佛之説乃禦難息謗之第一義也語言云乎哉機智云乎哉又世有所謂見德人之容使人意消心醉德人豈亦使之然乎斯亦禦象難之漸也或不爾者皆自召也苟欲以語言息之適滋之耳何益哉佛身充滿於法界普現一切羣生前隨緣赴感靡不周而恆處此菩提座天下叢林讚佛多用之此偈出華嚴經第六卷時佛白毫相光中示現一切法勝音菩薩所説乃一部華嚴大經之綱目也亦諸祖狹路相逢之要領也佛身充滿於法界擬向甚處蹲坐普現一切羣生前眼裏耳裏著他不得隨緣赴感靡不周空合空水投水而恆處此菩提座將謂別有長處與麼注解未越常情或不知歸別露消息佛身充滿於法界遲日江山麗普現一切羣生前春風花草香隨緣赴感靡不周泥融飛燕子而恆處此菩提座沙暖睡鴛鴦一切法勝音掬水月在手少陵杜工部弄華香滿衣雖然珠轉玉回要且天懸地隔還要識佛身麼琉璃殿裏白玉毫寶華臺上黃金相且拈過一邊以至三十二相八十種好眼裏金塵且沒交涉更説箇佛身無為不墮諸數隨語生解萬里崖州若曰充滿於法界底佛身眼不可窺心不可測智不可知識不可解惟雲門乾屎橛洞山麻三斤却較些子爭奈無人悟得以其不悟縱有玄談皆成欺誑更有傍不甘者廣引相似語言謂佛身包太虛含萬象不可以色見而色無不周不可以空求而空無不備迎之非前隨之非後低聲低聲此等説話竈婦乳兒皆能言之若曰佛身不亦遠矣然普現羣生前隨緣靡不周且置之勿論又指何物為菩提座耶或謂佛身充滿此座亦充滿無二無二分無別無斷故若曰菩提座上別有佛身則不可得為恆處也然既充滿且無常生死有漏世間又向甚麼處安著或者引永嘉謂夢裏明明有六趣覺後空空無大千既覺矣謂佛身謂菩提座亦無地可寄又何言説而非寐語哉學者未能真誠夢覺雖曰讚佛乃謗佛耳宜審諸宜審諸盡十方世界是清淨法身當體如千日並照了無纖毫障蔽無端為一點無明當面覆却以故仰而觀之之謂天俯而視之之謂地廣而窺之之謂法界以至山高水深晝明夜暗風動塵起雲騰鳥飛與夫披剝萬象剖析精明欲覔所謂法身則空然無有也由是引起分別堅執妄情喚空作色不得指明為暗不得視親作踈不得轉憎為愛不得要識無明面目麼只這箇轉不得底不欠一毫忽有箇強主張者道我但見空不作空見色不作色惟以一清淨法身觀之是亦是矣奈何謂空謂色之見卒未能忘又作清淨法身之能觀所觀初未曾泯須知只箇未忘未泯底政是根本無明直下絞瀝不乾洗滌未淨若欲頭頭上明物物上顯誠不啻隔靴抓癢也如圓覺謂此無明者非實有體如夢中人夢時非無及至於醒了無所得與麼説來無明豈有實體定性可得乃全體是清淨法身也雖然如經中謂及至於醒了無所得還曾與麼醒也未須知醒有二義最初省色空等法皆自心現量乃淨法界身之影像也如是而醒能斷枝葉無明最後見聞情盡能所識消不見一法是法身不見一法非法身是非俱泯念念皆如到此方斷無明之根本也然枝葉根本二種無明必欲頓斷其黑漆桶或不連底洞脫三回五回豈容心思言議而可得哉昔東坡居士題廬山溪聲便是廣長舌山色豈非清淨身夜來八萬四千偈他日如何舉似人後有禪者謂東坡每句多却二字何不直言溪聲廣長舌山色清淨身又有謂溪聲不用舌山色不用身等總是忍俊不禁將謂超出局量殊不知總向他措大背後叉手當時老坡只識得箇溪聲山色又安知驢聲馬聲鴉鳴鵲噪至于愁歎聲痛哭聲乃至地獄刀劒戈戟宰割鞭打種種惡毒呻吟號呌聲皆廣長舌豈但山色大而虛空細而纖芥極法界內外所有體象殊形異狀妍醜怪奇青黃短長至若冰河炭焰腥臊穢濁與夫不可眼視之種種惡色皆清淨身也豈惟身之與舌但鼻所入者皆佛香口所噉者皆法味至六入十二處法性混融間不容髮是謂一相平等真淨無漏圓滿具足三昧門從上佛祖據此三昧攪河為酪變地為金出沒卷舒無邊妙用一一皆從此三昧門流出法華謂惟此一事實餘二即非真即今天覆地擎日上月下晝明夜暗嶽立海橫更無一毫髮不在此三昧門中影現直饒如此明白舉似又安知仍舊坐在溪聲山色中蝦跳何曾出得斗也記得孚上座講涅槃備説法身不大不小非方非圓無住相無不住相圓𮖐十虛混融三際時有一禪者在座掩鼻而退上座乃致問云我説法身不曾違文失義見笑何也禪者曰上座盡其所學只説得法身影像若曰真法身大固遠在上座要與法身相應請拈過講學凝心靜坐孚一依所教忽聞角聲劃然開悟你道老坡曾與麼悟也未此道離言説絶知解或不深窮密究以期悟明脫略見聞超出情量妄為溪聲山色引入荒草而不知有悟入之理者滔滔皆是可不慎諸少林直指不立文字六祖謂説箇直指早已迂曲了也更有甚麼看話頭起疑情做工夫將心待悟無乃取謗先德屈辱古人者乎不然六祖方三傳而出百丈世稱大智禪師建禪林清規遠依律部立為禮法復置廣堂連牀俾三百五百衆凜凜危坐枯樁其形死灰其心目之曰坐參然直指尚曰迂曲此迂曲中之又迂曲者也已而自侍者寮朝參暮請親熏熟炙開鑿見聞俾掌藏鑰涉獵名相與夫博究儒書通內外等學使之分座説法然後待時出為人師上則付衣表信下則瓣香稟承斯又不勝其迂曲矣至若派為五宗不相混濫其授受之際細密委曲異説殊途莫之紀極豈直指之道果有是理哉蓋前人非不知不立文字之直指也以去聖時遙人心日趨而下觀其體道之念不密徇境之識日遷乃不得已而救之如百丈未建叢林時人皆草衣垢面棲遲於空山大澤中極情向道至百丈時早有老病畏怯由是建叢林以慰安其老病而輔祖道也使前輩或不曲徇時宜巧施方便則直指二字亦滅絶無聞矣近代持公論者惟責人不直指而之迂曲是不鑑其迂曲乃伸直指之異方便也且責之固是而亦不返鑑其責人之心全體墮在迂曲中矣何則如少林秉單傳直指之道默坐九年未聞其有責人不信直指之辭逮今千餘載而直指之道炳如日月亦不因從上之迂曲少蔽其毫髮蓋心真而理自顯據如少林負直指之要有傳少林謂外息諸緣內心無喘心如牆壁乃可入道且屏絶外緣而不涉禁伏內心而不動斯豈直指之旨乎乃欲其久之而悟入吾直指之域也今看話頭做工夫蓋亦使其情消識謝功用兩忘徑造吾直指之域復何疑哉禍福萌於自心憎愛豈從他得出一時之情妄混三世以報酬歷萬劫而不消雖絲髮之無貸一大藏教舉果明因皆自心現量更無一法從心外至者道人當念念觀察自心無形象可得無影迹可求昭昭太古之先歷歷極未來際故楞嚴謂無漏真淨云何是中更容他物所以前輩目之曰金剛寶劒標之為清淨太虛謂劒則無物不摧謂虛則無方不攝大光明藏覿體無依佛祖證之頓空異見衆生不了妄逐情塵由是三界起焉萬法集焉生滅去來之相紛焉禍福酬報之理昭焉而不可逃也以不達自心現量則其趨福避禍之念汲汲不休捨憎取愛之情密密無間且妄見益深而積業益熾矣夫人膠於世網者固未可責其已嘗裂開世網殊形異服之士尚馳逐而不知息者誠可責也楞嚴謂狂心未歇歇即菩提乃責之於名教也少林謂外息諸緣內心無喘又古德謂不學佛法惟務休心乃責之於祖語也如四心六度萬行羣善及道品等蓋不忍其坐致淪溺以輕易重以優易劣皆善巧方便而責之也直以心體言之惟歇休二字早是金塵入眼又何優劣輕重之復論哉故聖人不奈衆生之不悟自心現量猶化城而之寶所也謂自心者何乃佛祖共證本來具足圓滿菩提之至體也謂現量者何乃衆生隨識所變執而不可化之見妄也或問何以遣之對曰不可遣也苟欲遣之則與遣之之迹俱成現量故古有靈龜曳尾之喻惟信心堅密究參不已廓爾開悟即其自心現量不間一塵轉為自覺聖智猶迷時認金為銅悟時則知是金非銅也悟銅元金乃自覺聖智也迷金執銅乃自心現量也楞伽一經之要義少林持以印直指之心捨現量而禍禍福福之迹俱不可得而容也學者宜思之情何物也執而不化之見妄也未有情而不執者未有執而非情者情之所以執蓋出於迷妄也所迷者何乃迷自性轉而為情也衆生之情執有同焉有異焉謂同則同乎憎愛謂異則異其憎愛所趨之見差別萬殊不可得而一也有二人焉一人執東為是則所向皆東一人執西為是則所向皆西其執東為是者每以西為非而不知執西為是者反觀吾之東亦非也其執東者不知西向之人指吾東為非其進東之步益遠自以為益是彼以為益非其執西者亦然二人之所執不翅矛盾之不相入也以其不相入則天下之是非未有能同之者故聖人世起而救之垂言立教必欲同其是非之心化其所執之情奈何教迹愈彰而是非愈熾且古今三教鼎立其互相詆訾者以各專門不容其不是非也如一佛之垂化觀萬法惟一心一心即萬法所以彰萬法為教標一心為禪名常異而體常同教即文字而禪離文字也究其所以特不過破情執之迷妄混入一心之靈源而已以即文字離文字之執未化而教與禪宛如冰炭蓋有離即之二也至若教非教禪非禪雖聖人亦不能不斂袵而退縮矣且日親性理之學尚不能化其所執之是非使素昧教理之人忘其所執不徇是非又何異戒飢人見飯而勿餐也古德有不見他非我是自然上敬下恭佛法時時現前煩惱塵塵解脫之訓昭若日星未即驗其語者蓋情執未化不能不見是非也要而言之化執無越於忘情忘情莫先於悟性性既悟矣則情不待忘而忘情忘則是非之執若春霜當赫日安有不化之理哉幻人世居杭之新城族孫氏祖遷錢塘父母生子女七人幻居其最後方離襁褓惟以歌唄佛事為兒戲鄰人異之七歲從市學讀論語孟子未終九歲喪母而輟學蚤負出家志以世相日拘百計莫脫至草四其所縛之世相不待作意而劃然自解實至元丙戌歲也是年五月獨登山禮先師已而誦金剛經至荷擔如來處恍然開解自爾經書語言頗沾其味非悟也丁亥二月信女人楊氏授以資具從山海翁登山剃染己丑充堂司庚寅欲潛去密為松公所知助田三畒復令參堂未幾衄疾先師令給侍辛卯春瞿公施田莊不受俾馳書歸瞿田壬辰充庫務癸巳甲午惟奔走施門元貞乙未先師臥疾不起奉葬畢即去山以酬宿志丙申往來吳門大德丁酉春挾袱舒之天柱山秋之廬阜冬還建康匿影草廬者十閲月戊戌冬結幻住菴於辨山己亥冬結幻住菴於吳門庚子辛丑咸居焉壬寅大覺請住持而避走南徐癸卯送布衲歸大覺甲辰歸守先師乙巳冬領師子院事丙午丁未至大戊申冬因分衛吳松不返己酉買舟儀真夏繫纜於霅城庚戌歸天目居山舟辛亥復為船居往汴水皇慶壬子春結菴六安山秋舟往東海州癸丑春舟次開沙夏送定叟住大覺就寓環山菴延祐甲寅春復領師子院事乙卯結菴大窩丙辰春渴疾作楚夏舟泊南潯丁巳居丹陽大同菴戊午復還天目己未庚申至治辛酉壬戌六十歲矣是年之夏結菴于中佳山自丙戌至壬戌整三十七白而幻迹方將遠引為避緣計余初心出家志在草衣垢面習頭陀行以冒服田衣乃抱終身之愧且文字失於學問參究缺於悟明尋常為好事者所稱蓋報緣之偶然耳平昔惟慕退休非矯世絶俗使坐膺信施乃岌岌不自安也古人有五十而知四十九之非今余六十返思往事大率情妄所蔽何有當於理哉浮光幻影變在須故書此以自警云校訛第三葉十八行泥誤作呢從南改正十二葉十七行巳誤作巳今改正音釋詆典禮切訶也𧧣許拱切衆言也橛其月切瀝郎狄切去水也訾蔣氏切譏也襁褓襁舉兩切褓博浩切襁褓小兒繃也劃忽麥切剖也剃他計丈几二切與俱切腹下肥也衄女六切鼻出血也

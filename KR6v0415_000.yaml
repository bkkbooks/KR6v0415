front:
  text: 進天目中峯和尚廣錄表皇帝福廕裏大普慶寺臣僧善達密的理誠惶誠恐昧死謹言臣聞佛之生去中國十萬里其歿距今二千餘年故傳道䆮微而言禪最病拘則泥乎物誕則離乎真真離而誕益勝故今之眩誕自我者皆誣禪以亂其教其的傳真悟超然獨異於是者實惟天目山佛慈圓照廣慧智覺禪師中峯和尚明本本承嗣高峯原妙妙嗣仰山祖欽欽嗣徑山師範範於法系上泝臨濟義玄為十五世之祖本距菩提達磨實二十九代之法孫也臣謹按先師明本道德行業衣被禪林孤光絕響振耀海㝢仁宗皇帝嘗遣近臣賜衣錫號英宗在御渙汗繼述恩數有加及乎文皇以臣先師之所素履簡在聖心於是賜諡與碑諡曰智覺塔曰法雲今復際遇皇帝陛下聦明天從聖智日新道軼百王皇建有極崇信佛學垂護正宗遂敢輙冒天誅復有懇請蓋自達磨傳佛心宗道盛東土雖代有得法稱師者然具大辯才大智慧於其教法扶衰拯溺建正摧邪有功佛乘者亦罕見焉惟五季永明智覺禪師延壽慨念天台慈恩賢首性相三宗互相矛盾乃集三宗知法之士更相設難而以心宗旨要折中之於是著宗鏡錄一百卷其書既行後賜入藏宋元祐間明教禪師契嵩憫世儒闢佛大甚而不知佛學隂裨王化遂著書曰輔教編三卷又念釋迦文佛至乎曹溪六祖受授而下歷代諸師譜系不明復著傳法正宗記十二卷其書亦賜入藏今臣先師明本痛禪學之弊無如今日用救其弊以身先之其所著書因學者不能廓悟神心徹法源底每以聦明之資於古德垂示第一義諦處輙領覽為己解也於是著信心銘闢義解一卷每以講學之士不能無辯詰也於是著楞嚴徵心辯見或問一卷金剛般若畧義一卷別傳覺心一卷因學者不信有悟門而遂溺於邪見未得謂得未證謂證也於是擬寒山詩一百首又著幻住家訓一篇以發明真叅實悟之旨因學者每每致問隨問而答久而成編曰山房夜話一卷東語西話一卷續集二卷語錄十卷別錄十卷於戲先師豈好辯哉蓋有不得已者也今遂緫加裒錄而槩題其編曰天目中峯和尚廣錄隨表進上恭望天慈鑒臣先師之所以立言非徼生榮非覬後福蓋以禪學之病沉冥膏肓有大醫王不忍聞見於是鍼砭不切無以中其會俞湯劑不苦無以蠲其沉痾是所謂對證之良藥衛生之妙道其旨意如此逮與永明明教二師之所垂訓實相表裏二師所著之書故宋既賜之入藏與諸佛菩薩之所宣說者並行而不悖矣伏念臣先師明本遭值聖明恩渥周至光寵蕃錫獨其遺言未得與永明明教之書賜入太藏以故臣夙夜憂歎懼有墜逸伏望皇帝陛下天地之量日月之明容臣螻蟻之志鑒臣草芥之誠將臣所進先師明本廣錄三十卷特賜入藏佛學幸甚臣干冒天威下情無任激切屏營之至謹奉書隨表上進以聞臣僧善達密的理誠惶誠恐昧死謹言元統二年正月日大普慶寺臣僧善達密的理上表降賜天目中峯和尚廣錄入藏院劄皇帝聖旨裏行宣政院准宣政院咨元統二年正月二十六日篤連帖木兒怯薛第二日延春閣後咸寧殿裏有時分速古兒赤馬札兒台大夫汪家奴院使羅鍋殿中喃忽里火里歹等有來本院官撒迪平章不蘭奚院使汪束攢古魯思院使左吉院使燕京閭院使乘哥失里院使喃哥班同知輦真班同僉唆南叅議也先不花經歷陳都事等奏在先好師德每撰集來的文字奉皇帝聖旨教刊板入藏經裏有來如今為這中峯和尚悟明心地好師德的上頭奉札牙篤皇帝聖旨他根底也立了碑來如今它撰集來的文字都是禪宗裏緊要的言語有如今依先例將這文字但有藏經印板處教刊板入藏經教揭監丞撰序加與普應國師名字俺行與省家文書教與宣命呵怎生奏呵奉聖旨那般者教火者賽罕院使皇太后根底啟呵那般者麼道懿旨了也欽此除欽遵外咨請欽依施行准此除外使院合下仰照驗欽依施行須議劄付者右劄付杭州路南山大普寧寺住持准此元統二年五月印日皇帝聖旨裏杭州路餘杭縣南山大普寧寺住持臣僧明瑞元統二年五月二十八日蒙朝廷差來官賫奉到行宣政院劄付該准宣政院咨元統二年正月二十六日欽奉聖旨節該中峯和尚加與普應國師名字它撰集來的文字但有藏經印板處教刊板入藏欽此除欽遵外咨請欽依施行准此除外使院合下仰照驗欽依施行奉此除欽遵外臣僧明瑞今將奉到普應國師天目中峯和尚廣錄三十卷謹募檀信刊為經板計三函入本寺印造毗盧太藏經院用廣流通以此功德恭為祝延聖壽無疆仰願皇圖鞏固帝道遐昌佛日增輝法輪常轉者元統三年六月日佛智妙應廣福大師杭州路餘杭縣南山大普寧寺住持臣僧明瑞謹題天目中峯和尚廣錄序元文林郎藝文監丞叅檢校書籍事臣揭傒斯奉勑撰元統二年正月庚寅朔十日己亥上御明仁殿大普慶寺僧臣善達密的理以其師杭州天目山故佛慈圓照廣慧智覺禪師臣明本所譔述諸書緫題曰天目中峯和尚廣錄三十卷因奎章閣承制學士臣沙剌班奉表以聞願視五代永明智覺禪師延壽所著宗鏡錄宋明教禪師契嵩所著輔教編傳法正宗記得賜入藏制曰可廿有六日乙卯中書平章政事臣撒廸等言昔諸高僧文字語言凡於其教有所裨輔皆得裒粹奏入大藏遂為故事如本起東南以其道為海㝢倡德業純備紹隆正傳仁宗皇帝始賜號法慧復加佛慈圓照廣慧之號英宗繼御寵賚恩數一如先朝其道臣等槩不足以知之若其為人則頗聞其略蓋其所至四眾傾嚮悉成寶坊而本未嘗一留自焉顧尋窮山僻絕洲嶼崖巢浪宿草衣木食以自絕其聲光然而德盛而心卑身遯而名隨及已示寂文宗皇帝勑辭臣製碑禮臣定諡諡曰智覺曰法雲恩數至矣逮陛下臨御而其徒以其著書上塵乙覽叅會際遇豈偶然哉宜賜其書一如故事編入大藏庶無負國家崇尚佛乘之意臣等謹昧死以聞制曰可其賜號普應國師仍詔臣傒斯序於書之首臣因即其書而窺之見其刊華就實因事明理而其大旨則深惟其教法隆污殊時聲實異致不能自已其言耳故言叢林栽培滋植必以其道苟不以其道而偷安利養貪慾瞋恚是皆叢林斫伐之斧斤殞穫之霜霰耳故言其教自入中國中更元魏唐宋固嘗禁止衰息而其向上諸祖身經百惟道益昌盛譬之人身視若病然而其脉則不病也今則異此識者得不為之寒心至於推明其法必使之斷言語絕依解無授受叅則真叅悟則實悟乃始謂之傳佛心宗其間煆煉之穩密勘辯之明確無假借無回護凛凛然烈日嚴霜可畏也已至若提唱激揚則如四瀆百川千盤萬轉衝山激石鯨吞龍變不歸於海不已也其大機大用見於文字有如此者謹按菩提達磨十一傳至臨濟義玄玄十七傳至仰山祖欽欽傳天目原妙妙傳今明本妙之居天目坐死關影不出關二十年孤冷峭絕目瞠雲漢見者慄然本給侍左右暑寒一草衣不易妙惻然屢令紉浣垢弊不顧也本雖土木骸形而其相好魁碩偉然一代天人師其侍死關晝日作務夜而禪寂剋勵嚴苦脇不沾席者十年師資之間究詰研窮洞法源底乃始親承記莂由是學者輻湊歸之然而深自韜晦未嘗肯以師道自處也臣復考其行錄其大致固已不可彷彿其端倪若其細行則雖大山長谷之間其徒之耄老名德有卒世窮年不能踐其實之萬分一者然則本之道雖非臣所能測識然即其行以究其言則其為書上肩諸祖並行不悖隂裨皇圖光賛佛乘其於聖教豈小補哉豈小補哉謹序重刊中峯和尚廣錄序昔在大德延祐之間江之南有大和尚曰中峯本公居天目山發大願力具大辯才痛救末法之弊大機大用變化翕霍雷震電走如大醫王視一切眾受病已劇悉皆因其病而藥之故其所為書有曰信心銘闢義解曰楞嚴徵心辨見或問曰金剛般若略義曰別傳覺心曰擬寒山詩曰幻住家訓曰山房夜話曰東語西話曰續集曰語錄曰別錄千言萬語反覆辨說無非隨機開示俾凡叅學之士證上乘也總名之曰天目中峯和尚廣錄和尚化去其徒表請于朝如五季永明壽禪師所著宗鏡錄宋明教嵩禪師所著輔教編傳法正宗記得賜入藏與內典並行朝廷允之鏤板於杭之南山大普寧寺未及廣布而數遭小刼板與寺俱燬有武弁之士曰張子華者善人也得其殘編讀之惕然有省于中曰和尚之言切實明快因事示理真對證之良藥若我之迷鈍且猶有所警發而况圓機之士乎吳山有雲居菴亦和尚法嗣所築也子華謀於其菴之上首智暠慧澤二師曰吾願重刊廣錄以廣流通吾己槖為之倡師等皆唱其道者也幸助我募緣成之二師曰是吾志也時和尚之慈風被於人者未冺樂助者眾板材既具擇日命工以鏤刻焉逾年而功完請余為序嗚呼和尚之道大矣其見於虞文靖公集宋正獻公本所著銘與道行碑者備矣至於廣錄入藏揭文安公𭦟碩又奉勑為之序顧余何敢追繼三公之後縱一言之其於和尚之道猶指虛空而加讚歎安能得其髣髴哉嘗試論之言禪不尚文字其來尚矣要之第一義諦非文字亦莫能以傳譬之涉長江大河非假舟筏之力未免望洋而退惡能濟彼岸故凡傳宗之家必有語錄者此也夫文字者舟筏之具也何可廢哉方元室全盛之日崇尚佛乘前古未有有能續佛慧命大弘法量力尸化權普應十方而無礙者和尚一人而已當其住世王公貴人學士大夫以至遐陬裔域之長攀蘿緣磴隮千仞之巔瞻其光儀聆其謦欬得悟於一棒一喝之下固無資於文字及夫報緣已盡光儀不可得而見矣謦欬不可得而聞矣雖欲承其筞勵邈不可得猶幸其應世之蹟見於文字者可以為究竟之地不然光沈響絕未有不舍正塗而趨邪道者此廣錄之書所以不容廢也雖然能仁氏之道累千萬億言至於無一言可說乃為大徹嗚呼是書也其大徹之門乎是故廣錄之書完和尚雖已化去四眾持誦常如住世之日然則張子華氏有功於心宗之傳豈小補哉書凡三十卷字以枚數凡二十一萬有奇若其族出之懿承傳之的與其純德苦行之詳則有虞宋二公之碑銘在茲不著洪武二十年歲次丁卯四月佛誕日杭州府儒學教授天台徐一夔序天目中峯和尚廣錄總目卷第一之上示眾卷第一之下示眾卷第二小叅卷第三拈古頌古卷第四之上法語卷第四之下法語卷第五之上法語卷第五之下法語卷第六書問卷第七佛事卷第八佛祖賛卷第九自賛卷第十題䟦卷第十一之上山房夜話上卷第十一之中山房夜話中卷第十一之下山房夜話下卷第十二之上信心銘闢義解上卷第十二之中信心銘闢義解中卷第十二之下信心銘闢義解下卷第十三楞嚴徵心辯見或問卷第十四別傳覺心卷第十五金剛般若略義卷第十六幻住家訓卷第十七擬寒山詩卷第十八之上東語西話上卷第十八之下東語西話下卷第十九東語西話續集上卷第二十東語西話續集下卷第二十一賦卷第二十二記卷第二十三箴銘卷第二十四序卷第二十五說卷第二十六文䟽雜著卷第二十七之上偈頌七言長篇卷第二十七之下偈頌七言長篇卷第二十八偈頌五言長短篇卷第二十九偈頌七言八句七言四句卷第三十終偈頌七言四句天目山佛慈圓照廣慧禪師中峯和尚行錄大元勑賜智覺禪師法雲銘普應國師道行碑謝降賜中峯和尚廣錄入藏并封號國師表

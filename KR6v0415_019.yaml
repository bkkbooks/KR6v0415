body:
  text: 參學門人北庭臣僧慈寂上進東語西話續集上非一歲無以終萬化之功非一心無以𭣣萬法之迹然而春夏秋冬之令雖別其所不別者同一歲也頓漸偏圓之理雖別其所不別者同一心也且歲不知有春夏秋冬而四序成其歲心不知有頓漸偏圓而四教彰其心如是則知即別而同即同而別也即別而同四不離一即同而別一不離四惟同則不能徹其化迹惟別則不能會其本源於是同別之旨不容不兩立本迹之門不容不雙𭣣也每聞議者謂一代時教彰如來之本懷無不盡彼云教外別傳者豈教外果別有未盡之法為傳耶儻別有所傳則名外道或別無所傳則妄誕之迹不容掩也余嘗以前説證之茲復謂議者曰聖人初生下時手指兩儀足行七步何教義所攝耶此乃別傳之最初顯示也豈待末後拈一華以示迦葉謂之別傳者乎中間四十九年隨機演教於正直舍方便處皆是別傳之旨又豈止乎最初末後而已哉所云別傳者非教外別有所謂禪也非心外別有所謂法也非離言説外別有不形言之祕密三昧也非理外別有理也亦非一向無事而故作是言也何則自始洎終惟示一心也依一心所演惟一法也安有所謂別哉當知靈知心體離言説相離見聞相離思惟相離文字相乃至離一切諸相雖曰離言説相非言説不能立其教雖曰離見聞相非見聞不能傳其教雖曰離思惟相非思惟不能達其教雖曰離文字相非文字不能宗其教故知言説文字等乃教也離言説文字等乃教外別傳也所云教者宣明此心也所云教外別傳者即超出言象而妙契此心者也使言説文字外別無旨趣則經中不應言諸法寂滅相不可以言宣又云此法非思量分別之所能解或謂言説文字等果不可契如來之心耶曰不然豈不聞始從鹿野𫟍終至跋提河於是二中間未嘗談一字於此則一大藏教曷嘗有言説文字等相之可得也苟不洞徹如來之本心則滯有文字非教也執無文字非禪也動為情縛於有無之間則教禪俱不取也然教外別傳者目之為禪此禪即一心之異名非人天二乘所習八定四禪之禪必待枯形死心殞情絶識之謂也蓋此禪之體如金剛王寶劒自非上根利器生知夙習之士領於機先薦於言外欲向見聞思惟等擬涉毫芒則刻舟奚益哉遠自少林相傳逮今如印印空雖文彩不露而至理獨存信別傳之説良有旨焉通而言之禪即離文字之教教即有文字之禪覔一毫同相了不可得復何別之有耶其所別者乃化迹之設不侔爾譬如堅冰烈日之不可同日而語也藥不專治病無必死其用舍安危之要在醫者之得失耳苟得其要以寒破寒以熱攻熱俱無實實虛虛之謬不得其要而或誤投毫髮雖病未危而藥危之矣世無盧扁使萬金神藥亦能殺人其利害有如此者佛稱三界大醫王純以無上神藥治法身之病其對證投機之頃順用逆施迎刃而解世云神聖工巧殆不可同日語也余因閲圓覺經文殊首以本起因地為問乃答以永斷無明方成佛道普賢以以幻修幻為問乃答以應當遠離一切幻化虛妄境界由堅執持遠離心故心如幻者亦復遠離遠離為幻亦復遠離離遠離幻亦復遠離得無所離即除諸幻普眼以修行漸次為問乃答以先依奢摩他行堅持禁戒安處徒衆宴坐靜室遍觀四大及與根塵虛妄和合然後身心根塵與幻俱滅便能顯發無方清淨彌勒以修佛菩提幾種差別為問答以欲脫生死免諸輪回先斷貪欲及除愛渴清淨慧以凡聖所證所得云何差別為問答以一切障礙即究竟覺得念失念無非解脫至若居一切時不起妄念於諸妄心亦不息滅威德自在以方便漸次為問答以當修三種淨觀謂寂靜奢摩他如幻三摩鉢提寂滅禪那等辨音以圓覺門有幾修習為問答以二十五種清淨妙輪即前三觀交互單復云云淨諸業障以本性清淨因何染汙為問乃答以不了四相不成聖果又云但當精勤降伏煩惱起大勇猛未得令得未斷令斷圓覺以云何安居修此圓覺清淨境界為問答以建立三期求哀懺悔復以三種淨觀隨學一事已上皆大悲願王普告諸菩薩及末世衆生淨治覺體之善見妙藥也如何獨答普覺所問一章之中指出四病謂作止任滅則前所謂善見神藥者俱不能逃此四病所攝何則自遠離諸幻與堅持禁戒建立三期等豈非作耶自先斷貪欲及除愛渴與宴坐靜室修奢摩他等豈非止耶自一切障礙即究竟覺及於諸妄心亦不息滅等豈非任耶自永斷無明及四大六根虛妄和合與幻俱滅等豈非滅耶原夫法身流轉五道而為衆生者由內熏三毒外迷四倒轉入無邊生死海中如來不指三毒四倒為病而反指作止任滅為病者何耶且作止任滅固不足以詣圓覺之閫域亦必取證聖道之漸望三毒四倒何翅天淵之間哉對此不能無疑於聖人之言乃為之解曰豈不聞一時婆伽婆入於神通大光明藏三昧正受正當入時上同諸佛下與衆生及十法界中有無情等同時俱入自昔至今不起于座就中無主無伴離聖離凡身心混融性相平等良由十二大士未忘境智瞥興問端是非鋒起故如來據大圓覺縱其所問廣説證修即作止任滅俱指為藥至普覺章將𭣣玄唱斥作止任滅均名是病即病一言取舍俱奪苟知縱而不知奪混圓覺於問答之場或知奪而不知縱墮圓覺於泯默之地當知縱亦藥也奪亦藥也即其縱之之藥治三毒四倒之正病以其奪之之藥治作止任滅之助病豈不聞世之療色身之病者乎凡初感正病之頃則指方以對治及執其所投之藥而過之由是不病於元感之正病而病於藥之所助則卒無如之何也惟藥病非庸醫所知故知作止任滅之藥病非如來洞鑑其源則孰能指也當知覺有二義有覺妄之覺有靈明之覺覺妄之覺能對治一切垢染及世出世間種種見聞塵習者是也靈明之覺亦名本覺亦名圓覺體離凡聖迹絶自他雙泯色空兩忘能所窮今亘古湛寂不搖靡間一塵覿體圓淨雖菩提涅槃真如般若到此俱名是病又何作止任滅之不病哉善致福惡致禍正合道邪干業此理昭然如黑白之不可混真如淨境界中初無善惡邪正皆一念瞥生處失於照了而不得不有也以其有故則三界煩惱念念起滅無時暫息成住壞空循環不斷是故聖人興慈運悲垂教立化使其捨惡以從善忘善以合道捨邪以歸正忘正以會心不越念而三界空不動塵而煩惱盡復歸本際洞徹根源教化之權亦從而泯矣捨惡則斷恩愛遠利名脫塵勞盡貪欲捨邪則齊物我絶是非空見聞泯能所從善則守戒律修禪那趣空寂向菩提歸正則徹法源洞真諦契佛心合聖道至於邪正善惡會歸一念則一切時中觀根設教普利羣機信手拈來無非妙用隨衆生願報佛祖恩手眼通身一機不露熾然作用一物不為撒手去來了無拘束是謂一代聖化之本旨也雖羣宗異教各立門風皆莫能外乎此自先佛建立祖祖相承大小伽藍分布海內凡主一方者苟或善惡倒置則禍福之機隨念響應內關己德外涉化風不容不審也惟是識馬易奔情猿莫制故聖賢制禮立法於一念未起之前乃深欲防其微而杜其漸使微不知防則著將安救漸不知杜則頓起難𭣣譬之水火防其微漸之初則不致於崩山燎原也故吾佛棄萬乘之權而受擯辱於匹夫之手捨海宇之富而丐衣食於域內之民忘宮室之華而委形質於草木之下泯道德之貴而歷辛苦於塗炭之中觀其所由莫不痛以無邊衆生各各具此深遠廣大利欲根於情識卒莫能制乃化現斯事實防微杜漸之大旨也教化之通塞初無定體出入乎道德利欲之間使存道德則教化不期通而通存利欲則教化不期塞而塞矣當知道德自佛祖盛化之後人物衰替從著而至微利欲自時移事變之頃貪妄日興從微而至著道德利欲譬之明暗不同時水火不同器今端居佛祖之域苟不知防微杜漸固已危矣矧乎相勝以欲相誘以利莫悟其非視之為當然者則火已措于積薪之下矣境風日扇禍災倏起反不以為憂而欲坐待教化自通者是猶吹網欲滿多見其不知量也悲夫世所謂語言者動乎其心而達乎其口即情想之昭著未有無其義者也故其情愛且喜則其言也和而溫憎且嫉則其言也峻而訏逆且怒則其言也迫而怨順且恕則其言也肆而達誇且美則其言也婉而文俗且鄙則其言也朴而拙皆言語之容也欲審其義先觀其容既達其容則知其情既知其情則有以諭其義矣所謂義者乃情想之所適意識之所主而言以宣之也蓋語言皆模寫情識所緣之義曲盡其巧苟情想不到意路不行雖大張其吻於終日將無一詞可措矣豈特人言為然哉至於鴉鳴鵲噪犬吠雞啼凡若有情一動其聲必有所主之義但人莫之曉耳安有語言音聲而無其義者乎惟吾佛祖之道則異於是自手指兩儀足周七步至於一華遽拈時百萬衆皆神通智慧之聖賢盡其所思之量俱莫測其邊涘惟飲光微笑而已自祖道之東而兩宗五派星分棊布遍入寰區逮扣其言則須彌山是甚麼東海鯉魚打一棒新婦騎驢阿家牽與我將禪板來飯袋子江西湖南去等語𧧣𧧣不絶如長江大河莫之所止味之則如木札羹鐵釘飯親之則如吹毛劒大火聚目之則如閃電光擊石火耳之則如塗毒旱地雷入之則如荊棘林透之則如生鐵壁既不可以語默會尤不可以智識通及與天地鬼神咸莫能測所以目之為無義語也夫無義者超乎喜怒哀樂之外脫乎情識意想之表又豈容以經書文字聖凡名相而和會哉嗟學者之未諭紛紛亂鳴擅自穿鑿謂此語是放開是把定是傍敲是暗打是探他是肯諾又謂此語是向上向下是全提半提是賓家主家是死句活句是商量平展又謂此語是最初末後是藏鋒透關是殺人刀活人劒又有甚者牽引經教謂此語是即色明心附物顯理是有言顯無言無言顯有言是眼觀東南意在西北是威音那畔空劫已前不間一塵全歸自己等異端殊説莫可具陳不知一涉意根俱成有義矣使佛祖之道果止於是則將何以斷他生死情妄之根乎誠所謂聚螢火以燎須彌持蠡量而測滄海也或謂禪家之無義語我知之矣佛祖以不立文字教外別傳安可復有語耶其應機接物之際高揮大抹答問汪洋雖語言如塵沙其如不落那邊著著皆歸第一義所以開口不在舌頭上又何向上向下之云乎謂無義語得非是歟余曰無乃五十步笑百步也子雖不墮向上向下之異説且第一義得非義乎或曰聞解粘去縛抽釘拔楔必因有語而然使佛祖之語果無義趣則何以然也余曰斯言差近矣子當致此疑於懷抱久之自悟方知無義語不爾密矣苟或不爾則徒增戲論何益於理哉人莫不有心心莫不有應禪者心也機者心之所應也自鷲嶺拈華少林立雪之後此心一傳響應千古曰禪曰機無一時不與天地萬象互相酬酢政不待別有所扣而然也况自有宗門以來其所謂木上座金剛圈暗號子破沙盆青州衫娘生袴三腳驢鱉鼻蛇無米飯不濕羹至若五君臣四賓主三玄九帶十智重關放下著自做得是什麼莫管他等語四方八面霆轟雷震浩浩湯湯前後出興莫之紀極語其疾則囓鏃猶遲語其利則吹毛亦鈍鴆酒不可方其毒大羹莫能比其淳麗鋪錦上之華精食水中之乳儼臨廣衆高踞大牀風動鬼神聲喧宇宙凡咳唾掉臂怒罵戲笑總而目之曰禪機者良有以也世典謂寂然不動感而遂通此與禪機似倣佛矣不動者非有所止而使之不動蓋體本湛寂如太虛空乃天理之不動也感通者非有一毫意謂於其間必待有所感而通者當其感通之際若洪鐘斯扣空谷傳聲無為也無作也天理本然之勢也喻乎淨鏡之鑑萬形明珠之現五色禪也者鏡也珠也機也者鑑也現也其萬形之妍醜五色之淺深雖昭昭不能自隱而鏡與珠曾何有所為也有所作也乃至淨至明之效耳能契此者則謂之禪機外此則非余所知也或問據所言人莫不有心則有情界內窮古亘今資生産業治世語言浩如塵沙原其所因靡不由心而著初未聞有禪機之説惟少林門下業咨參者獨擅其名何也對曰心有二焉曰真曰妄真者即靈知之至體此非妙悟不可得而逆測也妄者即情識之幻用乃逐物者由之也昧者槩稱之為心不知真之與妄實霄壤之不侔彼資生業等者乃妄情也非真心也夫真心者惟佛與祖熏鍊正因智徹神悟堂堂於聲色是非中妙符而密契者也全超修證靡涉功勳不墮見聞豈存地位所謂達大道兮出度超然名之曰祖也又豈可與依情附識膠纏世網者同日語哉或未達其真則修行亦善矣若使有作思惟而吠虛逐塊於祖庭之下者反不若資生産業有治身之益也彼不惟無益將坐致謗法之咎豈禪機之果纍於人乎蓋不善擇其真者也道人宜審諸趙州問南泉如何是道泉云平常心是道此話流布叢林古今之下鮮有不墮於意識者盡謂著衣喫飯動靜語默一一天真離此天真之外擬涉念慮早是不平常了也古人道箇平常心是道兩手分付只貴一切平常佛法世法彼自無瘡勿傷之也乃引張拙秀才謂隨順世緣無罣礙涅槃生死等空華是平常心龐居士謂日用事無別惟吾自偶諧是平常心三祖謂至道無難惟嫌揀擇是平常心馬大師謂見色便見心無色心不現是平常心又古德謂翠竹真如黃華般若是平常心但是古人凡説到日用本來具足不離見聞覺知處皆配之為平常心若然則總不出箇意識摶量蓋南泉實不於此處蹲坐而從上古人亦不向這裏垜跟但是不曾親向趙州未問南泉未答以前薦得擬生寸念徇其語默引起意解徹底不平常了也更若廣引古人垂手利生方便接引處一言半句以之取證轉見崖州萬里或謂即今對物遇境不起一念是平常心或謂雖舉念動情而不住諸相是平常心或謂有無不隔聞見混融是平常心或謂寒則添衣熱則搖扇是平常心或謂繁興大用舉必全真細語粗言皆第一義是平常心或謂古人痛棒熱喝擎義輥毬機無停滯道出常情是平常心乃至種種作為種種思想種種湊泊要與箇平常心相似無異掩耳偷鈴自取欺誑但是玄言聖量妙理真詮總不與平常心相應况是迷惑貪妄顛倒情識而能遠契平常心者乎當知平常心不屬知不屬解乃至不屬一切和會領略擬涉知涉解則安有平常之理乎昔雪山夜覩明星是悟此平常心迦葉破顏笑二祖禮三拜是明此平常心至若太原聞角靈雲見桃凡一機一境有契有證者莫不皆契此平常心今日要與此箇平常心覿體無間須是親如他佛祖瞥地一回則信手拈來無一毛頭不與平常心相應雖迦文放眉間照萬八千土之光出遍覆三千大千世界之廣長舌相與夫納須彌山於芥子建寶王剎於毛端甚而至於橫身火聚闊步刀山亦未有一事不與平常心相應者但迷人不知而自見等差於等差中更莫有不自此平常心顯現乃知無邊衆生雖重迷極障於無盡苦趣動經塵劫未得棄離亦未嘗有絲毫不出此平常心者也特自昧而不覺耳南泉又謂道不屬知不屬不知知是妄覺不知是無記這一絡索將謂盡力扶持殊不知破蕩不勝其夥矣爭似永嘉道箇絶學無為間道人不除妄想不求真與此平常心差近且孰為絶學孰為無為殆不容舌也遠客過門指余色身以四法界為問謂此身於四法界內何法界所攝余從容告之曰四種法界顯一心之體用也幻者罕習經教輒以己意陳之且以手中拄杖言之依相視之喚作拄杖名事法界離相惟性不喚作拄杖名理法界性相不二正喚作拄杖時却不是拄杖於不是拄杖處不妨全體是拄杖是名理事無礙法界以一拄杖入一切法任法立名了無定體以一切法入吾拄杖同名拄杖亦無定體名事事無礙法界如帝網珠以吾一珠入一切珠而體未嘗分以一切珠入吾一珠而體未嘗合相𭣣相攝而無虧互奪互融而不間如永嘉謂諸佛法身入我性我性還共如來合一月普現一切水一切水月一月攝其法界之名廣説萬殊略説惟四其實亦未嘗四也惟廓悟自心之士見處圓融於法界相不執一而言一切不離一切而守一蓋法爾如然非神通所致也嗟夫昧者妄執色身為我起種種貪欲為事所障囚縛三界無解脫期聲聞觀色無我惟滯一空遠離世間獨求解脫為理所障被佛所訶惟菩薩乘了色即空悟空即色色空不二住于中道理事相含獨脫無礙猶存見執尚滯法塵獨如來事事無礙之境如鏡照鏡似空合空類一摩尼具含衆色𭣣則俱𭣣現則齊現不容造作豈涉安排是謂無功用法門其法界相總萬歸四會四歸一於無功用中一亦不可存矣余身於四法界理體如是上根利器薦在機先中下之流徒勞佇思客唯而退太末蟲處處能泊而不能泊於火焰之上衆生心處處能緣而不能緣於般若之上火固不可泊余不知般若果何物而獨不能緣耶使般若果不可緣則衆生成佛之理無有是處或謂不然衆生為妄所惑墮落生死流染世間識想交馳善惡分別皆遍計成就縱有知覺亦成戲論遠經多劫近及今生從迷入迷曾未休息夫般若者離言説相離文字相離心識相離思惟相乃至見聞覺知遍計分別種種離故能離所離亦皆遠離爾時般若覿體成就所謂不能緣者由真妄各立不相入故譬如明暗二體相傾欲合為一縱有神變其可得乎雖然殊不知法無異相動念則乖理絶多途舉心則隔遍十方是般若體盡大地是光明幢不間一塵觸處圓淨纖塵未盡萬劫難明欲得現前當依智用會須拔能所根於一念未萌之際空人我見於寸心不動之時念念破無明離妄想斷攀緣泯聞見奮起此志如金剛王寶劒橫按當軒遇物即殺晝夜六時熾然無間久久心境寂人法空意識消伎倆盡和手中柄子一時打脫始知衆生心外無般若智亦何依般若外無衆生心緣將安寄即衆生心非般若青出於藍即般若非衆生心冰生於水即衆生心即般若廓爾圓明非般若非衆生心泯然無寄然後動一塵則萬法彰斂一念則十虛殞卷舒與奪任意縱橫生死去來於法自在事雖與麼若約祖師門下衲僧面前猶未有語話分在奇哉此道豈古人獨有而我獨無耶丁此叢林日晚光影如流努力勤參決不相賺止體也百千諸佛之所共住觀用也八萬細行之所齊彰體無用外之體則止在觀中用無體外之用則觀歸止處體不動故猶須彌立於太虛用不昧故若杲日麗乎暘谷止無所故波水盡於本源觀無能故光影消於古鏡太虛隱須彌之勢則止體本自無虧暘谷藏杲日之光則觀用由來具足源空波水滅止亦何依鏡破光影亡觀將安寄然則鏡源本幻體用元空能所俱亡止觀亦寂矣或曰承教有言衆生為昏散故墮生死流諸佛以止觀故住涅槃岸所謂以止止散寂而常照以觀觀昏照而常寂所以寂照雙顯定慧兩融止極觀圓不真何待審如前説則止觀之名既混定慧之體何分名實既乖恐非至論噫豈不聞法華經云惟此一事實餘二則非真止觀也定慧也寂照也體用也理本無殊特立名之異耳然以實就權則二邊各立會權歸實則一亦不存儻權實之不分則名相自惑矣殊不知靈鑑絶待真覺無依良由一念瞥興萬法斯起且迷悟既無別念得失豈有二人故聖人設教雖百千不同乃應機隨器特不過遣其妄而去其執皆出於善巧方便三昧智力也曷嘗有定意於其間而亦未嘗無定意也要在得旨忘言可矣且以止止散而不知其所以散以觀觀昏而不知其所以昏使散有可止則心外有法昏有可觀則法外有心所謂散者不由空寂靈源而應不自生所謂昏者若匪圓湛真體而曷由自起且空寂靈源動靜不異圓湛真體明暗何殊使止形乎絶動靜之源猶寸土培須彌之勢觀加於離明暗之體若孤燈助暘谷之光但一真之至體廓明則萬法之幻名自釋不離當念豈涉階梯融止觀於昏散之場全定慧於生滅之際即千波而觀湛水清濁誰分就五色而覩圓珠染淨莫惑至哉此旨世或罕聞惟證乃知非悟罔測言前薦得已涉途程擬著意求刻舟何益音釋殞羽敏切歿也閫苦本切與捆同吻武粉切口脣邊曰吻阿家家音孤蠡音離瓠瓢也楔先結切櫼也湯湯並尸羊切水盛貌囓倪結切噬也鏃作木切矢鏑也咳口溉切與咳同垜徒果切夥胡果切多也賺直陷切錯也

body:
  text: 參學門人北庭臣僧慈寂上進東語西話續集下客問古人謂即今山河大地四大五隂明暗色空等乃衆生無始時來見病所致茲不識見病為何請解之余舉手中扇問之曰爾目其色謂是扇乎謂非扇耶二者皆見病也偶鴉鳴復問之曰爾耳其聲謂是鴉鳴乎謂非鴉鳴耶此二者亦皆見病也至若鼻舌身意所對塵境曰是曰非皆見病也何則謂是則墮常見謂非則墮斷見住常見則以山河大地等為實有守斷見則以山河大地等為本無有無斷常三世五隂返覆循環計六十二皆見也所云見者非眼見之見乃妄心所執之謂見也首楞嚴謂由塵發知因根有相相見無性同於交蘆經中以知為見謂根塵相對是謂見也言病者何如是二見能壅塞靈源障礙法性引起虛妄纏縛死生卒無已也如上約凡夫二乘見病如是若以祖師門下雖悟得山河大地等咸是自己妙明真心中物不為有無二邊之所留礙至於離四句絶百非淨治法塵不存聖量儻有纖毫所得不忘亦名見病這裏豈特山河大地等縱使百千華藏海解脫菩提場法界及虛空聲聞菩薩佛妙義與神機三昧語默等總而言之皆見病也客曰世有能醫者乎余曰謂無則佛法無靈驗謂有則又益子之病矣客茫然因筆之竊窺天下之理至一而不可二也惟相似之説二而不可一也何則世固有休歇而間者亦有怠惰而間者謂間則一也以休歇怠惰言之則不可以一致論也忙亦然有盡道義而忙者有趨利欲而忙者言忙則一而道與欲則不可以一也求其沉酣相似而不知返者無他由此心涉迷悟之兩途而迷者不自知也豈惟不自知反責悟者之不類乎已而深疾之也如怠惰之間者不自知其陷於罪垢沉溺之淵反以盡道義之忙者為非也又如趨利欲之忙者不自知其陷於狂妄顛倒之域而反以休心歇意之間者為非也惟聖人之心公於道義以百千方便革其妄謬之情俾間者忙者必契其理而後已嗟人之情溺於迷妄以聖人之是者亦是之雖是之於言而不悛其念聖人之非者亦非之雖非之於口而不遣其情此是是非非之又相似也逮求其實則不翅天淵之間也此世相之相似且置之勿論如即心是佛之語悟者有是説也解者亦有是説也謂相似者乃即心是佛之四言也惟悟者之説如明鏡鑑像無眹迹可留解者之説如五彩畫像微動筆則迹不勝其多矣學者於相似之理云胡不辨哉天下之器各有其量故杯則有杯之量缶則有缶之量不待器之遍舉而量之大小分矣心亦身之器也安得不有其量哉夫聖凡之心惟一無二而其心之量獨異何耶當知杯亦器也缶亦器也言器則一而其量則不可一也夫心隨其所見之明昧而量之大小依之而別焉譬如螻蟻瞋目所覩不過分寸人乃窮其遠眺之力不過數里而具神通聖人觀大千界如觀掌中菴摩勒果况吾佛以四大海為目微塵剎土洞觀無遺故讚有量周沙界之語昔張無垢居士謂人有輕慍易喜者以其量之不大也惟其量之不大也人有一毫怫吾心者則氣不平氣不平則言不和言不和則鬱艴忿怒之色形於面至於切齒攘臂不能自已我之量不容彼之惡方熾未有不蹈夫禍患之機者原夫見之明昧由學之至不至使之然也學之不至則見昧而局學之漸至則見遠而廓學之純至則見到而宏學之大至則見明而圓矣聖人乃學之大至者也至人乃學之純至者也賢人乃學之漸至者也常人以其學之不至則其量亦不得不等而小矣量既局於小而卒不可以廣之也故涉一毫利害則無以處之蓋有涵養之説焉且心之所見固不可以勉而至若涵養之道則不可不力行而勉進之也謂涵養者一以信為本何謂信信聖人之言也且學之不至則所見昧然心既蔑於見聞而不信聖人之言其動違天理又不翅終此身而已也故聖人曰三界無別法惟是一心作三界本無事人心自撓之苟信之則不應於物境存是非憎愛之見或存此見是謂分別自心既與自心分別則吾心之量不勝其隘且塞矣是非之習愈厚則心器之量愈狹仰觀周遍塵沙法界之量奚止日劫相倍而已哉然信而後能學學而後能至至而後能明明而後能久以洞明而久視則其量不期充擴而寬若太虛雖萬象森列亦不容有所礙矣人皆具此量由信之不篤學之未至甘為是非憎愛窒塞於煩惱習氣之域是豈道人之所用心也哉古人謂楮小不可懷大綆短不可汲深蓋言有限之量不可使物過之也且吾楮有五尺之量使懷三尺之物可也吾綆有二丈之量使汲三丈之深不可也適當其可則優遊自在而不難矣當其不可則驚畏窘逼而用小懷大用短汲深未有不敗者然則人之才量豈可強至哉故道人才量宜寬涉事宜簡庶幾其可也反是多見其不自忖焉世有信口言而語不乖信意為而事常勝不可與言心量才量者豈識達羣類智周萬物量能然哉惟福量有以致之也且福非有像量何所依吾嘗以無像之福求其無所依之量曾無𮈔忽之差非有神見蓋嘗以事觀之也使有人焉外乏口體之奉內嬰疾苦而無所告者其福量自不足以周一身也或啼飢號寒猶未已而禍辱駢集至若雞犬不得寧者其福量不足以周一家也且福備乎已則身安福備乎衆則家齊以至為國為天下靡不本乎福也世之昧者不責己之福量有所不周而怨人之不我順猶聵者咎聲之不及乎耳何愚之甚哉惟智者與世浮沉而不加嗟怨有以見其福量之大小不能加損也道體本具慧福修成慧臻則本具之道益明福會則本具之道益著苟慧福俱失則本具之道隱矣有謂古人天真淳全而易化所以法席隨處鼎盛今人澆漓而難化所以在處衰微余曰不然衆生情竇一鑿則是是非非之見自二千年外交接逮今無一時非憎愛也今之人即古之人古人之憎愛即今人之憎愛了無毫髮損益也古時法席鼎盛舉無敗事蓋主法者之福臻緣備有所感焉非天真淳全而易化也今時動遭魔孽以致衰微不振蓋主法者福緣有所不逮非澆漓而難化也何以知其然且今日之衰歇在古亦有之古時之昌盛在今亦有之豈人情之易遷實福緣之所繫也竊嘗謂治不因明亂不因昏何則明不自明由福盛以資其明昏不自昏由福衰以致其昏人徒知因明而治而不知資其明者福也由昏而亂而不知致其昏者亦福也福之盛衰而治亂繫焉福乎蓋一定于前業在今日不可苟也自祖道之東其道大德備之士具載典籍斑斑可考而身嬰竒禍者有之退臥荒隴者有之無聞於世者有之方應世而出奪於多事不及伸其道者亦有之逮尊居丈室萬指繞圍如優曇出現光明煒燁照映今古者千萬人中一二人爾所得之道無異也惟福有等差而盛衰之迹不同耳故雪山大士稱兩足尊良有以焉然而福拘前業報盡還無道人正不足恃也昔典牛以䇿禪師福不逮慧而憂䇿曰學者惟恐己眼不明己眼若明雖獨對聖僧喫飯又何慊焉典牛頷之噫能眇視報緣而獨尊道眼者䇿公其人也盛衰之迹何足浼焉世稱叢林者蓋取喻於草木也法道之所寄材器之所從出焉然草木培植則豐沾濡則榮霜雪則雕斧斤則敗叢林以無上大道為培植以慈悲喜捨為沾濡以偷安利養為霜雪以貪欲瞋恚為斧斤主叢林者不諳其培植之道沾濡之理則草木病矣况偷安利養之霜雪貪欲瞋恚之斧斤時時斫伐而殞穫之故其草木區萌芽蘖猶不暇而欲望叢林之盛材器之萃難矣哉吾叢林揖讓升降之謂禮鞭笞擯辱之謂法古之人欲行所得之道必以禮法輔之而道行焉禮者防於未然法者治於已然其或道之所存豈必待禮而後正法而後從哉然叢林用禮法猶國家之用兵蓋不得已也特假此以規正學者之心術與其儀範耳儻不本之以至道而膠於禮法者則禮出乎虛詐法近乎仇敵虛詐易忘仇敵生變禮忘法變併其心術亦大壞矣儀範云乎哉學道須具足五種正信第一要信自己方寸心中一箇喜怒哀樂底主人翁覿體與三世諸佛不欠一毫髮苐二要信從無量劫來與聲色愛憎染習流注結成一種生死無常於四大身中念念遷流新新不住第三要信古人垂慈留下一言半句如倚天長劒等間拶透端的會斷人命根第四要信日用工夫但恐不做做之不已念念精專決有透脫之期第五要信生死無常不是小事若不奮決定志以期獨脫其三途苦趣曾無自免之方也有三法為進道之捷徑一智眼明二理性通三志堅固智眼明則照破世間身心現量境界一切是非憎愛取舍得失貧富壽夭苦樂等法皆是夢緣了無實義而不起分別理性通則於從上佛祖所説語言名相至於三教聖賢諸子百家差別法要會歸一源不生異見志堅固則從今日至未來際不問近遠若不徹證決定不休此三法具一而缺二三只成箇無事漢具二而缺一三只成箇伶俐漢具三而缺一二只成箇擔板漢當知此道如涉千里之修途若具一二而缺三是由九百里而止者具一三而缺二終不免其岐泣具二三而缺一吾知其觸途成滯必矣三法全具雖未動足敢保其與已到家者不相異也豈待其重問迷津而再搖鞭影乎兄弟家千生萬受做盡伎倆終不奈何者蓋為其不曾發起真心而然也夫真心者觸境便有不待思惟分別者是也譬如聞人惡罵聲才入耳瞋心忿然當下身心境界見聞知覺皆瞋也至於忘餐廢寢形於夢寐乃至結冤懷恨終身不能暫忘瞋乎八萬塵勞之一塵耳一塵既爾諸塵皆然互相涉入鈎鎖連環結成生死流入無窮學道要了箇事須是聞人説著生死二字便如聞人惡罵相似更不待牽經引教作意思惟憤憤于懷推托不去如不頓悟死亦不休操志如此何大事之不了耶所謂禪者非玄學非奇解非密授非祕傳是衆生本有之性元是諸佛所證之三昧若欲契悟切須實的以生死無常四字是萬劫未了底最大因緣若不就此一生和盤轉盡未來際應無了期如是發心更無異見久久心念絶伎倆忘驀忽一方知生死無常即是禪之骨髓禪即是生死無常之眼目然後禪與生死骨髓眼目亦皆剗除便見咳唾掉臂總是祖師西來意也自然頭頭上明物物上顯方知果然不是玄妙祕密也你若實不為生死無常而欲務禪者則與西天九十六種人略不少異矣佛祖之道在凡夫分上了不加損其毫髮如鏡照鏡如水入水且凡夫終於自昧而不能照燭者病在於迷耳所迷者何蓋久遠劫來一𫨻心光動為妄習所蔽而不自覺當知此迷不特迷於四大六情等乃至讀書為書迷聽教為教迷坐禪為禪迷持律為律迷習定為定迷極至悟為悟迷證為證迷成佛為佛迷總而言之但有所為皆心光之影事苟未能遣此心於量外空有作於機先任伊遍將佛祖玄奧浸漬入骨欲脫此迷不翅掩耳大呌求人不聞未知其可也於是前輩真有志於此道者其委形骸忘寢食泯是非絶憎愛皆不期然而然蓋胸中有大於此者一旦迷妄頓消開豁顯露通身如倚天長劒八面受敵曾無虧損是豈偶然者哉道無方行者莫能至道無形視者莫能覩道無為作者莫能成道無機智者莫能測自三教九流百氏諸子凡啓口措辭靡有不言道者使其道果如是則孰能有之耶明白之士向這裏直捷根源不妨奇特古之善造道者如臨濟之於黃檗凡問佛法大意惟遭棒而已棒外了無言説又如慈明之扣汾陽惟譏訶戲笑而已初不聞有所謂向上機末後句之説然後於此無義路中久久淹浸其胸中欲決未決之疑一旦活脫直下如鵬摶虎踞電掣霆轟吐詞出令或如蠱毒之不可沾脣或如鐵壁之不容措足或若行空之月處處分輝或若過樹之風塵塵絶迹乃至四稜塌地一種平常凡咳唾掉臂未嘗不與斯道吻然混合已而造其堂奧出其門牆之士一箇箇拔塵絶俗出萃離倫闊步大方目視雲漢雖佛祖聖賢亦無意與之俱誰肯俯就聲名利養五欲恩愛諸塵勞境受其籠絡者哉且前輩負如是體裁非有過人之異見亦非有蓋世之奇術一皆為道之念炳然譬如火聚使冰霜望影而消亦如風輪使塵埃迎刃而走但為道之念堅密一分彼情妄之業自然消殞一分吾向道之念無間則彼所謂情妄顛倒愛憎等念猶遇風之塵近火之雪不自知而遣矣豈惟情妄然至于聖道亦不可得而入此名無功用三昧此三昧中生死涅槃俱無地可寄今之人未嘗不在三昧中蓋其向道之念不真不切動遭情妄結縛於能所之場愈會佛法則愈增業識愈明道理則愈長無明復為此知見風扇入輪回海中甘受流轉豈有志之士合如是哉譬如盲人經涉寶所為珍寶所傷終於委棄者無以異也學道先具信根以精進力乘之未見有不成就者然信根如輕舟精進力如櫓棹信根如駿馬精進力如鞭策蓋櫓棹加於輕舟水無順逆之異駿馬乘其鞭策路無夷險之差今之具信根者未嘗不有而求其精進力首尾一貫者誠難其人殊不知精進日廢怠惰日滋以浮淺之信根當無窮之怠惰雖有聖道易如展掌知其不相應者必矣而况積劫輪回種子與心識念念遷流了不之間使純一精勤猶恐不徹今任情放逸而罔其進可乎不可乎古人信道篤見理明操心密立志遠於所學處雖百折銼不能少回其意不惟不回其意即其折銼皆磨淬其志力之方蓋速其成就之理也由是觀之則境緣豈有順逆之實惟在吾進道之心真不真耳或進道之心真切雖家庭即方外逆奪皆順與也前輩之深入堂奧者未有不自艱難辛苦中來思之佛祖之道不可謂之易知易則使人生怠不可謂之難解難則使人起惑且難易在人不在道也譬如千里修途若駕輕車乘駿駟指日可到若附羸牛之尾跛鱉之足雖纍日窮年不能至矣然所涉之途非以車馬而近非以牛鱉而遠實係乎遲速之自異耳儻不知自遲自速之為難易者則前所謂怠之與惑不入於彼則入於此矣以根信觀之則利者多怠鈍者多惑使利者不困於怠鈍者不病於惑則可以並馳而共進既進矣亦何有於難易怠惑遲速利鈍哉此道最直捷極簡徑你若起心動念要討箇直捷簡徑底早是不直不簡了也那更於語言文字上作計摶量向情塵機境中任情取舍不惟不直捷不簡徑返不如箇不學道底人喫飯著衣外却無許多枝葉當知佛祖皆是具真正體裁千生百劫於此道上徹證底蘊至一念休歇處萬境平沉時方知直捷簡徑不從人得豈苟然哉所以古者道雖然舊閣間田地一度贏來方始休大火聚猶能出沒露刃劒尚可撮拏此一著子未舉念間早已十萬八千了也而况情塵瞥起念慮潛興縱具不可思議辨才説得轉轆轆地無異栽荊棘於生死之林潑穢濁於輪回之海本色上士安肯如此顛倒錯亂當知古人不得已拈起一毛頭必欲與人直捷斬斷以其不遇斯人轉作葛藤枝蔓焉有已哉焉有已哉少林謂心如墻壁乃可入道六祖謂汝但善惡都莫思量自然得入心體德山謂汝但於心無事無事於心自然虛而靈寂而妙死心謂節儉放下最為入道捷徑前輩一種是垂手為人奈何老婆太過成途轍如今要一箇墮此途轍者亦為罕有而况於此途轍之外具大受用者其可得哉彼既丈夫我寧不爾你若苟存一念以時緣不古恐難於趣入非自畫而何麻三斤乾屎橛須彌山柏樹子如太阿鋒等間拋向面前使萬劫死生當下勦絶然後欲覔其用處盡十方世界風休雲靜了無蹤迹可尋是謂法王法印理合如斯其不相委悉者惟向道理上蹲坐論有論無立知立解如人以手撮摩虛空不惟無益返有害之豈真正為生死大事者甘施於此耶道人日用現前境界皆前業也虛幻也無間斷也純真一如離異致也如是觀者則能空榮辱泯是非於萬緣膠擾之頃也不爾則生死無常相續於盡未來際卒莫之休息也學者營營終日何所圖而不爾思更欲瞥起一念與世分別非所謂道人也若以前業觀目前則一毫無你回避處若以虛幻觀目前則一毫無你取覔處若以無間斷觀目前則一毫無你舍離處若以純真一如觀目前則一毫無你揀擇處正與麼時觀照俱泯能所兩忘方是道人泯是非空榮辱越生死超夢幻底時節也三祖道才有是非紛然失心且生死是凡涅槃是聖其非凡是聖之見千重百匝鈎鎖連環無你軃避處直饒你拍盲向未有涅槃生死名字已前一坐坐斷然後將一條斷貫索向生死涅槃頂𩕳上一串穿却要脫他是非之見亦不翅鄭州出曹門當知此事苟非神悟妙圓超出不墮情見自餘縱使穿鑿得盛水不漏總是以是非止是非其失本心又豈待轉入第二念而已一事中於前一法解於後此天下古今對治之理也如坐臥忘其勞困飲食止其飢渴始中者勞困飢渴也終解者坐臥飲食也然勞困飢渴有時而盡則坐臥飲食無有去念之時也因其不去念習成逸欲至於敗德喪志廢道滅身無所不至矣人但知所中之為害而不知解其所中者亦害也細而推之當所中時皆知為害不容其深入故思解之當解之之時不知為害狎而玩之與之俱化其入體也至深其為害也至酷及乎覺知不亦遲矣何則譬如隆暑火塵撲面灑汗如流必思以風露解之適當風迎露之際盡其快爽不忍棄去久之隂風濕露砭入肌骨輕為拘攣重為癱瘓區區欲解一時之煩而抱膏肓畢世之疾反不知為害者多矣所以從上聖賢怪而愍之教化所由生也人能達此可以知道世有傭奴為主所使勞形竭力不敢自怠少有過隙則怒罵鞭笞靡所不至未嘗厭離何其忘瞋怨之若是耶無他為利養所攝而然也儻加瞋怨則主將見逐必失利養所以為利養而忘瞋怨也學道之士少為境緣所觸便生退惰然以利配道霄壤不侔何求利之切而求道之略耶當悟此以自勉儒典有謂天將降大任於是人也必先苦其心志勞其筋骨餓其體膚况無上大菩提道又豈特大任而已哉西竺聖人積劫舍身為求道果聚骨如須彌飲乳如大海竟莫知幾形命矣乃有我不愛身命但惜無上道之語焉嗟今置身空寂之地者例以學道為名逮觀其所由惟未飢而餐未倦而寢百種受用任意所需或不隨情怨嗟交作聞勤苦精進則掩耳退縮天下安有不為而成不種而穫者哉思前輩雖負大根器每於未悟未徹之頃凡執爨負舂陸沉賤役尚不敢憚其勞苦我曹何人而敢縱逸無檢昔管仲戒齊君曰宴安鴆毒不可懷也彼為國君富貴宴安乃其常分尚不許其狎玩况吾徒痛念死生大事毀形易服如救頭然之不暇宴安其可恃乎然管仲之言鴆毒止不過害一生之色身也吾徒之謂鴆毒乃害萬劫之慧命也較利害又何如哉念誦謂大衆當勤精進如救頭然一種是譬喻其深切著明痛快極則莫有過於此者夫置火於頭雖大飢遇食或不先去頭上之火將亦不暇食矣雖至倦欲寢或不先去頭上之火則孰能安而寢之夫寢食乃切己之事以頭然未救雖欲就之終不可得也或欲放逸於未救頭然之隙雖聖賢如佛祖知其亦有所不能也使救頭然之精進一存乎念當下身心如堅兵嚴城凛然不可犯則生死業識情妄顛倒政不待遣而聲為之沉迹為之掃矣今在處叢林之綱維每遇月八日未嘗不儼臨大衆厲聲舉揚而聽者若𥘿人視越人之肥瘠亦猶土偶聞俳優之鼓吹不惟不能奮發其精進反惡聞惡見莫若無事之為快也嗚呼人心荒怠一至於此使百丈復生如其人何如其人何校訛四十四葉第二行始誤作知從南改正音釋怫音弗違也艴蒲沒切怒也蔑莫結切無也撓女巧切擾也窒陟栗切塞也綆古杏切汲井索也聵五怪切聾也孽魚列切妖孽也蘖魚列切肄生曰蘖拶子括切逼拶也剗楚限切削也稜盧登切淬取內切與焠同燒而內水中以堅之也跛補火切足偏廢也蔓音萬滋蔓也勦子小切絶也軃丁果切與躲同𩕳奴頂切頂也砭陂驗切以石刺病也攣閭員切手足拘攣也癱瘓癱他干瘓他短

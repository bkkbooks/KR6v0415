body:
  text: 參學門人北庭臣僧慈寂上進偈頌幻住菴歌幻住菴中藏幻質諸幻因緣皆幻入幻衣幻食資幻命幻覺幻禪消幻識六窗含𮖐幻法界幻有幻空依幻立幻住主人行復坐靜看幻華生幻果放還𭣣控勒幻繩騎幻牛時或住八萬幻塵俱捏聚時或眠一覺幻夢居四禪有時動幻海波幻山聳有時靜幻化光中消幻影可中時有幻菩薩來扣幻人詢幻法我幻汝幻幻無端幻生幻死幻涅槃淨名室內龜毛拂龍女掌中泥彈丸更有一則幻公案幻證幻修須了辦莫言了辦幻云無只此無無名亦幻學人未達真幻輪動輒身心自相反幻心瞥爾生幻魔幻翳忽然遮幻眼陽焰空華乾闥城天堂地獄菩提名有問此幻從何起雲月溪山自相委要見菴中幻主人認著依前還不是十二時歌玉兔走金烏飛百年影子空相追山翁兀坐禪牀角使得人間十二時半夜子震旦竺乾無彼此五白華貍呌一聲牀頭老鼠偷心死雞鳴丑僕僕起來伸兩手趂忙捉起赤斑蛇到頭却是生苕平旦寅眼空佛祖絶踈親斷送渾家窮性命一條白棒血淋淋日出卯獲得輪王如意寶散在春風百草頭三世十方何處討食時辰大開兩眼喪天真笑擎一鉢和羅飯十字街頭等箇人禺中巳赤腳波斯穿閙市滿把驪珠撒向人醉倒玉樓扶不起日中午倒跨南山焦尾虎驚動溪邊石丈人一槌撾破虛空鼓日昳未也解隨羣并逐隊橫拈鐵笛向西風嗚嗚吹起斜陽外晡時申恣縱五欲生貪瞋竈前不見破木杓惡口小家冤四鄰日入酉擘破面門呈拙醜選甚魔來與佛來一喝直教顛倒走黃昏戌那事一時都打失撲滅空王殿裏燈且喜眼前烏漆漆人定亥淨裸裸兮赤灑灑取性長伸兩腳眠誰管桑田變滄海與麼去好好好爭免全身墮荒草有人更擬問如何彌勒下生時却向你道道要歌本色道人無孔竅不必問渠重覔要口門未待鬼擘開機先已被虛空笑古今多少明眼人不怕羞慚惟絶呌強言一句有三玄又道一玄具三要從前公案既現成今日殷勤添草料第一要踏著麻繩兩頭𠿕波斯疑是赤斑蛇白日青天把燈照第二要金剛眼上蝦蟆跳一槌擊碎獻空王元來却是新羅鷂第三要尉斗煎茶不同銚普賢失却白象王十地面前來討珓此語諸方耳共聞總解移腔并轉調直饒伎倆現盡時愈失自家真道要休將識量立踈親肯信靈源無老少毗婆尸佛早留心直至如今不得妙皮袋子歌并引幻人枯坐次有皮袋子者見訪乃曰人以我具六用之根於順逆愛憎起諸倒見沒溺於生死海中莫之能脫而我嘗返思三世佛祖咸以我為成無上道之具今不知果為惡耶果為善耶果能聖耶果能凡耶幻人乃歌以答之皮袋子佇聽幻人歌目前法界名娑婆華言堪忍誰奈何浩浩湯湯搖世波百千皮袋暗消磨良由一念不肯瞥無明愛見相交羅今日瞋明日喜朝榮暮辱何曾已幾回銜鐵并負鞍幾度腰金并衣紫窮也是皮袋富也是皮袋等屬隂陽相管帶忽然報盡共沉空夢裏何勞生捏怪人亦是皮袋獸亦是皮袋宰割烹炮誇手快昔相負兮今相償自買依前還自賣娘生皮袋不堅牢寒暑迭遷成又壞脆如泡薄如雲幻如陽焰輕若游塵倐忽起滅幾萬古積骨如山難比倫大皮袋小皮袋幾人嫌幾人愛嫌者為因貧病攻愛者多緣身自在皮袋子教你知通身是假盡世成非了知名業質委棄為死尸四大蚖蛇同處一篋壞空成住變滅無時因甚時人不解事盡情放出貪瞋癡上天入地巧中巧暮寢晨興迷外迷朝飯飽午還飢熱搖扇冷添衣百計惟思巧護持偶乖調攝遍界求醫禱鬼祈神無感應客杯弓影生蛇疑男須婚女還嫁換面改頭呈矯詐忽然觸動利名心地獄現前都不怕只算一期圖快心肯信鐵圍無縫𦉑誇文章說道理三教勝流誰不爾一朝學問夢魂消依舊打歸皮袋裏皮袋聽余真實說舉心盡屬輪回業不思皮袋本來空茫茫弄巧成拙莫多知莫多會但有施為都拽退不須禮拜與散華只此是名真懺悔不思善不思惡兩種由來皆妄作不緣凡不緣聖聖凡盡是心王病不著悟不著迷迷悟何曾離有為不貪生不畏死定業從教起還止皮袋子空勞勞披毛帶角要做便做成佛作祖道高不高四聖六凡體元具十方世界目前包皮袋無情無喜怒頭頭盡是無生路但於見處不留情法王大寶親分付如來獲得意生身皮袋何曾隔一塵你若區分成兩箇笑倒靈山會裏人警策歌三界塵勞如海闊無古無今閙聒聒盡向自家心念生一念不生都解脫既由自己有何難做佛無勞一指彈此念即今拋不落𣱵劫鑽頭入閙籃名何名利何利一息不來成鬼戲愛何愛憎何憎惹著毫毛是火坑既無人還沒我你見空華曾結果休辨是莫論非大夢無根總自迷生死無常繫雙足莫待這回重瞑目身一抹過太虛展開自己無生國有何難有何易只貴男兒有真志志真道力自堅強力強進道如遊戲有何熟有何生是路何愁不可行拌得一條窮性命刀山劒嶺也須登亦無鈍亦無利剔起眉毛休瞌睡不破疑團誓不休寒暄寢食從教廢亦無閙亦無閒靜閙閒忙總不干如一人與萬人敵覿面那容眨眼看大丈夫宜自决莫只隨情順生滅今日不休何日休今朝不歇何朝歇况是叢林正下秋千門萬戶冷湫湫參禪必待尋師友敢保工夫一世休師禮自心師友結自心友除却自心都莫守縱饒達磨與釋迦擬親早是成窠臼自己叢林到處興誰分村墅與州城脊梁三尺純鋼鑄肯聽堂前打板聲行也做坐也做尺寸光隂休放過心存少見失真誠意涉多緣成怠惰有般漢更呆癡文章今古要兼知參禪設使無靈驗也解人前動口皮口皮動得有何好聰明只是添煩惱腳跟生死如未休千里萬里沉荒草穿馬腹入牛胎塗炭曾經幾度來此生幸作金仙子莫把繩頭易放開生同生死同死萬年一念常如是胸中能所兩俱忘境寂心空無彼此蹉口咬破鐵蒺藜傑出叢林也太竒休將萬里西來意黃葉空拳嚇小兒德山棒臨濟喝儘有神機都潑撒一千七百爛葛藤不勞動手和根拔心空及第真衲僧堪傳佛祖不傳燈照世光明只這是立地頂天誰不能到此時盡由我混衆獨居無不可團團一顆如意珠覺知聞見全包𮖐也無禪也無道也無解脫并煩惱三界明明大脫空凡聖悟迷何處討盡是從前眼自華然雖到此勿矜誇法塵見刺擺不脫舉足玄途鮮不差我語忉忉非眩惑志在同參相警策五湖四海抱禪人若未到家無自畫即心菴歌并引雲南福元通三上人遠逾萬里訪余窮山坐夏未了欲歸故鄉結菴為禪居以圖究明己事預乞為菴立名余以即心二字示之蓋大梅常和尚參馬祖聞即心是佛一住空山誓不再出既有志於住菴當追古風以繼芳躅庶幾吾道之有望也乃為之歌曰菴即心兮心即菴十方世界無同參靈山四十九年說舌頭拖地空喃喃却笑少林言直指已是白雲千萬里未形言處鐵渾侖才掛口門都不是三箇道人歸故鄉秋江萬里秋風凉誅茅就樹縛間屋即心二字懸高梁心不自心安用即心即即心誰辨的百億日月繞四櫩光射銀山穿鐵壁一菴內外赤條條拈來總是心王苗龜毛束破混沌蒲團壓折虛空腰雲南即是西峯頂兩頭踏斷俱非境你若無端喚作心依舊隨人認光影見地不脫還茫然己眼不透成虛捐只消豎起生鐵脊不拘歲月勤加鞭待伊咬得即心破是佛是魔俱按過等閒豎起箇拳頭住菴活計天然大翠巖杭上人省師靈巖萬法無根那伽非定擘開生鐵枷躍出琉璃穽杖頭挑起吳中第一峯腳跟踏斷洪崖千尺井古靈背上血淋漓良駒豈待搖鞭影君不見杭之東海潮推出玉萬丈雷奔電激晴空不是境且非禪才擬議路八千男子丈夫活鱍鱍肯受他家強塗抹好兒既不使爺錢草鞋跟底乾坤闊等閒失腳跨一步萬象森羅連底脫那時赤手走歸來好把虎鬚顛倒捋寄實西堂金鰲背上珠一顆爍破淮山青朵朵百衆人前玩弄時圓機錯落飛星火朅來照我青茅屋隱顯回旋看不足夜深轉碧玉盤直射斗牛光奪目胸中痛恨山頭老向曾奪我靈蛇寶無端落在他手中拋墮深崖瘞荒草鐵蛇入海今其死抖擻空囊有些子覿體分明不一同髣佛依俙頗相似叢林日午打三更堂堂祖道皆縱橫何當傾出一栲栳免使男兒摸壁行恭上人靈山有一機少林有一語幻住不覆藏明明為君舉那一機金烏啄破青玻瓈那一語玉兔踏紅馬乳慶雲上人知不知死生大事非兒嬉猛著精神拌命拶掃空情解捐階梯忽然失手柄脫屋頭有路如天闊步兮趨兮露堂堂進兮退兮活鱍鱍始知靈山一機狀如鐵牛少林一語不在舌頭生擒活捉兮奔雷走電高揮大抹兮倒嶽傾湫君不見黃龍古洞深無底山鬼吸乾金井水鞭起泥蛇飛上天回首白雲千萬里戒上人遊江淮拄杖頭邊草鞋跟底踏倒萬疊淮山穿過千重江水秋風八九月白雲千萬里髑髏堆裏葛藤樁窣堵波前暗號子會不會星明日麗照雙眸知不知石裂崖崩喧兩耳有佛處不得住毳袍滴瀝松露寒無佛處急走過古路岧嶤淨如洗已躬下事總在目前向上一機道委不委諸方門戶盡敲開究竟何曾離這裏珙藏主化藏經然一指破一微塵出大千經不撥自轉通身眼睛明明字與義山河及大地歷歷文與科萬象自森羅三界楊真旨古今曾未已白馬胡為來何其十萬里為憐半偈舍全身何當灰燼娘生指談笑推開大施門毗盧藏海波濤起但看煙霧濕溪藤拂拂香風動屏几琳琅數百函縱橫千萬紙謂是一大藏金剛腦後鐵三斤謂非一大藏碧眼胡僧穿兩耳萬疊湖山擁翠雲渺渺湖光淨如洗為君併作經上題以字不成八字不是寄此道監寺此道自來無改變城市山林總成現上而諸佛下衆生阿那箇人曾少缺遠經曠劫至目前今古何嘗隔𮈔線聲前不解便承當更為從頭歌一遍靈山密付絶踈親少室單傳無背面離陶鎔非煆煉一法何須分頓漸若於語默未忘情經書謾讀三千卷如過駒等流電德山屋裏販揚州臨濟堂前開飯店聞無聞見無見楊岐倒跨三腳驢鹽官強索犀牛扇誰言佛法今下衰此道依前有靈驗滿眼滿耳非覆藏自是當人不能薦緬思張公洞裏老杜多活捉生擒如虎健死關既掩氣猶高彼此男兒宜自勸黑漆桶底如未穿幻影浮光休慕戀始終不放話頭寬何患工夫弗成片五蘊身中大脫空不用棄離并健羡有何貴有何賤鴦掘持刃惡不惡羅睺沉空善非善境逢逆順謾依違緣遭憎愛無欣厭古廟香爐一條白練胸中寸寸結冰霜消落聖凡諸妄念始知萬法本空間自心未了徒攀援等間瞥轉目前機此時方愜平生願涅槃謾說安如山生死從教急如箭十方世界鐵渾侖觸著通身是方便拔出繫驢橛拈却吹毛劒打開荊𣗥林直入空王殿若教除却此道時更喚誰為親法眷送吉上人之江西下高峯和尚遺書寒巖一夜風雷惡師子迸斷黃金索驊騮萬里追不回聲沉宇宙空山嶽君今去去持此音十八灘頭探麟角君不見馬師一口吸西江波騰浪沸煙茫茫又不見集雲峯下四藤條雨洗風磨恨未消生耶死耶俱不道鐵壁銀山齊靠倒有問禪血染溪華春正妍有問道兩岸夕陽對芳草千差萬別任縱橫瞥轉一機何處討玄沙白紙脫或舉似時更須莫謗西峯好別絶際伊余十載交情懷若冰檗一處最親千機莫測燒尾紅鱗躍九淵鐵脊金毛走深澤神駒十影謾追風眨得眼來天地隔君不見長沙岑大蟲訇訇一嘯爪牙直凛凛崖谷生隂風又不見溈山水牯牛山北山南水草足掣斷鼻繩誰敢𭣣我亦非牛子非虎休將爾汝論今古明朝拄杖各西東男兒豈肯埋塵土何當橫擔片板抹過那邊更那邊拈一毫頭吞四海吸百川興雲致雨生風煙始知造化只此是慶快何止三十年開爐日示祖上人祖道迢迢祖風寥寥祖師心印七花八裂祖翁活計瓦解冰消林下相逢祖禪者為言祖意何蕭條尚有祖關崛起千七百丈高何當一拶百雜碎從他大地空牢牢風雨閉門十月朝死灰撥盡相向無聊祖堂氣焰不炙手祖庭積雪空齊腰爭如自斫一把青榾柮靜對祖燈深夜燒坐禪針并序夫非禪不坐非坐不禪惟禪惟坐而坐而禪禪即坐之異名坐乃禪之別稱蓋一念不動為坐萬法歸源為禪或云戒定是坐義智慧即禪義非情妄之可詮豈動靜之能間故知不離四威儀而不即四威儀也乃為作針針曰參禪貴要明死生死生不了徒營營至理不存元字腳有何所說為針銘或謂參禪須打坐孤硬脊梁如鐵作如一人與萬人敵散亂昏沉休放過或謂參禪不須坐動靜何曾有兩箇楊岐十載打塵勞險絶祖關俱透過坐而不坐心外馳摩裩擦袴空勞疲釘樁搖櫓消白日心空及第知何時不坐而坐志還切寸懷鯁鯁難教撇說到無常與死生眼中不覺流鮮血如是坐如是禪不勞直指與單傳寬著肚皮只麼守誰管人間三十年如是禪如是坐蒲團七箇從教破拍盲志氣無轉移肯把身心沉懶惰禪即是坐坐即禪是一是二俱棄捐話頭一箇把教定休將識鑿并情穿坐禪只要坐得心念死今日明朝只如此若是真誠大丈夫一踏直教親到底坐禪不怕坐得多百歲光隂一剎那老爺喫乳如大海為要掃空生死魔坐禪豈可為容易莫把聰明遮智慧千七百則爛葛藤何用將心求解會坐到坐忘禪亦空吐詞凌滅少林宗只箇渾身也拈却未待口開心已通有志坐禪須與麼若不如斯成懡㦬更拌性命也嫌遲大事因緣非小可擬將此作坐禪針不特自欺還謗我校訛三十五葉十二行逆順南作順逆三十七葉第七行蓋誤作盡從南改正音釋裸郎可切𠿕丘召切銚徒弔切燒器聒公活切瞌克盍切呆五來切癡擺補買切撥也抖擻抖音斗擻音叟抖擻振舉貌栲栳栲音考栳音老栲栳柳器訇呼宏切大聲榾柮榾音骨柮當沒切榾柮木頭也擦七曷切摩也擎普滅切拌鋪官切

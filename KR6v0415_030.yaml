body:
  text: 參學門人北庭臣僧慈寂上進偈頌擬古德十可行宴坐竟日巍然萬慮忘脊梁節節是純鋼待教七箇蒲團破却與空生較短長入室鏌鎁橫按碧油幢叱吒神威孰敢當若是定乾坤好手到來那肯犯鋒鋩普請我扣華鯨汝便來區區運水及搬柴為憐逐隊隨羣者伸手從人覓草鞋粥飯兩度煩他展鉢盂舌頭誰不辨精粗醍醐毒藥渾休問粒米還曾咬著無洗衣通身脫下笑擡眸一片雲霞浸碧流久雨不晴難曬朗從教張在屋簷頭掃地蕩盡從前垃圾堆依然滿地是塵埃等間和柄都拋却五葉曇華帚上開經行當胸義手去還來多少闍黎踏破鞋金地繞旋知幾匝老僧一步不曾擡諷經薩怛他了悉度提浩浩潮音播口皮清磬一聲齊側耳子規啼血染華枝禮拜紫金足下寶華壇多少人來展布單既自倒時還自起不知誰覺腦門寒道話團團相聚火爐頭商略溈山水牯牛一語忽投人拍手滿天霜月下西樓示妙上人五首捩轉面門爺不識瞪開眼孔佛難親一條性命先拌却要做心空及第人參禪渾似咬生鐵齒破脣枯未肯休力盡忽然和口破舌頭拖地始風流三條椽下睡魔窟七尺單前散亂坑笑倒憍陳如上座驢年將會快平生工夫切勿墮空間念念拌身透祖關一剎那間成斷滅依前鐵壁又銀山上人忒殺不留情和我先師共箇名何似也吹無孔笛教他千里外聞聲寄玄鑑首座四首妄談般若罪無涯項上先擔生鐵枷清淨法身膿滴滴令人追憶老玄沙十萬八千家未遠六根四大病何多撥開眼裏瞳人看當體潛消佛與魔叢林衰替不堪憑少室兒孫沒路行肚裏有禪須吐却莫留毫髮誤平生山中無路不須來病足難禁著草鞋寸步未離言見了如何真箇到忘懷無隱眼見耳聞元不隔晝明夜暗絶商量本來成現何多事切忌當機自覆藏古田七佛如來陳佃戶五千餘卷舊砧基稻華香熟黃雲老多少兒孫自不知偶成十首簷頭密布蜘蛛網砌下高堆曲蟺泥達磨眼睛渾不顧尋常讀作一聮詩秋雲片片秋空闊秋葉沉沉秋雨寒林下野人難曬朗眉毛終日不曾乾五色花貍與赤斑南泉拭眼動慈顏太阿斬斷虛空骨白血橫流滿雪山青鞋布襪道人家兩眼何曾肯著華飯裏忽逢砂一粒無端彈破半邊牙眼前何是復何非好把龜毛一貫之撞著燈籠穿不透是非築殺老闍黎睡到五更無箇夢籬根壁底亂蛩吟夜來拾得鐵酸餡撇在牀頭鼠不侵起引來勾要到官吏曹磨勘事多端誰云欵出囚人口得箇驢兒便喜歡宿雨洗空三伏暑曉風吹動一天秋四時遷謝承誰力疑殺溈山水牯牛一種秋砧幾樣聲為憐深夜最堪聽老婆腕力無多子斷續渾如搗不成挂帳不須尋閉日出行何用揀良時了知蚊蚋非他物家舍途中百事宜省菴一聲幽鳥到窗前白髮老僧驚晝眠走下竹牀開兩眼方知屋外有青天定叟為人散亂現威儀千劫渾如坐片時白日未曾輕動著西風吹白兩莖眉警世草二首多生業纍入胞胎合水和泥與麼來極目境緣遮道眼未知何處得忘懷舉心盡屬輪回業動念無非生死根要與太虛無向背常吞一箇鐵渾侖聰明盡解諸家語英俊橫吞四庫書這箇念頭如未瞥口開都是費分踈貧窮致賤富生驕等是無明火自燒倐忽報緣顛倒轉方知一點不相饒貪榮冒寵日匆匆行到窮途興轉濃半點便宜非外得無端虧殺主人公逆之則怒順之歡天下人情沒兩般肯信順窮還逆至眼開休把自心瞞夢眼未開重做夢青天白日黑漫漫靈臺幸是無遮蓋不識何緣轉自瞞四序循環暖復寒獼猴深戀六華村耳聲眼色曾無暇念念那知是死門把一片心迷得盡又於迷處起規模自纏自縛誇能所笑倒西天碧眼胡飢來喫飯冷添衣三尺之童也共知一箇話頭明歷歷如何開眼恣愚癡口喃喃地説青黃自謂高才壓當行話著主人公分上到頭一點不承當衰殘忽忽二毛斑鶴骨雞皮澀又酸老與病來呈伎倆笑他皮袋有多般業緣牽引入娑婆百歲光隂一剎那換面改頭無了當野田添得髑髏多髑髏未冷氣猶抽尚把青銅照兩眸將謂百年多少事徒增幻海一浮漚茶傾三奠復三奠一箇髑髏燒不乾業識又鑽皮袋去鐵人聞也骨毛寒火燒水浸與沙埋白骨曾經幾度來早不回光休歇去又如何要巧安排三百六十𫨻骨節東拄西撑竪又橫不做一回枯得盡又來行了又來行男兒不肯受人欺意氣英豪也大奇衣底有珠渾不顧萬般都是喫便宜一條大路如弦直開眼人人總現前彼此不知緣底事更無人肯賦歸田閻羅王是真彌勒向鑊湯中轉法輪輥到聖凡情盡處直教無法可相親愛網空虛欲海乾千門萬戶是司南塵塵與麼相親者方不謬稱除饉男生死且無僧與俗性真那有悟和迷伽陀寫寄同參者杜宇聲乾日又西音釋鏌鎁鏌音莫鎁音耶鏌鎁劒名吒陟駕丑亞二切咬五巧切齧也垃圾垃郎合切圾悉合切瞞謨官切元故天目山佛慈圓照廣慧禪師中峯和尚行録禪師諱明本號中峯杭之錢塘人俗姓孫母李氏夢無門開道者持燈籠至其家翌日遂生師神儀挺異具大人相才離襁褓便跏趺坐能言便歌讚梵唄凡嬉戲必為佛事九歲喪母讀論語孟子未終卷已輟學年十五決志出家禮佛然臂誓持五戒日課法華圓覺金剛諸經夜則常行困以首觸柱自警居近靈洞山時登山顛習禪定甫冠閲傳燈録至菴摩羅女問曼殊明知生是不生之理為甚麼却被生死之所流轉有疑已而沙門明山者指師往參天目高峯和尚妙公高峯孤峻嚴冷不假人辭色一見歡然欲為祝髮師以父命未許高峯曰可舉闍夜多尊者出家因緣喻汝父勿自沉溺未幾誦金剛般若經至荷擔如來處恍然開解由是內外典籍皆達其義趣而師自謂識量依通非悟也時年二十有四實至元丙戌歲也明年從高峯剃染於師子院又明年受具戒又明年觀流泉有省即詣高峯求證高峯打趂出既而民間訛傳官選童男女師因問曰忽有人來問和尚討童男女時如何高峯曰我但度竹篦子與他師言下洞然徹法源底陸沉衆中人無知者於是高峯書真讚付師曰我相不思議佛祖莫能視獨許不肖兒見得半邊鼻且俾參徒詣師請益衆由此知歸淮僧子證嘗問高峯諸弟子優劣高峯曰若初院主等一知半解不道全無如義首座固是根老竹其如七曲八曲惟本維那却是竿上林新篁他日成材未易量也壬辰松江瞿公霆發施田二百七十頃即山之蓮華峯建大覺正等禪寺元貞乙未冬十一月高峯將遷化以大覺屬師師辭推第一座祖雍主之大德丁酉師登皖山遊廬阜至金陵戊戌結菴廬州辨山學者輻湊師雖拒之而來者愈衆庚子結菴平江鴈蕩衆既夥遂成法席癸卯瞿公堅請師還住大覺師力辭避之時吳興趙公孟俯提舉江浙儒學叩師心要師為説防情復性之旨公後入翰林復遣問金剛般若大意師答以略義一卷公每見師所為文輒手書又畫師像以遺同參者乙巳師還山廬高峯丙午領師子院至大戊申仁宗皇帝在東宮賜號法慧禪師已而乞食勾吳因謝院事己酉道儀真即船以居庚戌衆請還山今兵部尚書鄭公雲翼時僉浙西廉訪司事候師餘杭問法師推明經世出世之學以答之詞見語録辛亥師復船居吳江陳子聰建順心菴請師開山既而渡江擬遊少林至汳隱其名僦城隅土屋以居僧俗爭相瞻禮皆手額曰江南古佛也皇慶壬子結菴廬州六安山江浙省丞相奉書訪問師去之東海州癸丑瞿公霆發以兩浙運使終師還弔其喪公之子時學奉宣政院疏復請師住大覺師舉首座永泰代己泰欲承嗣師師俾泰嗣開先一山萬公蓋以院易嗣其來久矣聞師之風者莫不多之丞相延師私第懇請住持靈隱禪寺師固辭中書平章又請曰師之道德孚於人者博矣宜順時緣住一剎以恢張佛祖建立之心無多讓也師曰夫住持者須具三種力庶不敗事三種力者一道力二緣力三智力道體也緣智用也有其體而闕其用尚可為之但化權不周事儀不備耳使道體既虧便神異無算雖緣與智亦奚為哉或體用并闕而冒焉居之曰因曰果寧無慊於中乎某無其實故不敢尸其名平章知師意堅弗敢強師辭以末疾還山中延祐丙辰春上命宣政院使整治釋教距杭期入山候謁師聞避之鎮江丁巳丹陽蔣均建大同菴延師居之戊午衆請還山九月上顧謂近臣曰朕聞天目山中峯和尚道行久矣纍欲召之來卿每謂其有疾不可戒道宜褒寵旌異之其賜號佛慈圓照廣慧禪師并錫金襴袈裟仍敕杭州路優禮外護俾安心禪寂改師子禪院為師子正宗禪寺詔翰林學士承旨趙公孟俯撰碑以賜特贈高峯和尚佛日普明廣濟禪師先是駙馬太尉瀋王王璋遣參軍洪鑰賫書幣敘弟子禮期請上命南來參叩己未秋九月王奉御香入山謁師草廬咨訣心要請師升座為衆普説師激揚提唱萬餘言王復求法名別號師名王以勝光號曰真際王因建亭師子巖下以記其事至治壬戌行宣政院虛徑山席強師主之師貽書院官卒不就結茅中佳山將終焉山北距西峯三十里重溪復澗穿徑崖險捫蘿薜冒豺虎緇白隨禮無虛日師愍其跋涉尋歸草廬十月英宗皇帝特旨降香并賜金襴僧伽梨詔行宣政院官親詣山宣諭恩意時江浙省右平章今丞相答剌罕脫歡公命理問官阿敦偕院官行乞師法語中書參知政事敬公儼亦嘗通書問法其為天子大臣所知遇蓋如此師每斥學者只尚言通不求實悟常曰今之參禪不靈驗者第一無古人真實志氣第二不把生死無常做一件大事第三拌捨積劫以來所習所重不下又不具久遠不退轉身心畢竟病在於何其實不識生死根本故也凡見學者輒問曰汝喚甚麼作生死或者茫然無所加對或者謂生不知來處死不知去處是生死師曰便饒知得去來然所知亦是生死又或指一念忽起是生一念忽滅是死師曰離一念起滅亦生死也是説皆枝葉耳非根本也夫根本者性真圓明本無生滅去來之相良由不覺瞥起妄心迷失本源虛受輪轉以故道迷之則生死始悟之則輪回息蓋根乎迷而本乎妄也當知山河大地明暗色空五隂四大至於動不動法皆是生死根本若不曾向真實法中脫然超悟更於悟外別立生涯不存窠臼豈堪向生死岸畔劄腳或纖毫不盡未免復為勝妙境緣惑在那邊起諸異想雖曰曉了其實未然惟有痛以生死大事為己重任者死盡偷心方堪湊泊直下儻存毫髮許善惡取捨愛憎斷續之見則枝葉生矣可不慎乎師之激勵後學皆此類癸亥春一日師自敘其出家始末曰六旬幻迹每見禪者作務則曰汝種𬞞欲為誰虀耶汝負舂欲為誰炊耶師蓋已有去世意至六月十五日折簡大用上座曰幻菴向秋決作離散計繼書屬門人幻者朝死夕化骨便送歸三若停龕祭奠諷經入祠做忌一切佛事不許徇世禮也復條示師子寺惟以放下節儉克究初心慎守開山明訓令法久住之意又遺誡門人其略曰佛法無汝會處生死無汝脫處汝喚甚麼作佛法任以百千聰明一一把他三乘十二分教千七百則陳爛葛藤百氏諸子從頭注解得盛水不漏總是門外打之繞説時似悟對境還迷此事向道無汝會處汝轉要會轉不相應莫見與麼説便擬別生知解直饒向千人萬人拶不入處別有生機總不出箇要會底妄念惟具大信根叩己躬下真參實悟乃能荷負若作荷負想依舊沒交涉當知衆生結習濃厚無汝奈何處汝若無力處衆只全身放下向半間草屋冷淡枯寂丐食鶉衣且圖自度亦免犯人苗稼作無慚人所以道佛法無汝會處生死無汝脫處既會不得又脫不得但向不得處一捱捱住亦莫問三十年二十年忽向不得處驀爾拶透始信余言不相誣矣越十日師示疾有來省者師曰幻住菴上漏旁穿籬坍壁倒不可久住也語笑如平時學者強師服藥師謝之曰青天白日曲徇人情耶揮去僧有告歸吳門者師曰何不過了八月十五日去至十三日手書遺別外護仍寫偈遺別法屬故舊十四日蚤作復寫偈辭衆曰我有一句分付大衆更問如何無本可據置筆安坐而逝停龕三日身體溫軟顏貌不少變有禪者乞剪爪髮供養誤傷指端血津津出如生時道俗數千人奉全身於寺西之望江石先是其年春涸凍山中大木皆摧折若世所謂木稼者識者異之至於歿之日白虹貫於山之顛師生宋景定四年歲癸亥十一月二日世壽六十有一僧臘三十有七初侍高峯于死關日作夜坐脅不沾席勵精勤苦咨訣無怠逾十年親承記莂退而藏晦以住山交聘避走南北所過輒成寶坊俗率自化海內學者望風信慕識與不識皆尊之曰大和尚家繪像而敬事焉其來瞻禮絡繹載道祁寒暑雨逮無虛日每填溢山寺至無以容其道德所被上自天子萬里延慕屢欲召至闕庭而卒莫之能致也王公大人北面事師而鄉道者傾動一世下逮屠沽負販優伶工伎廝輿暴悍之徒師一真慈相與隨宜説法未嘗以高下貴賤而尊易諂瀆之也得師半偈不啻重寶或藏師所剃髮輒産舍利有疑謗者一接言容無不遷善為師外護遠至西域北庭東夷南詔接踵來見南詔沙門素間教觀東來問法實自玄鑑始鑑嘗於師言下有省繼而普福等五比丘畫師像南歸至中慶城四衆迎像入城異光從像燭天萬目仰觀翹勤傾信由是興立禪宗奉師為南詔第一祖師之法量汪洋辨才無礙至於悲願誘掖諄諄誨諭戶屨日滿一無倦容故登師之門者如泛重溟不測涯涘如飲醇酎不覺醉悅及其勘辨學徒決擇心法無假借慎許可凛凛然如秋霜烈日嚴不少貸其為文信筆萬言了不經意而其辭必歸於警昏聵明宗旨闢義解顯正悟極於第一義諦而後已若夫立身唱道每視古德前言往行或有缺漏輒為歎息而師之行事則不蹈其失墜也故師之立言示訓非其素履而躬踐者則終其身不言也至於退恬逃名根于天性清苦自持尤矜細行大覺師子二寺由師克成及奉勑撰碑師不惟不肯涉分寸功并其名字亦不肯與於其間也隨所寓草創菴廬皆曰幻住又因以自號焉嘗隆暑病渴膚腠汗腐有遺細葛褻衣者受之終不衣也遊淮汳井汲艱遠遂終身不復頮浴聞説人過失則俯首不答凡傳記語涉攻訐毀訾則掩卷不觀僧有臥疾者則濟以湯藥而䇿其進道僧有省親者則施以財法而勉其孝養師嘗撰楞嚴徵心辨見或問一卷信心銘闢義解一卷山房夜話一卷幻住家訓一卷擬寒山詩一百首總題曰一華五葉復撰金剛般若略義一卷別傳覺心一卷東語西話一卷門人集師遺文曰東語西話續集二卷語録十卷別録十卷並傳于世師之自序略曰余初心出家志在草衣垢面習頭陀行以冒服田衣抱愧沒齒平昔懶退非矯世絶俗蓋以文字則失於學問參究則闕於悟明尋常為好事者之所稱道蓋報緣之偶然耳於戲師乘大悲願力為法檀度觀時適宜隨機應物如摩尼珠無有定色為未證得謂證得者説我無悟由為求名聞利養者韜晦巖谷為毀犯律儀者演毗尼法為滯前塵而溺多聞者闢知見海導以正悟為圓機者直示向上師皆以身先之而不事夫空言也然一心平等泯絶去來不留眹迹槩非常情所得而窺測也每念師出處言行或承之於家訓或見之於行事或徵諸老宿或質諸遺文謹敘次而録之然猶以景像求師者也其不可以景像求者又烏得而盡紀也耶泰定元年八月甲子法弟比丘祖順録大元勑賜智覺禪師法雲銘奎章閣學士院侍書學士翰林直學士中奉大夫知制誥同修國史兼經筵官臣虞集奉勑撰天目之山有師子巖高峯妙禪師居之設死關以辨決參學之士望崖而退者衆矣得一人曰本公是為中峯和尚師生有異徵為童兒嬉戲必為佛事稍長閲經教然指臂求佛甚切晝夜彌勵困則首觸柱以自警期必得乃已及入死關密叩心要誦金剛經至荷擔如來阿耨多羅三藐三菩提處恍然開解而師自謂所證未極勵精勤苦咨訣無怠及觀流泉乃大發明師亦閟而不聞自是説法示人縱橫該貫如千江一源奔注放溢莫之能禦纍千百言應問無礙隨其根器廣為策勵世推以為大辨焉高峯將戢化權遂書真讚屬諸師云我相不思議佛祖莫能視獨許不肖兒見得半邊鼻其授受不虛若此著書五篇曰山房夜話曰擬寒山詩曰楞嚴徵心辨見或問曰信心銘闢義解曰幻住家訓名曰一華五葉集復著金剛般若略義一卷別傳覺心一卷東語西話三卷語録十卷別録十卷盛傳于世仁宗皇帝聞而聘之不至製金紋伽梨衣賜之號之曰佛慈圓照廣慧禪師賜師子院名曰正宗禪寺英宗皇帝亦封香製衣即所居而修敬焉駙馬太尉瀋王王璋嘗使人從師問法意以為未足請於上親往見之既見搆亭巖前曰真際表得法也三藏法師沙津愛護持必刺牙室利遊方時亦嘗從師參詰翰林學士承旨趙公孟俯每受師書必焚香望拜與師書必自稱弟子行省丞相別不花行宣政院使張閭諸達官尤加敬服每徑山靈隱虛席必以待師師固不受乃已轉運使瞿霆發以大覺寺奉師亦不受師踰浙絶江渡淮泝汳至浮舟以居而避去之從之者如雲北極龍漠東涉三韓西域南詔之人遠出萬里之外莫不至焉所至結菴一名曰幻住信施金幣重寶交至一視之邈如也師相好魁碩見者讚歎皆畫像事之南詔人有奉其像歸者夜出神光燭天其土感悅遂篤信禪宗云時人為之語曰師乘大悲願力為法檀度觀時適宜隨機應物多諸方便如摩尼珠無有定色為未證得謂證得者説我無悟由為求名聞利養者韜晦巖谷為毀犯律儀者演毗尼法為妄認法塵以資狂解者導以正悟為圓機者直示向上師皆以身先之而不事夫空言也而師方自以為文字失於學問參究闕於悟明尋常為好事者所稱蓋報緣之偶然耳翩然為退休之計噫師之高邁過人遠甚而謙抑如此所以為不可及也師諱明本宋景定癸亥歲生錢塘姓孫氏年六十一僧臘三十七大元至治癸亥八月十四日化於其山東岡之草廬有訣別書偈誡門人勿行世俗禮而門人及遠近來弔者哭師哀甚聲動山谷遂奉全身葬于西岡之上而塔焉後七年天曆己巳正月甲子聖天子使翰林學士承旨領國子監事阿鄰帖睦耳召臣集至便殿命之若曰其賜諡與塔名而汝集為之銘俾其門人善達密的理刻之山中臣集再拜而言曰國家崇尚佛乘至矣而近日禪學之弊以覺識依通為悟明以穿鑿機緣傳授為參學以險怪奇語為提唱以破壞律儀為解脫以交結貴達夤緣據位為出世方便惟和尚傳佛心宗卓絶不倚弘闡玄猷痛斥禪病以救末法其高識遠見淳德實行法量汪洋辨才無礙東南一人而已請諡曰智覺禪師塔曰法雲銘曰巍巍楞伽上極無際大雄善喻著無上義達磨之東憂言多窮獨此不遺曰心之宗是故妙師高蹈天目右海左江以表遐矚師子巖巖置死為關孰當吾鋒有造無還惟幻住叟登中據最示則絶學無依無外千偈瀾夫豈好言昏蒙錮深抉提孔艱如彼淫疾勝邪並受有大醫王為出一手焫砭塗摩搗嚼鍊烹紛然百為因病以生疾除醫已言亦如是得本不迷何有一字悲願深弘智覺所惇受職度人鬱乎法雲法雲彌天有蔭斯溥協于皇風永填終古天曆二年八月日師子正宗禪寺當代住持臣僧了義建大元普應國師道行碑集賢直學士太中大夫兼經筵官兼國子祭酒宋本製文禪自少林指心單傳十一傳而為臨濟玄玄十七傳而為雪巖欽欽當宋之季而其道明濬光潔嗣其法者夥矣而獨得一人焉曰高峯妙公妙於欽諸子得法最先而其道最為卓絶後登天目之西峯見其山高林深便卓錫巖石下書石作死關而居之閲暑寒十七年不跬步出關外方是時尊教抑禪欽由江右召至錢塘授密戒妙方遺世孑立身巢巖扄目瞪雲漢何止空四海於一睫也哉其大弟子得兩人焉一曰斷崖義公一曰中峯本公義嗇其用以推揖于本公故公獨以其道為東南末法倡公示寂之十二年當元統二年天子賜號普應國師仍以師所著書曰天目中峯和尚廣録三十卷賜之入藏勑詞臣序於書之首其徒狀事礱石請於余曰吾師身栖巖谷名聞廟朝仁宗皇帝嘗製衣降詔一再遣使入山致禮賜號佛慈圓照廣慧禪師其受業師子院改升師子正宗禪寺勑翰林學士承旨吳興趙公撰碑以賜英宗繼明寵𧶘如之逮文宗臨御師已入寂賜諡智覺禪師塔曰法雲之塔塔之銘詩并序文今奎章閣侍書學士青城虞公奉勑撰恩言寵數可謂至矣然吾大僧自唐以來有封國師者降及五季亦有尊之為其一國之師者至於宋有區域幾四百祀僧之顯者班班輩出然未有尊封國師者今吾師遭遇聖明遂膺曠典自非總其實如唐名僧道行碑則將何以章殊恩顯異數敢叩首以請余謂名公卿其歿則有碑蓋因公室禮得用碑以葬子孫因宜而不去遂以銘其德行焉今大沙門尊封國師其葬雖無竁穴而其名行勒之金石孰曰不宜謹按行録師諱明本錢塘人姓孫氏母娠師時夢無門開道者寄籠燈其家而生師師生有至性既不好弄而好歌梵唄結趺坐年十五輒然臂持戒誓鄉空寂因而閲傳燈録有疑志在參訣遂登死關妙髮長不剃衣弊不易孤峭嚴冷未嘗一啓齒而笑亦未嘗親為其徒剃落獨見師便歡然欲為祝髮蓋已知為大器焉久之誦金剛經恍若開解者師自謂識量依通雖於義趣無不貫解然非悟也已而剃染給侍死關天目於東南諸山最高寒廩粟屋材非飛挽不能至其上師晝服力役夜事禪定十年脅膚不沾席後於妙言下機旨洞契妙以其克肖書偈付之俾衆歸之師益自晦未嘗肯以師道自任也然而玉在山珠在淵其光氣自不可掩况審之以咨訣重之以記莂哉至元間松江瞿霆發施田建寺於蓮華峯號大覺正等禪寺妙將遷化以寺屬師師辭師每謂住持者必無上大道其力可以開明人天夙植福緣其力可以蔭結徒衆明智通變其力可以酬酢事宜故凡住持必道為之體而緣與智為之用有其體而其用雖或化權不周事儀不備猶之可也使無其體而徒倚其用則雖處衆而衆歸制事而事宜亦不足言矣况三者併而冒焉尸之者其於因果能無懼乎於是五山缺主席宰相大臣拜致書幣屢以為請師皆力辭至於窮崖孤洲草栖浪宿屏遁其迹而避去之然而四方學者北殫龍漠南極六詔西連身毒東窮榑桑𮖐糧躡屩萬里奔走而輻湊赴師者逮無虛日南詔僧玄鑑素明教觀辨博英發每曰吾聞大唐有禪宗使審是耶吾將從其學使或未當吾將易其宗旨而俾趨教觀由其國來一聞師言便悟昔非洞法源底方圖歸以倡道而歿于中吳鑑之徒畫師像歸國像出神光燭天南詔遂易教為禪奉師為禪宗第一祖至治三年春天目山木稼其徒之老異之秋八月癸酉師遂入寂即山之西岡塔其全身未歿前一日遺別其外護并法屬一一皆師手書歿之日白虹貫山師於是世壽六十一僧臘三十有七年矣余嘗使江南聞師所至四衆傾慕香茗金幣拜禮供養悉成寶坊而師一衲一單未嘗屬目人念其豐肌暑月腠腐奉葛衣以紲袢者師一不以近其體他可知已師雖屢辭名山以自放於山林江海解縢屩脫包笠在處結茅以居一皆名曰幻住蒲團禪板晝作夜禪規程條章井井森列儀矩慎嚴如臨千衆至於激揚提唱機用翕霍嬰之者膽喪聞之者意消而其大致則深惟世降道離諸方禪者裨販佛祖為可痛心每謂其教傳佛心宗單提直指惡有所謂授受哉惡有所謂言語依解哉故師於其教法欲救其弊而藥其病師皆以身先之故師之於物洪纎高下緩急後先拒之而不遺應之而不攜人徒見其發於悲願真誠而不知其一一以身教而匪事夫空言也以故當世公卿大夫器識如敬君威卿清慎如鄭君鵬南才藝如趙君子昻一聞師之道固已知敬及接師言容無不歆慕終其身江浙丞相脫歡公最號嚴重讀師法語便斂袵望拜高麗瀋王以天屬懿親萬里函香登山拜禮起謂人曰吾閲人多矣未有如師福德最勝者獲師開示涕淚感發於戲師躬己以究其道豈有毫髮于世意哉然而其名不行而至其道不言而信自非行解相應聲實一致允克當于師之位永久益章而弗昧者抑亦何以致此哉乃為銘詩傳之其徒昭示不朽若師所著書其目見塔銘茲不書詩曰天目於山擅弘賁兩峯高盤帝青雲孤禪行坐虎豹羣延敵死關駐孤軍神機觸著身火焚濯以甘露洗垢氛有幻一人奪鼓旗正令一下千騶馳定目不睹轅門麾摩尼寶王焰輪持如日始出榑桑枝光雲照耀千須彌崩騰輳赴無中邊百舍重趼走莫前來者駴汗命髮懸幻以爐錘烹金鉛其出躍治流炎煙不缺則折非龍泉乃復煆搗而煉烹爰肉爾骨死以生醍醐上味投寶瓶蘂香珠幢帝網纓一一芬馥而光明問師何由執神樞一切入一亦無餘隂裨國程鞏皇圖天子南面味道五朝恩光鬱扶輿號尊國師章異恩賜書入藏開蒙昏揭若日月行昆崘又如大海涵乾坤俾人盡證毗耶門正宗的的萬子孫億劫師言永長存謝降賜中峯和尚廣録入藏并封號國師表皇帝福廕裏大普慶寺臣僧善達密的理誠惶誠恐昧死謹言臣善達密的理昨於元統二年正月初十日不懼天誅以臣先師天目中峯和尚明本廣録三十卷進呈乞賜入大藏與經律論並傳草六日欽奉聖旨頒降廣録但有藏經印板去處刊板入藏流通詔文林郎藝文監丞參檢校書籍事臣揭傒斯序於其書之首仍賜臣先師明本號曰普應國師欽此臣中謝伏聞道匪言傳况一佛心宗之旨理由事顯非百家世諦之談明大用於機先振玄猷於語下伏念臣先師明本身栖巖谷言滿寰區當禪林搖落之秋孰為依芘住覺海圓明之域獨任流通故其徒雖默默真參而其道必言言後闡於是以廣長舌樹光明幢攪江海作醍醐飲者量足奏風水為韶濩聞者意消師子絃響絶衆音摩尼珠體非一色蓋以力扶其宗教豈圖上達於宸聰蒙乙覽之清光加國師之殊號復頒朝旨賜列藏函寵燁山林恩融泉壤此蓋欽遇皇帝陛下道隆聖統心契覺皇蘿圖似黃金輪常持四天下沙界如寶珠網交現重光中世昌釋子之正宗日效封人之三祝臣無任瞻天望聖激切屏營之至謹奉表以聞臣善達密的理誠惶誠恐昧死謹言元統二年六月日大普慶寺臣僧善達密的理上表校訛七十三葉十九行廬州南作湖州七十四葉第五行巳誤作巳今改正七十五葉第六行末誤作未從南改正音釋坍音貪悍侯肝切性勇急也酎直又切醇酒也頮呼內切滌也訾蔣氏切譏也錮古慕切久固也竁樞絹切穿土為壙也挽武遠切引車也身毒身音捐毒音篤身毒西域國名榑桑榑附俱切榑桑神木日所出處屩音腳草履也紲私列切繫也徒登切纏膊腸斜幅也矩居羽切與矩同施姓氏比丘明得方義各一兩宗禮四錢真觀三錢戒基圓亮善果文曉明錦寂澄明浩真見如心真祚永堂真鑑海蜃廣遠如蓮明吉如遐真聞本清真性戒淳智通如愷明淨如實真慈明倫真見真淨性龍如燈方崑如泉寶巖明慎如慧各二錢方堂正承長明惠旵寂經慧清天台僧各一錢宰官陸光祖一兩包柳芳十兩善男子張守約四錢周禎周之琦周祖周祝周祇董世維張遺安陳如澄胡文宗呂應律海會湯如惠張得濟王真志徐季明淩明心徐守仁徐守義徐守禮徐守智王在德馮真麒馮真麟董大本孟昌鄒武金俊各二錢方象坤張明秀孫宗宥閔名山姚如名沈圓剛曹𮡻宋浦王在邦沈可賢王鑾各錢僧俗法名久失辨別列于此明惠如覺能智圓秀證訛真常圓仁真乘皎然海聚守堅明常守成普清性德寂潮惟升寂德海霞性定海賢各二錢恆心惟乾方峴各一錢沈義比丘尼如住一兩善女人孫氏一兩呂氏二錢五分真觀惟龍妙戒海音明巖戒淳妙常性龍妙通顧氏屈氏顧氏王氏顧氏方氏周氏張氏嚴氏任氏沈氏邵氏孫氏湯氏施氏馮氏氏張氏各二錢計如曉陸氏周氏沈氏吳氏沈氏韋氏董海會歸氏官姐各一錢如憩八分明勤四分已上施銀共肆拾兩有奇適善女人真潔願圓成勝果遂得梓行不復他募伏願大衆三世業空一乘果熟人人不違本願處處普遍法雲北丘明覺募施併識

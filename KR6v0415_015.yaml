body:
  text: 參學門人北庭慈寂進金剛般若略義延祐丙辰秋七月翰林承旨趙公自京師遣書來問金剛般若大意遂述略義併答其書略曰聞如來於第四時說般若經六百卷金剛經乃其一也議者於六百卷之綱目以融通淘汰四字攝之蓋如來嘗於第二時在鹿𫟍轉四諦法輪證諸小乘入有餘涅槃以未稱本懷由是第三時維摩彈斥使其耻小慕大然後廣說般若一味談空專為小乘人融其所執通其所滯淘之汰之如滌穢器使之清淨然後以上乘圓頓甘露之味注之但金剛經局於文約幾不能以句讀義意深邃寄之六百卷間於中或有不能通處正不必致疑但存一念深信之心信之不已久當自解今利根之士不待功深力久必欲一時意會每以胸臆之見穿鑿之一涉此途則般若大義不復契會於自心矣茲直述經旨題曰金剛般若略義望取而究之或究之不盡餘惑未泮只消提箇所參話自看不必於此文字中致疑一朝看破話頭則六百卷之雄文皆吾胸中舊物也略義云乎哉金剛是喻般若是法波羅蜜此到彼岸喻般若為金金以不變不壞為義般若為剛剛以摧壞萬物為義謂般若之體離相離名亘古不動即諸佛之自心乃衆生之本源也般若於大般若經有一百喻又不止於金剛二義也謂般若如大火聚物或嬰之咸遭其焚燒般若如大日輪能破一切諸幽暗般若如光明鏡能分一切諸妍醜等云云般若乃梵語此為智慧言智慧者破愚癡故當知智慧與愚癡俱無定體悟此心故即愚癡是智慧迷此心故即智慧是愚癡既悟之人雖譏訶戲笑皆智慧也未悟之人雖梵唄讀誦皆愚癡也故愚癡智慧特迷悟之分無定體也大般若經中具八十一科通聖通凡以至悟迷無所間然自五隂六根至十八界十二緣四聖諦六度及三十七助道品以至菩提涅槃等彼大般若六百卷宜廣說今金剛般若不過五千餘字乃總攝大般若之要義以故言詞簡約義理該通其言約故至於句讀難辨其義盡故自非曾遍覽六百卷之長文卒莫知其所歸也如經中言不住色布施且色之一言乃八十一科之首若欲廣說須一一從五隂十八界至菩提涅槃等應於不住色布施下便當言不住受布施不住想布施以至不住菩提涅槃布施以此經之文尚約惟言不住色布施極至於不住聲香味觸法布施而已又不知布施一法乃六波羅蜜之首若以廣說則應布施盡八十一科竟又當言不住色持戒不住受持戒以至不住菩提涅槃持戒展轉盡六波羅蜜循環入八十一科則文不勝其博矣今金剛經一卷以約文納深義其名相廣博難於義解古今三教中之聰利者首未探淵奧之文必欲以一時聞見釋之因而注解互相是非皆多於臆說而自開戶牖去般若之大義遠矣經首列八金剛四菩薩名相昔孤山圓法師嘗以直辭闢之謂好異者為之也經中言四句偈論者紛然咸謂經中果有四句特旁搜曲指必欲以四句主之或有甚者乃至稱六祖有曹溪口訣指金剛般若波羅蜜經之一句逐兩字分為四句惑人一至於此却不思經中言四句偈必上有乃至二字下有等之一言未嘗單稱四句偈惟云乃至受持四句偈等謂乃至者是不及之辭云等者乃總該之義今依文直解但當云於此般若章句受持自一句二句三句乃至四句及與十百千句等此說極明不加穿鑿政不必曲勞神思遠求四句以蹈自開戶牖之轍也經中言四相四見者乃一切相一切見之總名亦一切相一切見之根本也惟相惟見根於虛妄故經云凡所有相皆是虛妄然迷妄之習在根為見在境為相故經云我見人見衆生見壽者見又云我相人相衆生相壽者相且我人衆生壽者之四乃執相滯見之總名惟相惟見不特迷者有之而悟者亦未嘗不遭其惑也苟非聖凡情盡迷悟影消則相見二魔卒難消隕迷者四相謂妄認四大為我相離我視他為人相衰風所觸而生厭離是衆生相忽觸和風而生戀著是壽者相此四相乃迷妄之粗淺者也悟者四相謂於所學習忽悟自心是我相久之悟跡既遣證理猶存是人相悟證俱消存有所了是衆生相覺所了故知覺未忘是壽者相此四相乃學道人之細而深者非深契密會者難與同日而語也然粗細淺深均同虛妄者謂般若清淨彌滿表裏澄瑩不受一塵只箇不受亦不受迷固不可說雖悟之一言亦無地可寄矣所以有云太末蟲處處能泊惟不能泊於火焰之上衆生心處處能緣獨不能緣於般若之上知此喻者迷悟四相不待言而遣矣言四相四見是一切相一切見之根本者因執四大為我就一箇我上引起百千執著百千愛護離我視他為人就一箇人上引起百千分別百千取捨乃至遇衆生而發憎於壽命而長愛交馳虛妄起滅無從諸塵勞識因之而集是故謂一切相一切見之根本也四相之義據直而說只是一箇我人憎愛四種情妄夫人自古逮今馳逐去來於生死海中引起八萬種念慮如燈焰焰似水涓涓未有不自我人憎愛四種情妄之所交接者也或謂佛何不直以我人憎愛為辭而曲言我人衆生壽者何也蓋聖人指說一切名相咸有所因茲莫究其因雖然特不能外吾情妄之說也且人之與我即是非之端何則謂非人即我謂是我非人但以非他即是我相或云非我即是人相而不知大般若真寂體中內而無我外而無人以至無衆生可憎無壽命可愛故三祖信心銘有云才有是非紛然失心又云但莫憎愛洞然明白斯言曲盡其閫奧不必別有說也或問般若真淨之體既顯則我人衆生壽者之妄將何所歸對曰智非相空而莫顯相非智顯而莫空相空則智顯而空智顯則相空而顯相見空故即非四相是名四相智慧顯故是名四相即非四相當知相見本空智慧元顯以本空故則我人衆生壽者全彰般若之光以元顯故則壽者衆生人我總是金剛之體所謂一切智智清淨無二無二分無別無斷故者也經中言即非是名二義蓋本乎破相法相二宗而來然即非二字乃破相顯理是名二字乃就事顯理如來說般若一味談空特以一味空破一切相以故但於名相處皆以即非是名為說乃契一經之旨趣也惟遣事存理無越即非事理不二宜乎是名譬如但言世間一物蓋物物皆具般若不欲顯名般若但云即非其物因物能顯般若故云是名為物餘皆例此則知即非是名似乎兩端而其實一致也經中言五語謂真語不妄實語不虛如語不變不誑語無惑不異語不兩說也佛作是說蓋知衆生不達法義之玄奧不能無疑於其說故使其聞法生信而然也經中言三千大千世界法相數中具載茲不詳出云大千者蓋對小千而言其大小之說亦具存法數經中言三日分者謂早晨是初日分午刻是中日分晚時是後日分言一日之間於此三時將身入河沙國土而用布施如是至百千萬億劫日日於此三時將身布施特喻其施身得福之多然後以信心不逆之功復過於彼或問無量劫施身之功何劣於般若章句方能一念之信其德何優對曰此義特破彼執相之甚者也彼雖施身不忘我相此雖一念之信而應念破諸我人較其住相離相誠霄壤之不侔矣如來豈欺人哉經中言三際心不可得者蓋過去已過去於現在何可得耶未來又未來於現在亦何可得現在之心不住諸相當體空寂亦不可得此心於三際尚不可得云何於不可得心中執縛諸見而滯四相非虛妄而何經中言五眼即賢首宗列五乘頗類其旨且以槩言之務修衆善即肉眼堅護禁戒即天眼觀諸法空即慧眼悲智圓滿即法眼一乘安住萬德莊嚴即佛眼此五眼在聖在凡各各具足特迷悟之自隔耳如上指陳惟依己解而直辭之茲復於逐分下略加注腳貴在遣疑闢異其敢以般若大教炫耀見聞而取過咎云第一分自如是我聞至敷座而坐乃序說法之時會衆之處故稱法會因由也第二分須菩提從座而出讚言希有如來善以慈心護念我等善以正法付囑我等遂問有人發阿耨菩提之心此心當依何住當如何降伏自佛言善哉至願樂欲聞皆許可應對之辭故云善現起請也第三分專答善現所問云何降伏其心之文謂此心不能降伏者為有我人衆生壽者四相故也首令度十二類生俱入無餘涅槃然後不見有一衆生曾受度者苟不至此則四相宛然分稱大乘正宗者謂四相既盡此心不待別有所謂降伏而自然明白了悟非正宗而何第四分方答善現所問云何應住之義佛謂心有所住即是愚癡心無所住乃名般若自色之一法至菩提涅槃於八十一科中俱不令有所住不惟於布施一法無所住乃至六波羅蜜四無量心菩提涅槃亦無所住其無住而住之功雖十方虛空之大不可比量故稱妙行無住也第五分正破執相滯見虛妄情習必使其如理性而實見者也第六分佛對須菩提云今之信般若者甚非偶然皆昔曾於無量萬億佛所深種善根而來夫信般若之心乃名正信此正信中得福無量何以知其然謂其於般若能生正信則不復執相滯見而墮虛妄也然不滯相不執見之法亦欲令捨何况滯相執見之非法而不捨者非愚而何第七分須菩提深達佛之所問乃云如來於阿耨菩提既無定法可得而亦無定法可說苟存有所得有所說之心則般若正宗不得名本來空寂者也故三賢十聖於般若尚存所惑則於無為法而生差別云第八分佛謂有人於般若章句自一句至無數句等而能受持不惟超過河沙七寶布施之福當知般若體中能出生諸佛及阿耨菩提故名依法出生者也第九分須菩提謂二乘人雖證四果亦無所得之心苟滯所得亦不能免四相所纏然後自述謂我雖已得無諍三昧以其不作是念故世尊稱我為解空第一第十分如來自色法至菩提涅槃皆不生所住之心以其無所住則於阿耨菩提不見有所得於佛土不見有所莊嚴猶無相法身隱於諸相雖須彌山王之大不可得而比矣如無所得之得非莊嚴之莊嚴無以異也十一分佛謂恆河之沙固不可數而况一沙又是一恆河如是沙數恆河所有之沙一沙為一世界雖以七寶滿彼世界布施所得福德較受持般若章句之福德不啻以百較千以千較萬也何則此一分經即是莊嚴分不盡之辭也謂七寶布施不能免其生心住相受持般若者於心無所生於相無所住是謂無為福勝十二分佛謂人於般若章句能說其少分則為天人之所尊敬何况盡能受持是謂第一希有名尊重正教得不宜乎十三分佛云即非般若是名般若即非微塵是名微塵即非世界是名世界即非三十二相是名三十二相等即非者乃掃跡之談是名者乃本具之義為須菩提以云何奉持為問故佛乃標名以教其受持繼以掃跡之談乃不使其於受持處而生執著故也十四分須菩提於此感悟流涕復歎後五百歲有信解受持般若者則决定不為四相所纏既離諸相即是佛也佛云不惟信解但聞此般若不生驚怖已自希有復引因中以持般若故得離諸相雖遭割截了無瞋恨展轉復引不生心不住法及以入暗處明之喻此分名離相寂滅誠有旨焉十五分如來謂此般若章句專為發大乘心者說又能受持即是荷負阿耨菩提之良器也其樂小法著四相者烏足與語此哉又謂此般若章句住處即是佛塔天人圍繞豈過分哉十六分佛謂受持般若章句之人以今生輕賤之微垢能易當墮惡道之重障復引因中曾供養八百四千萬億那由他諸佛之功不如後末世中受持般若章句少分之福使我盡說受持般若之功其局於小見者不能不驚駭而狂疑也十七分須菩提復理最初之問世尊亦如前答復引因中以無法可得故方蒙然燈佛授記作佛使我當時有少法可以為所得之心則不與我授記矣展轉說至若菩薩通達無我法者是真菩薩故目為究竟無我云十八分分中前言五眼後說三心卷首已叙其略茲不復贅中間云河沙佛世界中所有衆生若干種心如來悉知其所知者雖優劣善惡之不同皆如三心之不可得也十九分如來重引布施因緣所得福德皆虛妄果非真實也雖言其所施之福多較之持般若無盡之福特泰山之毫末耳二十分佛以具足色身見如來及以具足諸相見如來為問而須菩提了解空義皆云不可得見故世尊許之二十一分解般若故即非衆生不解般若故是名衆生然般若以無說而說謂有所說即謗佛也此理其可與滯相執見者道哉二十二分佛以如是如是印可須菩提無法可得之問復謂之曰我於阿耨菩提乃至無少法可得謂無所得者以本來各各具足故蓋衆生以迷為失而諸佛以悟為得也政當失時於般若體不缺一毫方其得也於般若體亦曷嘗有一毫之多哉二十三分依般若而行所作皆名善法此善法中了無高下蓋依般若體性平等其平等法中安容四相復入者哉二十四分重言受持般若章句之功雖以七寶聚如須彌山之高而用布施不惟百分不及一雖千萬億分亦不及持般若之一分是豈算數譬喻而可盡哉宜乎稱福智無比二十五分受持般若即是度衆生久之般若智圓自然衆生見盡是名度衆生若謂離受持般若外別起心而欲度衆生則四相儼然是謂化無所化二十六分須菩提謂觀如來必不可離三十二相佛云轉輪聖王亦具三十二相若果以色相見音聲求則遠背法身非相之義也二十七分般若體性離一切法具一切相苟不悟無斷無滅之至理謂有則墮常見謂無則墮斷見皆失般若之中道也二十八分佛謂持般若故則知一切法無我能成就無生法忍其七寶布施之人豈可與其福德比量彼布施者惟貪惟受此持經者不受不貪以其不受是名正受於正受中如海納百川安有已哉二十九分般若智體與十方虛空湛然常寂而不拒諸相於常寂體中去來動靜故法涌大士謂般若無來故當知諸法亦無來般若無去故當知諸法亦無去善觀般若者則知諸法無去來相且諸法尚無去來之相而如來之身安有去來耶三十分佛謂微塵世界乃事相也能受微塵世界者乃理性也事相理性常混合為一而不可分蓋凡夫貪著於事相而獨不悟理性所以徇生滅而罔究涅槃之至理不容其無所說也三十一分佛言發阿耨菩提心者應如是知諸法無相應如是見諸法無相應如是信解諸法無相自然於我人衆生壽者中不生知見也三十二分佛以不取於相是名演說如如不動是名演說未嘗以播唇吻弄音聲而為說也當知一切相一切見一切取捨一切言說一切學解等皆有作思惟之法其有為之法如夢幻泡影露電世間惟此六物速於變滅不得久住其有志學般若者應當作如是觀原夫般若無可學無可取無可得無可求以至俱無可為世尊於無可為處洞見源底哀憫衆生逐妄流轉隨處取著以故廣說空法與之融通與之淘汰必欲其淨治心器滿貯般若甘露上味當知心器既淨其般若上味自然充足譬如穴土欲盛虛空其虛空之體隨土出處全體現前而豈待土出然後別見有虛空可入耶猶衆生於無始劫來妄執我人狂逐憎愛障大般若以至于今但我人憎愛之惡習既消則阿耨菩提般若智慧隨其所消而現故楞嚴謂狂心未歇歇即菩提又古德云不學佛法惟務休心此心休得一分即是學得一分般若此馳求之心全休全歇則般若智慧豈待別有所謂學而致哉如上三十二分之大義特不能外乎此教以般若離相離見無為無得為正宗究竟別無他說於經中或句讀重疊或義解不通此或譯之失傳寫之訛當以理遣政不必滯於微瑕而乖大義也當思祗園問答之本懷但欲破其妄執使其了解以故破相蕩執之辭層見疊出蓋悲願之深痛心之切也茲辱翰林承旨相公松雪大居士問及經義不覺援筆及此更以四句截斷葛藤謂其有說皆名謗今日分踈謗更多外護不忘親付囑三千里外定聱訛音釋淘汰淘徒刀切汰音太淘汰浙瀄也唄蒲拜切梵音啻矢利切不止也駭胡買切也

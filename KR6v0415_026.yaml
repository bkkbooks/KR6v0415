body:
  text: 參學門人北庭臣僧慈寂上進祭文祭鹿巖初禪師文三十年前先師以無上大菩提道變為毒藥設為險穽我師兄嘗中其毒親陷其險是故三十年後浸漬既久因地發生毒處愈毒險處愈險使人望風斫額骨毛為之凛然正當今日即毒即險與無上大菩提道吻然混合纖毫不間則知先師與我師兄到此不免首尾俱露某義同手足敢不效顰於是乎點一杯茶燒一炷香換手捶胸連聲呌苦苦苦有懷莫伸酸淚如雨祭玄鑑首座文佛祖之道未易墜兮吾無照遠踰一萬八千里江山以來茲佛祖之道失所望兮吾無照負三十七春秋而云歸生耶死耶果離合兮非智眼而莫窺祖意教意果同異兮惟神心其了知謂無照於吾道有所悟兮真機歷掌其誰敢欺謂無照於吾道無所悟兮大方極目云胡不迷笑德山之焚疏鈔兮何取舍之紛馳鄙良遂之歸罷講兮徒此是而彼非惟吾無照總不然兮即名言與實相互融交涉而無虧出入兩宗大匠之門兮孰不歎美而稱奇屈指八載之相從兮靡有間其毫釐我閲人之既多兮求如無照者非惟今少於古亦稀我不哀無照之亡兮哀祖道之既墜而今而後孰與扶顛而持危對爐熏於今夕兮與山川草木同懷絶世之悲也祭泰長老文本與公二十年所交者道所忘者世也公昔奉衆命來主蓮華峯本居門外止宿草菴謂道可交乎方三見黃落而公遽引無生一曲於大寂定門本遠望寢幃不自知而泣下謂世可忘乎其所交所忘者固不可以語言通尤不可以毫楮盡森羅萬象咸為點頭白雪半甌赤心千丈謂交與忘則贅矣公其鑑諸祭瞿運使文於戲三教聖人一以此道化成天下其知道者雖貧而富賤而貴貧賤尚爾况富貴而知道者乎其濟斯時澤斯民猶壯士屈臂不借他力信然也公嘗於不惑之年扣吾先師於巖穴之下披心投誠論道終日而侍坐達旦公為道之勤見於此矣已而掣施鑰於空諸所有之海搆禪宮於大圓滿覺之場佩金紫於詩書禮樂之門蒞仁政於博愛簡易之域修孝慈於寬厚高明之府履違順於安舒靜默之途閲身心於鏡像水月之表處生死於湛寂不動之地此皆公之餘事也公其自得於心之旨既不可以意測復不可以語言道也某凡一會公公未嘗不以此道相問至大庚戌之春會公于湖山語論方輟乃出紙命書進道之語置之座右於此益見公向道之志二十餘年不間然也自爾去公於淮漢之表者三載聞公復以寺事見逼遽移棹而他之不期與公有生死之間於戲公福德人也而知道焉吾西竺聖人謂三界無別法惟是一心作惟公之福本乎自心而道亦豈外乎自心哉蓋知公之施田施心田也建寺建心寺也不達乎心而滯物者吾道之所不取也苟會於心則心無施不施之異心無建不建之殊即寺與田皆公心外之影事而我住不住者又影外之影耳知公必不以此二其心也雖曰心外無田盡大地一圍也心外無寺遍十方一剎也此田不待別有所施而檀波羅蜜念念出生此寺不待別有所建而大圓覺海處處成就於此雖彌勒釋迦無住持分况其他乎審如是則知公於不思議解脫心中宴坐丈室獲正住持三昧現前入未來際種種受用如是具足是謂因該果海果徹因源者也某賴公知道之詳故匍匐千里敬持是説以告之非巧辨以惑公之聽也由是薦園池之華果列萬象之盤飱拈法界之爐熏瀹海門之晴雪奠公於不動真際之室公必以我説為然也尚享疏續刊傳燈録疏芝巖西堂鏤板未竟而卒蘆溪藏主募緣續刊未生佛祖早傳此燈千七百人錯認浮光幻影不立文字乃有是録數十萬偈聚成鐵壁銀山笑芝巖墮於死語而莫之所圖看蘆溪別立生機而即之能了拈一華脫賺迦葉當時不解覆藏受三拜纍及神光今日正冝揭露當有大木顯全體作用之靈夢會見英檀興一言領荷之勝心共知印板上打來須向刀刃邊拶出正法眼洞燭聖凡迷悟之迹涅槃心鑑空生死情妄之蹤始編集於景德年間當流通於大元國裏話頭具舉注腳分明四祖寺童行求僧疏溪邊尋女子投胎操心太切壁上倩秀才書偈用意不臧爭似我毫髮剗除便與他赤肩負荷然美玉精金固非易得而方袍圓頂豈是小緣一千七百則葛藤打歸自己八萬四千門佛事用報檀那四祖接待菴募緣疏隔江招手望廬山面目猶在半途別甑炊香領黃梅意旨不消一宿既是容身有地何愁具眼無人趂起水牯牛祖父田園從頭耕遍提木上座毗耶庫藏彈指豁開從他知識來參是我祖師現在前不遘村後不迭店誰問你船來陸來飢則喫飯困則打眠總教他休去歇去一機相副萬善同歸妙德院化燈油疏通身汗下灼然從逼拶處得來脫體光生真箇是遮藏他不得爍破老瞿曇黃金面孔照開大檀度生鐵心肝瑪瑙階前滿地月搖松影動琉璃殿上四櫩風𩗺菜華香即此光明是真供養師子院化糧疏天目山三十五年開拓水赴雲奔師子巖數百千指繞圍肩摩踵接擬向飯籮邊打發須憑筆端下施來倒廩傾倉萬斛珠光明璀璨考鐘伐鼓滿堂僧意氣崢嶸既灼然親遭塞斷咽喉肯諱道不曾咬破粒米鉢盂兩度濕助我飽參毛孔七日香報君多福雜著誡間世人未有不以間散為樂而共趣之逆問其故乃曰昔嘗以榮辱是非纍日與事物相交馳心志勞而形體憊以至結於情想接於夢寐靜而思之人生幾何不得一日之安雖富貴奚益也由是一切棄之思欲行歌坐忘觀青天白雲以自放浪於事物之表或有避父師之訓厭身世之勞望治生如避水火必欲拔塵遠俗以遂其間余曰忙固勞形役慮也間則坐消白日又何益於理哉二者皆欣厭之情妄耳故聖人有動靜二相了然不生之旨正不必厭此忙而欣彼之間也余將直言之夫人欲學入世間之道苟不服勤勞役則事無貴賤皆無由成然悟世間虛妄欲究聖賢出世之道倘不忘餐廢寢則根無利鈍又何從而得之故雪山大士捨身命如微塵數事知識如恆河沙積劫逮今歷試諸難蓋欲示後學者知道之不易聞也故入世間則忠於君孝於親悉盡其義不可不忙出世間則親師擇友朝參暮扣以盡其道又不可不忙既盡其義又盡其道將見體如泰山之不動心等太虛之無為豈一間字可與同日語哉或入世不能盡其義出世不能盡其道惟孜孜以安間不擾為務而不肯斯須就勞者故聖人斥之為無慚人凡有識者安肯負此無慚而復嗜間於踈散之域也余故書此以為投間者之誡存實道人用心務在存實心存乎實雖頃刻萬動而不亂苟不存乎實須終日不用可也一用之則禍相繼矣謂實者何中也正也不欺也不偽也事無小大而不敢以私蔑公初無智愚巧拙之間也然人莫不有心心莫不有用當用心之際苟務智巧而不務乎實則愈巧而愈乖益智而益敗蓋實者乃天理之不可易者也智愚巧拙乃賦分之不可移者也惟聖賢所愧夫實不存乎心不愧夫智巧不居乎分何則能存實而用心使賦分雖愚拙然其存實之心初未嘗厭愚拙而恱智巧也久之不覺即其愚而智拙而巧矣即其愚而智真智也即其拙而巧天巧也真智絶思慮也天巧無造作也惟絶思慮無造作之智巧覿體與佛祖不傳之道相去無幾矣其存實之效有如此者且實者心之體也古云一實之道是也夫人終身背之而不能自返者蓋情欲蔽于中物境誘於外引起虛妄日夕遷流而不知息也世謂愚拙莫甚於此者孰智乎孰巧乎余未之見也評恃道不越乎正受謂正受者不受諸受也諸受既遣豈容復有所恃乎一有所恃則應念不居其正受矣既失正受則此心不能無謬焉是故恃勢則心日傲恃權則心日暴恃福則心日驕恃才則心日慢恃智則心日忮恃術則心日詐恃貨則心日貪恃力則心日為之狠矣蓋心念無主隨其所恃而趨之所趨之途萬不同要皆謬亂之本也或謂權勢貨力粗有識者皆莫之恃世固有道大德備望重當世者恃之庸何傷對曰道大莫極乎明性德備莫越於利人使內有所恃則性不得而明外有所恃則人不得而利矣故聖人無為而天下治無作而事功成無思而理通無取而用足蓋不自知其為聖也苟存所知則亦恃矣安有聖人而自恃其道大德備者哉且道雖尊德雖貴猶不可恃况道德以降舉皆虛妄或起心恃之是猶抱蛇虎而眠欲不遭其嗜囓者余不信也善人李生傳余偶遊異鄉有傭工李姓者咸稱之為善人因怪而問之曰彼傭工耳能博涉古今聖賢之事乎曰不能也彼必起居飲食有以異於人乎曰未見其異也彼必有才術智巧精於世乎曰無是也彼之言行必有以利於物乎曰俱非也然則稱其為善人何耶乃曰若李生者惟受人辱而氣平與人作而工倍似不識世間是非憎愛之習凡父母妻子親友閭巷間以猥屑無狀之事雜然交迫皆泛應之無難色人或不平以止之則曰惟恐不見役耳雖死亦何所憚哉由是里中無老稚無貴賤知與不知見之皆稱為善人余慨之曰彼一傭力耳天下之至卑賤者人尚不敢隱其德而稱之嗟今之居聖賢之廣居服聖賢之上服乃不思修身慎行而反責人之不己稱者較李生寧無慊於中乎蜂蟻蟻穴於將潦之壤封疆之守愈堅蜂集於將割之房號令之威尤重其為生也掠殘華於蛛網之隙慕餘羶於馬足之間投死於須脫身於僥幸惟靈知之性了然獨露於飛搖蠢動之表洞無隔越由惡習所蔽受此微劣之軀返不自覺人或嬰其芒撩其尾則鬱勃之氣奮然見於橫趨直突之間將盡其毒以刺之於戲惜哉殊不思即其奮毒之念直下與三世開士大解脫法覿體平等由昏迷之異則果報亦相須而遠矣豈特蜂蟻然哉聞聖人觀百億四天下如觀掌中之果今吾徒所居者乃四天下之一耳自暘谷之東至昧谷之西其中長山廣漠際空入雲不知其幾千萬里之遠使馳以逐日之蹄鼓以摶風之翮將盡其生而不能達其涯涘且一天下之廣也如是以六尺之軀位於其中曾不翅太倉之一稊米耳增一稊米而倉不加多減一稊米而倉不加少則其微眇可知矣逮乎苦樂之境倐焉變于前則鬱然而憂懍然而恐怡然而喜奮然而怒馳聲色沉滯愛憎其虛妄攀緣動搖形體猶甚於掠華之蜂慕羶之蟻也其遭蛛𮈔馬足之厄者窮劫逮今莫知其幾方將違順二風輕觸其念則驟然動其情雖風刀火聚橫于前亦不暇顧其含𮖐十虛廣大靈知真覺之體由是而昧之又昧者矣悲夫使湛四大海清淨寶目觀吾徒之生蜂乎蟻乎何營營而不自息也觀蝦蟆記夏坐皖山偶立簷下忽蝦蟆趨伏踵間驚畏喘息似依人者方疑其為異俄而蛇至遇人而返蝦蟆驚喘猶未定忽有小蟲至其前亟起張口吞噬略不少貸於戲方畏蛇之啖己也其驚懼若此能推己畏死之心而及物安肯肆其吞噬如是之切耶於此洞見衆生迷昧之情曉如黑白嗟夫人之逐妄處心積慮有甚於蝦蟆不能推己者遂述觀蝦蟆校訛二十三葉十五行閭南作里音釋穽音淨坑也匍匐匍蒲胡切匐蒲墨切匍匐盡力奔趨也猥烏賄切鄙也皖華切

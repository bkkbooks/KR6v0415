body:
  text: 叅學門人北庭臣僧慈寂上進賦勉學賦并序古人學才學藝而極於達道今人負學道之名反流入於才藝豈道無蹊徑可入耶蓋由生死之念不切耳且學不至於道徒增情妄於理何益哉余故作而為賦以勉其所謂學云辭曰三界虛廓惟念自縛念去覺存未離有作真淨體中不容他大火聚如何湊泊雖靈鑑之可憑信此宗之無諾見欲逃於斷常理必資乎叅學生死事大一念包八萬劫之輪回迷悟根深百界隱一千如之醻酢所云學者不學六藝不學羣書孜孜矻矻惟道是需求願樂之半偈舍所重之全軀思香華以表其誠敬鬻肝心而忍厥形殂或五熱炙身而投火於必死之隙或半腰積雪而刃臂於忘生之區臨寢食而終不暇顧對寒暑而安有其餘或降己為童奴或舍身為牀座或半夜腰石而負舂或七箇蒲團之坐破或視利養如游塵或棄功名如涕唾或千魔萬難益勵之以精勤或積世多生頓相忘其怠惰或驚幻影之忽遷或歎隙隂之易過或形影相弔於空閒寂寞之底而不見其煢孤或身世兩忘於苦樂逆順之場而不知其福禍如浮山典葉縣之厨演祖司白雲之磨楊岐緫院事而十載奔馳神照問經王而三年折剉蓋忘情於道注念於學而不暇擇利害較優劣問可不可者也原夫道為舟航道為梯級道為家舍道為飲食匪舟航無以越生死之迅流匪梯級無以構涅槃之殊績微家舍何以𭣣飄零暴露之狂踪微飲食何以濟饑餒孤虛之陋質覿面不委噬臍何及法無正像末三時之等差人何上中下三根之端的惟知進學之弗荒不擬真功之自積古有跛鼈千里之喻正法末世之談蓋表其自強不息者也偉矣哉學有多轍悟非一岐子韶聞月下之蛙圓悟聽日中之雞溈嶠撥火洞山渡溪靈雲見桃而更不疑香嚴擊竹而忘所知德嶠遇紙燭之滅會通逢布毛之吹至若聞畫角洗鉢盂細末將來從這裏入是皆望影而脫聖凡之羈鎻迎刃而具囓鏃之玄機人徒見其悟之不難而不知其學之必到苟學力之不精何悟由之深造道離愛憎其學之之心對順逆肯存于懷抱道非取舍其學之之心遇佛魔必空其閫奧道體等平其學之之心苟動一念即資其顛倒道本具足其學之之心苟任馳求轉增其紛閙道非見聞其學之之心擬涉解會而皆名自暴道非有無其學之之心苟滯一隅而誠難取效道如倚天長劒其學之之心不能覿體混融則不免為物我是非之所籠罩道如杲日道如太虛道如風輪道如火聚其學之之心或不具如是之天資縱使讀四庫書記一藏教吐懸河瓶瀉之詞章徒爾資其呌譟惟道一學最妙最玄既無義路亦匪言傳昧之則一門異轍了之則萬里同佛祖為一大事而指鹿為馬學人走半天下而掘地尋天絕思惟處強生節目無義味話特地加鞭逼生蛇化活龍粥飯氣高揮大抹轉山河歸自己小兒戲羣號聚喧據七尺單守三條椽如遇怨敵如救頭然學之之力既極悟之之理不偏理必學而致悟余於是作而為賦今人徒見前輩悟在頃刻而不思古人於未悟之先其學之之心未甞不專精而謹懼其學之之心或不至道之淵府曰藝曰材豈吾徒之當慕嗟師道之既微驚法歲之云暮惟學道之為學與百家而異路毛髮忽若當情鐵壁那容進步絕學之學以為學非悟之悟而為悟不涉功勳豈容回互死偷心於能所未形之初具正眼於眹兆未彰之戶一語臨機萬靈罔措臨濟謾施雷轟霆震之喝雲門空試石裂崖崩之句曰向上之不傳緫羣機而共赴鞠其所以自來皆玄學而為度或不勉勵其學力未有無因而自遇大哉能仁為學之端視勤苦而無畏對怨親而等觀駕一乘而勇銳愍三有而悲酸垂洪範而塵沙不廣闡大猷而虛空靡寬由是四十九年弓折箭盡二三四七脣亡齒寒性天滅沒學海枯乾古者謂不學佛法惟務休心蓋休心乃佛法之至學也又謂於己無事切勿妄求蓋無求亦佛法之至學也又謂學道之門別無奇特只要洗滌根塵下無量劫來業識種子蓋洗滌根塵業識乃佛法之至學也又謂參禪一著要敵生死不是說了便休蓋精勤勇猛久遠不退亦佛法之至學也又謂參禪學道非等閒直須廢寢并忘餐蓋廢忘寢食於學之之頃曾不期然而然也又謂無佛法可學無禪道可得無涅槃可證乃至無無亦無與無俱遣亦不外吾學之之理也或謂道本具足安用學為本具猶璞石之含玉安能免參學之剖鑿本具猶田之產禾安能免參學之鋤犂本具猶地中之水脉安能免叅學之穿搆本具猶古鏡之藏光安能免參學之磨治本具猶木中之火燄安能免參學之鑽擊本具猶良藥之治病安能免參學之擣篩本具猶驪頷之夜光安能免參學之探索本具猶扇中之風性安能免參學之搖揮本具猶貧士懷中之至寶匪參學之指導雖終身之罔知本具猶麥為麵體黍為飯基苟不加參學之炊磨任萬劫以難齊一旦力邁先賢功侔古聖脫叅學之幻因提本來之正令剉有作之鋒鋩擲無為之柄不加毫力掃生死魔於知見之稠林靡仗寸金斬涅槃將於證修之深穽斥臨濟金剛王使之無地措躬驅德山木上座俾其望風乞命或智眼之不明豈常流之能競今之學者惟以本具之說相牽而不思實學真參之究竟原夫釋迦不天生達磨非自證緫由積學之真致此光明之盛者也審如是則學乎乃破生死斷煩惱證菩提出三界興保社起叢林之不可不由之徑也可不勉乎可不勉乎音釋醻酢醻是周切酢疾各切煢渠營切獨也噬音逝齧也譟桑到切羣呼也

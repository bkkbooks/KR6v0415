body:
  text: 叅學門人北庭臣僧慈寂上進偈頌幽居聞市聲鱗鱗萬瓦下蓋覆物與人五更幾夢覺眼底秋復春側耳白雲巖閙市喧埃塵二毛轉鬢脚白日迷天真疾馳生死岸獨立人我濱少壯習輕肥老大成貪瞋英雄與才智紛紛復紜紜浮光自苦樂幻影徒冤親一念不返照萬刼歸沉淪良哉羙丈夫好景休因循混沌鑿七竅開合俱漓淳肉團𮖐枯骨枯骨藏靈津靈津忽散滅太虛包一身太虛亦妄見轉復諸苦論瞠目視乾坤云胡而不仁乾坤不加對萬象俱橫陳輸與寒山子時時笑眼新即事十首一刻復一刻每日數盈百過去等河沙未來積塵墨忽忽若跳丸遄遄如轉息當處絕蹤由瞬目天地隔一時復一時非速亦非遲歷涉幾千載循環十二支金雞催曉箭鐵馬報春旗諗老云能使真成戲小兒一日復一日金烏無路出團團三界圈密密兩儀窟諸佛不露影眾生是何物更擬覔玄門苦哉咄咄咄一旬復一旬那事逐時新圖寫虛空相雕裝混沌身祖庭深白雪佛海翳黃塵一句無生話誰將汙口脣一月復一月那箇知時節走殺老兔精埋深繫驢橛再閏十三圓小盡廿九缺少室不傳機渾侖都漏泄一年復一年談笑歲華遷夢裏轉作夢中更入迷時猶海隔悟處正天懸眼底無行路纔方好著鞭一紀復一紀流光如逝水佛國徒有名人海元無底一息忽平沉萬死從頭起當處不回眸祖庭空側耳一世復一世三際無碑記過去不可追未來信相繼十方不二門萬法真三昧彼此皆丈夫緣何猶不會一生復一生把手共誰行耕破識田識瀝乾情海情色色猶非色聲聲豈是聲自從聞見絕觸處是無明一劫復一劫那知幾生滅髑髏鑽得空皮袋打不徹生死有異方涅槃無祕訣火急要相應一塵元不隔示行堂至道常湛然萬古絕成壞良由妄想生輪回三有界曠劫至今朝展轉償宿債超越在精勤沉淪由懈怠操履貴平常言行休捏怪去除雜語言掃蕩閑知解一箇死話頭悟來方慶快挑包打十方有利而有害大事不思惟前程何所賴殷勤報汝知古人曾有誡自在不成人成人不自在莫隨眼底貪瞋癡換却如今好皮袋教禪律緫頌四首聽教欲奚為思同佛祖齊機前空境觀句外脫筌罤見不離文字心常滯水泥縱饒華雨墜還是法中迷叅禪須致悟不悟緫虛捐啓口循知解存心著妙玄五宗雲蔽月二派管窺天更覔西來旨何時得正傳制律緣何事單防毀犯心念空真羯磨情盡正持任作止冰侵骨依違雪滿襟遮那曾未委羈絆去來今生死依情妄輪回事可嗟鼎分緣有據壁立更無差修學水中月講明空裏華當機如未瞥三者謾諠譁次魯菴懷淨土十首并序永明和尚以禪與淨土揀為四句謂有禪有淨土無禪無淨土有禪無淨土無禪有淨土特辭而辨之乃多於淨土也致業單傳者不能無惑焉或謂禪即淨土淨土即禪離禪外安有淨土可歸離淨土豈有禪門可入審如前說則似以一法岐而為二矣不然教中有於一乘道分別說三永明之意在焉魯菴和尚宗禪之師也效古作懷淨土章句辭達而意明語新而思遠使人讀之曾不加寸念咸置身於純白蓮華之域豈尚異耶蓋變體說禪亦善巧方便之略耳本素昧禪學尤踈淨行披味至再不覺於一毫端戲成偈以贅韻脚云惟禪惟淨土非下亦非高謾爾章羣品何曾間一毫妄情終自瞥悲願肯辭勞誰信泥犂底常光雜俊髦十萬億何迂回光即有餘惟心標一實自性奪十虛易簡超羣作高閑越太初古今玄達者誰不歎猗歟純白蓮華土高賢每共論有心皆是佛無地不名坤截斷輪回路掀解脫門眼聲并耳色逆順緫承恩千聖體無差彌陀即釋迦擬心猶捕影動念若蒸沙刹刹寶𮈔網塵塵車軸華那知孤露客具此大榮華慈親興法利似賈復如商帆截貪癡海華吹戒定香信心人易入垂手願難忘嘉號方存念音書已到鄉飯食經行外觀光倚玉樓風微天樂奏波靜水禽遊寳網珠常曉瑤階樹不秋一從心地印隨處絕馳求稽首黃金父眉間玉燄橫昔年曾去國今日幸聞名眾寶天常雨纖塵地不生大慈無界限那肯禁人行萬德芬陀利人間現一枝祥光分處處靈燄發時時月滿水精網藕香雲母池笑逢諸勝友謂我到何遲故家名極樂清淨凛冰霜直捷超三觀褒揚讚六方覺華含古色靈草照春陽樓閣雲天外雙雙彩鳳翔斫額望慈親相違幾度春頓忘三際業徒剩一閑身失路難逃妄還家豈是真西天并此土元不間纖塵閱林間錄有感林間編此錄深夜剔殘燈慧命微如線人心冷似冰祖庭空積雪古路不逢僧追跂前賢轍思歸一念增禮四祖真身九拜曉龕前追思獨慘然真身無日壞此道有誰傳古岸橫秋水空山起暮煙幾多西祖意寂寞在江邊音釋瞠抽庚切直視也

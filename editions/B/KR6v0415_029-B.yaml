body:
  text: 叅學門人北庭臣僧慈寂上進偈頌寄同叅十首本來成佛非他得不信分明是自欺一箇主人翁既失萬生皮袋子難醫昇沉相續蟻旋磨憎愛交纏象溺泥未肯懸崖親撒手不知辛苦待何時自從昔日昧天真掘箇無明窖轉深因業受身身造業由心起境境生心輪回動是經塵劫修證何曾惜寸隂生鐵秤鎚牢把手莫教東海又平沉修行須是用心真心若真時道易親迷悟二途端在我是非兩字莫隨人黃金猛與鑄肩脊白醭常教生口脣漆桶驀然箍自脫心華開發少林春法界何曾間自他見聞知覺眼中華眾生心佛三無別煩惱菩提兩不差嚇你老爺臨濟喝惑他兒女祕魔叉低頭更擬求玄解十萬程途未是即心是佛佛惟心三際同時絕古今將佇思間駒過隙擬承當處鼠偷金拍盲快向聲前領脫略難於句下尋早不立成男子志驢年方會芥投鍼今古奔趨幾象龍禪禪禪直是心空二宗得旨非南北五派歸根絕異同得馬還牛閒口鼓鍛凡鎔聖假神通苟非真實超玄者端的難教振祖風即心是佛大家知涉境難教絕順違既悟且言無戒律不迷安得有貪癡閉門說路語何直出戶親行步却遲故國苟非真到者萬般施設緫非宜如來禪與祖師禪一手猶分掌與拳既得髓時忘直指已拈華處喪單傳烏焉成馬今皆是黃葉為金古亦然未具照空生死眼爭教仰不愧龍天相逢盡說做工夫謂做工夫何所圖不是坐忘消白晝豈應高臥守清虛多生憎愛情難遣積劫輪回業未除不做一回親斬斷空將名字掛江湖十方聚會號同叅半入叢林半住菴大法不明宜自譴靈源未透欲誰甘識田塞斷泥犂穽心地熏開優鉢曇今日伊余容易別牛頭自北馬頭南示玄鑑講主二首并引雲南鑑講主知有教外別傳之旨越一萬八千里而來西淛自相見至相別恰三載一日尋我客中夜話湖山間因舉宗門下數𫨻陳爛葛藤不覺咬斷拇指臨別怱怱不欲徵其罪犯且放過一著異日抵匡廬而之故鄉却不得出露醜惡被人呌罵而累及我也就以二偈贈之狂心未歇為禪忙萬八千程過遠方喪盡目前三頓棒揮開腦後一尋光陳年故紙渾無用今日新條亦頓忘見說雲南田地好異時歸去坐繩牀衲僧用處絕羅籠拶著渾身是脫空輾破一塵如有旨撥開萬象覔無蹤德山焚䟽情先死良遂敲門路已窮積劫塵勞忽吹盡黑龍潭下五更風鴈蕩除夜茅屋三間冷似冰灰頭土面十餘僧掃除自己閒枝葉不打諸方爛葛藤就手揭開新歲曆和光吹滅舊年燈頂門別具摩醯眼越死超生似不曾夢幻泡影緫頌五首夢中作夢日悠悠究竟何嘗有斷頭槐國既無分晝夜漆園那復論春秋半䆫月吐三更影一枕風含萬古愁不識有誰曾獨醒揭開宇宙縱雙眸幻本非生非不生實無而有政縱橫纖塵靡積乾城聳㳙滴那容燄水傾火宅長年機未息雪山午夜道初成謾將凡聖閒分別把手同歸一路行泡因雨點激平川脫出規模顆顆圓倐有忽無彰起滅隨成即破示抽添山河密𮖐虛玄法界深藏空寂圈却笑幾多兒女戲重重撲碎又依然影子從來不離身惟於光外獨分真日中疾走誠難避水底深探豈易親三界昇沉蹤已舊四時遷謝跡方新古今多少英靈者曾不遭迷有幾人三界何人得暫離六如處處未相違捕風吹網人皆笑逐色隨聲自不疑迷所以迷知幾劫墮之又墮更多時不能彈指超無學擬剔眉毛已時遲贈營壽藏斸斷雲根闢古基粉牆低護石樓危既知身後有終日肯信目前無了時夜雨一䆫蠶課繭春風千里燕𠾑泥到頭共熟黃粱夢哭送斜陽欲恨誰次韻答盛秀才風月何緣事苦吟擬將英譽壓雞林幾回立盡三更月一字搜空萬劫心夢裏忽驚霜入鬢梅邊不覺淚沾襟可憐半世聦明種甘為浮詞又陸沉送禪者歸鄉二首直下本來無一事謂言無事早相欺輪回不翅三千劫履踐何拘十二時竹筧引泉聲滴滴松䆫來月影遲遲市朝見說黃金貴誰買青山種紫芝湖海俄經三十年無端一念憶生緣夢中復做還鄉夢禪外重叅逆旅禪踏碎暮雲投古寺衝開積雪望炊煙狂心未向機前歇溢目家山轉棄捐船居十首己酉舟中作世情何事日羈縻做箇船居任所之豈是畸孤人共棄都緣踈拙分相宜漏篷不礙當空掛短棹何妨近岸移佛法也知無用處從教日炙與風吹水光沉碧駕船時疑是登天不用梯魚影暗隨篷影動鴈聲遙與櫓聲齊幾回待月停梅北或只和煙繫柳西萬里任教湖海闊放行𭣣住不曾迷人在船中船在水水無不在放船行藕塘狹處拋篙直荻岸深時打棹橫千里溪山隨指顧一川風月任逢迎普通年外乘蘆者未必曾知有此情大廈何知幾百間爭如一箇小船閒隨情繫纜招明月取性推篷看遠山四海即家容幻質五湖為鏡照衰顏相逢順逆皆方便誰暇深開佛祖關家在船中船是家船中何物是生涯檣栽兔角非干木纜繫龜毛不用麻水上浮漚盛萬斛室中虛白載千車山雲溪月常圍繞活計天成豈自誇一瓶一鉢寓輕舟溪北溪南自去留幾逐斷雲藏野壑或因明月過滄洲世波汩汩難同轍人海滔滔孰共流日暮水天同一色且將移泊古灘頭散宅浮家絕所營閑將行色戲論評煙簑帶雨和船重雲衲衝寒似紙輕帆飽固知風有力柁寬方覺水無情頭陀不慣操舟術幾失娘生兩眼睛為問船居有底憑渾無世用一慵僧拋綸擲釣非吾事舞棹呈橈豈我能轉柁觸千丈雪放篙撑破一壺冰從教纜在枯上恣與虛空打葛藤懶將前後論三三端的船居勝住菴為不定方真丈室是無住相活伽藍煙村水國開晨供月浦華汀放晚叅有客扣舷來問道頭陀不用口喃喃船無心似我無心我與船交絕古今漚未發時先掌柁岸親到處不司鍼主張風月篷三彈壓江湖艣一尋衮衮禪河遊殆遍話頭從此落叢林山居十首六安山中作胷中何愛復何憎自愧人前百不能旋拾斷雲修破衲高攀危磴閣枯藤千峯環繞半間屋萬境空閑一箇僧除此現成公案外且無佛法繼傳燈三尺茅簷聳翠岑去城七十里嶔誰同趣入忘賔主我自住來空古今雪磵有聲泉眼活雨崖無路蘚痕深為言海上叅玄者菴主癡頑勿訪尋行脚年來事轉多爭如縛屋住巖阿有禪可悟投塵網無法堪傳逐世波偷果黃猿搖綠樹𠾑華白鹿臥青莎道人喚作山中境已墮清虛物外魔觸處逢山便做家秪緣甘分老煙霞盧都脣觜生青醭藞苴形骸上白華四壁光吞蓬戶月一瓶香熟地爐茶苟非意外相知者徒把空拳豎向他數朶奇峯列畫屏參差泉石暢幽情青茅旋尖頭屋黃葉頻煨折脚鐺雲合暮山千種態鳥啼春樹百般聲世間出世閒消息不用安排緫現成一住空山便廝當兩忘喧寂與閒忙但聞白日銷金鼎不見青苔爛石牀印破虛空千丈月洗清天地一林霜客來不用頻饒舌此事明明絕覆藏閒雲終日閉柴扉海上同叅到者稀白髮不因栽後出青山何待買方歸拽簾諗老投深穽薙髮曾郎墮險機要覔住菴人住處擬心難免涉離微見山渾不厭居山就樹誅茅縛半間對竹忽驚禪影瘦倚松殊覺老心閒束腰懶用三條篾扣己誰叅一字關幸有埋塵甎子在待磨成鏡照空顏頭陀真趣在山林世上誰人識此心火宿篆盤煙寂寂雲開牎檻月沉沉崖懸有軸長生畫瀑響無絃太古琴不假修治常具足未知歸者謾追尋千巖萬壑冷相看不用安心心自安識馬乍教離慾厩情猿難使去玄壇竹煙透屋蒲龕密松露沉空毳衲寒此意山居人未委未居山者更無端水居十首東海州作道人孤寂任棲遲跡寄湖村白水西四壁煙昏茅屋窄一天霜重板橋低驚濤拍岸明生滅止水涵空示悟迷萬象平沉心自照波光常與月輪齊水邊活計最天然物外相忘事事便門柳每招黃蝶舞岸莎常襯白鷗眠雨蒸荷葉香浮屋風攪蘆花雪滿船不動舌根談實相客來何必竪空拳縛箇茅菴際水涯現成景致一何奢野塘水合魚叢密遠浦風高鴈陣斜道在目前安用覔法非心外不須誇一聲鐵笛滄浪裏煙樹依依接暮霞年晚那能與世期水雲深處分相宜茭蒲繞屋供晨爨菱藕堆盤代午炊老岸欲隳添野葑廢塘將種補新泥無心道者何多事也要消閒十二時漚華深處寄幽棲聞見天真分外奇一枕香吹紅𦴻蓞四簷光浸碧瑠璃繞圍雲水盈千眾爛嚼虛空遣二時幻住叢林無間歇苟非同道欲誰知雲漫漫又水漫漫新縛茅龕眼界寬儘有池塘堪著月且無田地可輸官四時風味人誰得萬頃煙波我自觀却恐客來為境會閉門𭣣在一毫端住箇茅菴遠市塵東西南北水為鄰風休獨露大圓鏡雪霽全彰淨法身波底月明天不夜爐中煙透室常春閒將法界圖觀看心眼空來有幾人水中圖畫發天藏不到無心孰可當雪谷春深沉玉髓冰壺夜𣱵泛銀漿洞然圓湛融三際廓爾淨明空八荒縛屋且依如是住難將消息寄諸方水國菴居最寂寥世途何事苦相招去村十里無行路隔岸三家有斷橋數點鴉聲迎暮雨一行魚影漲春潮陳年佛法從教爛豈是頭陀懶折腰極目瀰漫水一方水為國土水為鄉水中縛屋水圍繞水外尋蹤水覆藏水似禪心涵鏡像水如道眼印天光水居一種真三昧只許水居人廝當居十首汴梁作古稱大隱為居柳陌華衢間管絃畢竟色前無別法良由聲外有單傳錦街破曉鳴金𩍐繡巷迎春擁翠鈿覿面是誰能委悉茫茫隨逐政堪憐綠水青山入眼塵心空何物可相親既無世務堪隨俗却有居最逼真月印前街連後巷茶呼東舍與西鄰客來不用論賔主篆縷橫斜滿屋春足跡無端遍海涯現成山水不堪誇市𮠔既可藏吾錫城郭何妨著我家四壁虛明連棟月數株紅白過牆華見聞不假存方便只麼隨緣遣歲華山居何似我鄽居對境無心體自如手版趣傾樓上酒腰鈴急送鋪前書沉沉大夢方純熟擾擾虛名未破除白日無營貧道者草深門外懶薅鋤起滅循環事若何萬般粧點苦娑婆榮膺廊廟三更夢壽滿期一剎那翫月樓高門巷永賣花聲密市橋多頭陀自得居𮠔趣每笑前人隱薜蘿𮠔市安居儘自由百般成現絕馳求綠菘紫芥攔街賣白米青柴倚戶𭣣十二時中生計足數千年外道緣周苟於心外存諸見敢保驢年會合頭山根水際我甞諳特地移居逼閙籃人影紛紜方雜沓市聲撩亂政沉酣千樓燈火為標準萬井笙歌作指南𨚫喜頭陀忘管帶無邊法界是同叅山居却似苦無緣既不居山學隱新縛蒲團侵市色旋移禪板近人煙庭華日暖藏春鳥櫩樹風高噪晚蟬一鉢普通年外雪與誰同共潤心田居不費買山錢溢目風光意自便逐日驊騮蹄踏踏弄晴蝴蝶翅翩翩見忘境不須頻遣執謝心常合本然如是住來知幾劫難將消息與人傳市卜築道何親物物頭頭契本真微有得心魔所攝擬存住念鬼為鄰招提禁夜鐘聲近閭巷催年鼓吹頻三世如來諸法相一回新又一回新次韻瀋王題真際亭高亭結搆標真際體共雲林一樣閒山勢倚天忘突兀水聲投澗自潺湲伽陀逈出言詞外海印高懸宇宙間佇看凭闌人獨醒又添公案入禪關雙䯻峯有懷高峯和尚初剏菴於此雙䯻雲深古道危不來夜半扣柴扉六年底事成遺恨寂寞空山啼子規題佛母堂熱鐵洋銅地獄坑禍胎今日又重生黃梅山下人無數誰解門前掉臂行雪竇送友子規啼血染山華拄杖頭邊興轉賒眼底迢迢皆客路草鞋今夜脫誰家贈桃溪法華經會一會靈山曾見不聲前句後莫輕酬碧桃溪上三更月龍女明珠夜不𭣣贈鐵山道人禮補陀脚跟下鐵山萬仞眼睛頭白浪千尋不於這裏承當去更要重叅觀世音送澄上人之江西大江西去水無垠澄不清兮攪不渾一吸直教乾到底莫將涓滴上人門題廬山佛手巖清淨身中金色臂匡廬疊疊曉雲開為人隻手無伸處且聽勞生空望崖匄者堂失火就死者數人乞兒男女苦相煎拶得無明火現前一夜渾家都喪𨚫死枯髏上不生煙題十六尊者揭厲圖十六高人去就輕天台南嶽任縱橫不知著甚麼死急箇箇拖泥帶水行次韻酬李仲思宰相四首晴雲萬疊𮖐羣山崖瀑千尋落樹間定裏驚傳王駕至秪應來奪老僧閒歸鞭未舉且婆娑平地須知險處多休把世間名字相累他巖穴病頭陀物我遷流興未疲正圖誇勝與稱奇逝多林裏真慈父也把空拳嚇小兒機裏藏機復見機秋霜點點透征衣話殘夜壑三更月又約天雲擁毳歸晦室千燈不照六牎寒光影俱忘始解看三萬二千人去後至今門戶黑漫漫逆流出源便遇打頭風不與尋常逝水同浩浩狂瀾到底更無涓滴肯朝東藏山等閒掇轉太虛空百億須彌不露蹤盡大地人尋不見是誰𭣣在一塵中送空藏主禮高峯和尚三尺毒蛇潛古洞一堆白骨鎻寒雲石樓夜半關猶啟只待衘𡨚負屈人贈鄱陽裁衣李生番水一條生白線廬山半幅舊青羅李生提我袈裟角補得渾侖不欠多客中聞訃訃音遺我客牀頭話到輪回鬼亦愁肉眼未空今古夢滿天霜月曬枯髏太古七日莊周才鑿破百千諸佛未投胎衲僧一箇閒名字端的親從那畔來次韻酬馮海粟待制四首無言童子拂香臺報道長沙學士來爛煑橘皮砂罐冷幾年生意喜潛回雄談辯振玄音莫把黃銅喚作金脫略語言文字外方知佛祖只傳心西天目頂望錢塘佛與眾生共一航六月火雲飛白雪是誰觸熱是誰凉瓦爐燒盡栢根香筆債何須苦用償幸有頓空文字在披衣終日坐茅堂別友十首色空明暗遮雙眼地水火風周一身八萬四千閒妄想江南江北幾多人世有百千閒日月人無一點好身心知他為甚麼邊事添得茫茫業海深一死由來對一生了知迷悟不多爭如何滿地栽荊𣗥白日青天沒路行千里路行千里馬一重山隱一重人都緣昧却從來底日夜紛紛輥六塵佛與眾生共一家了知法性等無差何緣白日隨他去特地新栽眼上華世間只是許多事更要如之與若何盡大地人剛不省前娑婆又後娑婆兩兔兩丸虛跳躑象龍千里謾追尋誰知優鉢曇華種當處出生無古今十方世界鐵渾侖順逆橫開不二門更向是非中薦取何妨無佛處稱尊憎愛是非情易瞥山河大地跡難𭣣故鄉人寄并州剪拈起虛空也斷頭十虛圓𮖐一爿天這裏何曾異那邊勿謂去來無管帶道人行處合如然音釋窖古考切譴詰戰切責也艣郎古切進船器似槳而長嶔音欹嶔音欽嶔山不正貌藞苴藞力瓦切苴側下切篾莫結切析竹筠也襯初覲切隳許規切毀也𩍐正作鐙丁鄧切鞍𩍐也薅呼高切去田草也音感覆也

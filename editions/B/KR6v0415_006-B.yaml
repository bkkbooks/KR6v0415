body:
  text: 叅學門人北庭臣僧慈寂上進書問答瀋王書來書附弟子太尉瀋王王璋頓首百拜和南天目中峯和尚大禪師座下惟璋眇德叨預天婣爵祿雖榮常遵佛化仰靈山之付囑懷覺樹之潜輝每對真容誠切瞻戀至於修崇勝事聽演教乘頗嘗及矣而禪宗向上一著罔知所趣伏審吾師道傳天目名簡帝心良以江山迢遙尚阻執侍渴仰醍醐思霑化雨極懸懸也緬想天人叶賛法候勝常今專遣洪鑰謹齎信香代伸禮敬久嚮和尚養高泉石他方多請住持曾未垂諾柰無相法身欲隱彌露曷若出世度生廣開利益然聞江南靈蹤聖境久欲遊觀秋冬間儻得旨南來首當叅扣願興悲濟先此布區區幸祈法照某為學既昧於道無聞厠影僧園濫叨田服捫心揆己夙夜恐惶伏惟閤下位冠百辟爵居名王天婣懿親為國尊行性海巨筏為佛雄藩仁聲仁聞被乎寰區有德有言無愧簡𠕋顧某何人敢當垂念過蒙洪叅軍與奇長老冒塵觸暍徒步登山出王鈞緘侑之厚幣辭情𢢽𢢽自敵以下有不敢當者而况大王年德名位振耀皇家者哉盥沐熏香對信使展讀雖山林泉石增助光潤其如某之愧悚何觀信使之聦明有以知大王之通貫無礙也因與信使話及世尊於二千年外將過去諸佛已轉法輪一音演唱而諸弟子結集為一大藏教布之寰宇實祛情遣妄指瑕指玼之無上法寶當時一印印定迨今無所加王亦於過去佛所親蒙授記其大施之門已甞啟於彼而乃應於今日也豈惟應於今日將見綿續不斷入未來際不可窺其涯涘者矣故佛以智慧而現法藏王以布施而廣經教布施乃六度之首智慧乃六度之終咸具波羅蜜體而無間然者也夫有文字相是謂教離文字相是謂禪即其所有而離是謂功德惟其所離而有是謂莊嚴如是至理在王己分有自來矣茲承示諭於禪門向上一著子未有所聞似不勞過遜也然禪門言向上向下者乃一時建立之方便巧辭非實有也記昔僧問古德曰學人不識佛乞師指示德曰我言恐儞不信僧曰和尚重言焉敢不信德曰即儞便是僧曰如何保任德曰一翳在目空花亂墜後有尊宿舉此公案乃云古德答此僧所問如百二十斤重擔此僧一肩荷負驀直便行更不回顧可謂有力者也此說安有向上者哉貴在信根猛利决定不退轉久之無有不獲其悟入者管見若此又承諭及某不肯住持之說斯言似為過情使某苟有一毫利益於人而獨擅其退休閑逸之計不思法道之隆替誠法門之罪人也正以自救不暇故當退遁豈有它哉惟王諒之聞王駕有江南遊覽之念夫以王心虛明物境洞照能徧涉法界於不動神情之頃恐不待走輕車策駿駟然後為得也信筆覼縷山野無文下情不勝媿汗之至伏幸矜悉與嗣瀋王某一介魯鈍分守窮山頗知佛祖之道為濟世舟航以其自救未能焉敢濫膺主法者之任不謂過情之譽上干尊王海印大居士之聽遠賜寶緘委洪叅軍奇長老冒暑入山焚香展誦感愧奚文因話次奇長老宣傳玉旨俾書法語一篇以資玄路切謂一國之主遊刃羣機以寧海宇何暇存神內典以親方外之學乎教中有言菩薩夙乘般若智力示為人主以夙習濃厚不為富貴之所籠絡於六波羅蜜四無量心念念策勛念念成就未嘗斯須暫忘者殆非一生兩生為人主也何以知其然十金之家沉酣五欲不暇他顧而况富有國土乃爾孜孜于聖賢之道非夙植德本何能若此惟是富貴易於移人故佛許之以生生修證成熟菩提然禪宗門下以無修而修絕證而證無修故直見自心絕證故見心即佛心不可見以悟為見佛不可即忘悟為即故古宿謂學以悟為難悟以忘為難忘以行為難如是三難初無定論在信根之深淺志願之重輕耳惟王之信根决定是深志願天然其重若夫信根不深志願不重則應念為諸欲因緣所移安肯寄音於無似野僧需入道之語耶教中有天鼓忽鳴謂諸天子曰諸法苦空無有真實勿貪五欲以快一時當力求道果以悟本來然本來既悟回觀天樂特夢幻爾學道有三種正見第一要念得生死無常大事真切畢其形命不肯放過第二要識破一切世間憎愛是非緣境不使一塵為障為惑第三要辦取一片長遠决定身心歲月愈久而志願益精假使久無所入雖三生五生亦不知其疲倦久之更無有不成就者或者謂道在一切處道在平常中只要人一切時中忘思絕慮當念無心無心即道舍此復有何實法與人自取纏縛然此說亦未嘗不是殊不知未盡善也何則只如說箇無心且心既曰無復教何人知其為無耶苟存所知則不得為無心矣或無所知則又同木石所以宗門中事須求妙悟謂悟者何悟此心耳此心既悟則曰有曰無俱成剩語前代諸尊宿與國王大臣酬酢此道初不曾有做工夫之說惟是單提此事俾之言下領悟後來法久成弊但欲會禪多將情意識穿鑿解會但說得相似蓋不曾忘心契悟生死岸頭了無交涉近代師僧不奈何將箇無義味話頭置之學人懷抱命其朝叅夕究起大疑情叅到心空念泯之際不覺不知以之悟入惟此一門最為允當聞王興隆三寶備作佛事獨不知於此事上曾究竟不如未留意因記得僧問古德云一念不起還有過也無德云須彌山日用中不妨舉此話默默自看如何是須彌山且須彌山之意作麼生道但與麼舉起來叅取政當叅時都不妨治國齊家營福修善等事於此等事上亦不妨叅此話頭久久純熟忽爾開悟思老釋迦棄王宮入雪山見明星將謂有多少奇特元來鳳池淵底龍床角頭雖去二千年曾無一髮少間然後以此道治國則國無不治理民則民無不安崇福則福無不資祈壽則壽無不永豈特此為然以至莊嚴真法界成就佛菩提無所施而不可管見若此惟王諒之答高麗白尚書二使者至捧出珍翰兼承奇惠物意隆厚自非閣下篤信正法何以得茲蒙以四疑下問謹依來問一一奉答一來問坐禪或云不在坐但四威儀中令心無放逸此可信乎答梵語禪那此名思惟修亦名寂滅乃指一心之極致也教中有四種禪皆人天聲聞沉空滯寂用心偏向故少林不取焉今之藂林稱禪者遠宗少林單傳一心之要旨也此心遍在行住坐臥之間不局於一隅也雖不在坐亦不離坐也今之人但知不在坐而不知不離坐也苟知不離坐則終日坐又何傷焉或不了此心謂不在坐則近狂蕩謂不離坐則近執縛二俱異見非至理也謂坐禪者必欲以悟心為本此心既悟則四威儀皆是坐時此心未悟雖不離坐實未曾坐也二來問一切佛經不解佛意但口常讀於理上亦有小功德否答佛說一切經教為破執遣疑而設焉以世尊真實之說不虛凡執卷即獲勝利其言獲利者一以如來真實願力所致二以自己信心所成凡閱經教獲利之途非止一端隨其信向之淺深所蒙利益之優劣俱不能外乎信心也且如展卷信云獲福即得福信云獲慧即得慧信云滅罪而罪即隨滅或不以信雖但口誦亦沾利益蓋聖人之至言非鄙俗游談之比曰功曰德云胡不具哉三來問別法謂佛說一切法皆是佛法如何更說別法此是落階級之法耶生天之法耶答教中有緫別二義緫者諸佛所致之一心也別者乃諸佛隨宜演唱之方便事也須知緫不異別即一心現萬法也別不離緫惟萬法皆一心也法無心外之法心非法外之心但迷悟之自分耳心迷故但見別法無緫名心悟故惟知一切皆緫名佛法更無一物非緫也但除却佛法大緫持相不問生天生人生十法界中皆是階級也四來問在家菩薩謂眼前妻子奴婢全然障道之本何名為菩薩此疑妄說答昔維摩居士謂無住為家舍大慈悲為父隨順菩薩母柔和忍辱妻智慧名為子方便即奴婢如是而受者名在家菩薩雖未獲如是解脫使置身於五欲塵勞者但存一念信佛法之正心念念欲遠離塵勞雖未即清淨亦可稱菩薩蓋菩薩之稱乃梵語耳華言道心但有向道之心則菩薩亦可通稱也極理言之佛法無二無別緫因一心建立心悟故山青水綠鵲噪鴉鳴更無一點不是佛法心迷故花池寶樹王殿瓊樓更無一點不是世間法一大藏教祖師西來只要人悟此心自然一一不被差別名相所礙所以古人道夢裏明明有六趣覺後空空無大千如今必欲要驚覺夢中所具之境別無方便但請發起一念决定信心叅箇四大分散時向何處安身立命話盡此餘生密密叅究久遠不退廓悟自心此心既明則世出世間聖凡差別一念混融更不容別有一法為分別也某雖未克瞻對其體道之論不過如此古人云但辦肯心决不相賺與海粟居士馮待制子振曩辱下訪繼領詩章枯槁之蹤過蒙提獎何以得此哉尋聞閤下奉旨入覲而某亦理浮遊之棹走淮沂汳又復三年別來不識閤下於此道上能精加念力不今古利達之士靡不知三界是大夢宅苟不曾一回親切警悟則與此所知之心俱落夢寐故吾法中目之曰所知障是也此障鈍根人無分惟利達者有之故少林初祖只令人外絕諸緣內心無喘心如墻壁乃可入道肯將胷中解會底百千道理猛與截斷俾之如墻壁一回忽爾於墻壁處孔竇豁開千差萬別一以貫之曾何悟迷之有異同耶或孔竇不即開豁但令久持而不忘縱使盡生不了當鍼芥相投於異世矣安有虛棄之理哉所以佛祖教人深信而不疑惟閤下於吾道信根未嘗不深獨未見其於信處能脫略所知不世間浮光幻影能幾何時向者鄙偈中有披衣終日坐茅堂之句嘗蒙閤下許我以踐之今日所謂貧人索舊債也與大覺長老大覺泰定叟也皇慶間瞿運使霆𤼵屢請師住大覺師力辭舉定叟應命叟甞歷職於開先一山萬和尚會中後復叅師及出世欲改嗣師師以是書却之令嗣一山初六日分袂不及拜送懸情依依未能暫忘昨者坐語未及他論而首以住院承嗣扣之者惟恐足下苟徇世諦故也某與足下納交十六年彼此心懷洞然明白豈意足下不諒愚情反欲相及何臨事覆若此耶古人於法嗣嫡傳所以深明宗系者大法源委不可誣也世漓俗薄奉金請拂以院易嗣者有之某嘗痛心於此夫大覺雖先師開山然十方叢林儘有尊宿捨彼不取而必欲某尸之何識量之不廣也某非畏住持實畏嗣法於開山也故退避力辭而舉足下為之主政以足下自師一山禪師豈可苟徇世俗而易其所師哉由此言之某猶不欲以先師坐下人迭尸大覺而况牽枝引蔓欲為某之嗣乎聞命駭然專浼逆流主預此拜聞望以玉峽之音直與拈出或欲徇俗易嗣則某斷然不敢與足下一日相聚也至扣至扣音釋婣伊真切壻家也緬彌典切遠也鑰以灼切齎祖兮切持也捫莫昆切撫也揆巨癸切度也尊行行下浪切輩行也暍於歇切傷暑也𢢽口很切𢢽𢢽欵誠之意盥古玩切澡手也悚自拱切懼也覼縷覼力切縷力主切覼縷委曲也泝汳泝桑故切逆流曰泝汳皮變切與汁同漓呂支切澆也徇松閏切從也浼毋罪切污也

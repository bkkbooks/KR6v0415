body:
  text: 叅學門人北庭臣僧慈寂上進偈頌送斷崖禪師遊五臺五臺山在天之北師子吼處乾坤窄我兄曾解師子鈴擬向山中探幽賾文殊老人雙眼黑一萬菩薩滿坐莓苔石只憑倒卓鐵蒺藜一齊趂入無生國諸子去時誰繼踵盡將五臺攝入草鞋雙耳孔虛空滿貯赤玻瓈笑看祕魔巖石動歸來說與傍人知德山臨濟皆兒嬉今生元無佛與祖就手𫼡折烏藤枝坐斷高高峯頂那一著銀山鐵壁人難窺思少林九載面空壁千古萬古知誰知信手拈起一莖草緫是金毛師子威扣皖山隱者野人原上十五里寒崖白日啼山鬼萬峯重疊路回旋半間箬屋青松底老僧荷鍤入煙霞滿林搖落朱藤華燒田種寒粟斸地栽胡麻雲根撥笋澗底尋茶糞火深埋魁芋種砂瓶爛煑黃菁芽人謂隱者閒不足何故山翁事驅逐山翁笑指溪上桃庭前竹春風幾度更新綠香嚴不作靈雲死徒有是非喧兩耳爭似儂家百不知從教少室分皮髓送儔都寺監收世上共言人種田不知却是田種人但見烏頭看田水俄然白骨埋黃塵轉眸又作烏頭子依舊重來看田水田水洋洋似笑人入死出生元是你農夫見說心欲折歸來轉犂頭鐵不耕田水耕虛空不種青苗種明月虛空可耕明月可種先以智拔後以定動白牛露地生拽回即此用兮離此用大千撮來一粒粟鉢飯摶歸香積國靈山問訊老瞿曇福慧由來二俱足有問禪兩堤楊柳含青煙有問道一片斜陽臥芳草江頭袞袞搖世波古岸移舟宜自保送燈副寺監𭣣松江江上莊中底萬廩千倉且非米檀翁一片鐵石心歲去年來磨不已粒粒盡是金剛圈粒粒盡是鐵彈子出生勝妙性功德轉入恒沙福無比莫教拋散一粒在路傍莫教誤入一粒歸自己勿欺一粒如此微塵沙法界從茲起焦脣燄口鬼亦嫌輪回業果無終始撥開罪福異路行一點真燈光萬里照開蓮華峯頂選佛場伐鼓考鐘宣要旨歸來重把簿書看妙用神通只此是秋夜述古蛩聲唧唧鴈聲嚦嚦病葉落空階清籟鳴空隙客來叩我白雲房三遶禪牀振金錫玄音落落不覆藏更加一語成狼藉擬來此處尋聲跡萬里秋風有何極丈夫何事不肯休直欲叅天起荊棘九載少林窮的的一宿曹溪浮逼逼偃溪流水香嚴擊切忌隨他那邊覔良由眼聽與心聞疾燄過風俱莫及威音那畔空刼前底事何曾異今日幻住道人都不識柴扉晝掩千山碧寒莎葉底露沉沉煙外數聲牛背笛客既無言我亦休橫眠一覺青茅席夢裏忽聞蕭騷淅瀝何處生覺來元是山雨四櫩聲滴滴留別馮居士片片秋雲飛瑟瑟秋風吹團團秋月白英英秋露𡸁道人挑起七斤山衲衣回首萬里外復覔青山歸倚松臥石飲溪飯藜眼空佛祖口掛壁從教四海相追隨珍重長安市上長者子莫教貪著五欲樂住火宅如兒嬉大白牛車在門外轉身便可縱橫推莫教推不動墮在途轍中我有鐵鞭懸屋角不勞搖影行如風君如要見我鞭影大江日夜流天東贈鏡堂一洲二座主鏡堂之鏡不照象草木雲煙自消長一洲之洲不容物清波浸爛虛空骨夏前握手登西峯江湖盡謂來更宗天台少林共一舌禪關教網俱相通有問教古鏡堂前風浩浩有問禪一洲風靜波影圓生死輪回機不破教禪緫是心王禍道人論實不論虚肯為世間聞見墮西風兩袖下嵯峨七尺烏藤拂薜蘿長安市上眼前事不啻周身毛孔多阿呵呵與麼與麼一外不知洲際遠堂前無柰鏡光何送聞上人歸南山己躬下事作麼叅木人笑倚青蘿龕己躬下事如何委瞬目白雲千萬里上人念念扣己躬去年橫錫來西峯眉毛廝結住一載己躬下事深如海秋風吹動碧海門己躬下事俱休論娑婆世界浮漚幾出沒銀山鐵壁元無根靈山密付少室單傳不立文字已墮言詮己躬下事俱不然當機非道尤非禪一塵覆却四大海一步跨闊三禪天南山突兀幾千仞青松翠竹摩蒼煙極目無非舊途轍己躬下事瞥不瞥脚未跨門先轉身重來共看中秋月船居述懷道人行處無途轍買得船兒小如葉終朝縮頸坐蓬牎聞見覺知俱泯絕往來解纜橫大江逆風衝破千堆雪或行或住人莫猜兩岸中流靡經涉也無橈可擎也無棹可舉更打船舷俱不許古帆未掛天地空森羅萬象忘賔主或隨順水下前灘西天此土無遮攔古今千萬箇佛祖出沒漚華誰共看我船有時撑不動藏在蟭螟眼睛孔我船有時挽不回五須彌頂波濤湧我船不載空百千奇貨皆含容我船不載有毛髮更教誰納受說有說無誰辨的問著篙工都不識但見海東紅日曬彎梁柳西斜月穿蘆席有時四面雲雨收波光萬里沉虛碧當處不知我是船亦復不知船是我勿將空有論踈親船與非船無不可歸去來是甚麼推開煙浪望雲頭突出好山青朶朶火記并引皇慶壬子冬艤舟于漣海洪福院側剪茭蘆縛屋丈許以居越五日工畢道者煨秕糠以乾壁土至後夜丙丁童子逸出簷外而火之實十月二十七夜四鼓也因思先師居龍須山時亦有此事故書偈以記之新縛茅屋壁未乾頭陀不耐冰霜寒盛把十斛真珠殼牀頭午夜俱煨殘舞馬濳蹤穿屋角霧捲茭蘆鳴嚗嚗河神禁水凍不開星燄騰輝射寥廓頭陀跳出虛空外摸著虛空無向背須對月掃寒灰發明幻住真三昧緬想龍須炙壁時造物端若重吾欺雪磴九年生鐵脊於斯寧敢忘先師又憶當年老婆子縱火偷心元不死驚回枯木倚寒巖是非涉入兒童耳我生五十未曾親見火燒屋但聞水底火發燒破無生國虛空撥出死柴頭手搓十丈龜毛束幻法由來無斷續尺地不妨重卜築一把茭蘆又縛成漣海依前青溢目校訛三十九葉第一行目下多山字今刪去十下少七字今補足三十九葉十六行和南作荷音釋鍤測洽切鍫也斸朱欲切𠜾也瞬舒潤切目動也嚗必角切磴丁鄧切石磴也搓倉何切

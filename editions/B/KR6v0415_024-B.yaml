body:
  text: 叅學門人北庭臣僧慈寂上進序送宗遇上人省親序昔慈明和尚持銀盆為母氏壽母曰子盡棄所愛而出家今返持此為獻將累我於地下矣慈明自爾奮志叅方為一代大法主盟蓋慈母所警發也石䆫和尚輔佐天童法席一日歸省其母母曰子出家己事未辦何暇閒工夫為眾耶䆫乃告曰雖炙一燈亦分自他之用實不敢以因果累母也母笑曰然過水那得不打脚濕夫二祖師之母雖跡混塵俗觀其吐辭出語峻如鐵壁肅若秋霜殆老師宿衲之不是過今之父母遣子出家莫不望其榮家利俗者雖地獄門開不暇顧則彼此優劣何如哉雖然有是二母之賢亦有是二子副之也使其二子不力於道陸沉於長行粥飯僧中將與母之格言俱無聞於世矣然二母之賢世亦未甞無也如二子之賢克荷宗乘力弘斯道以顯母氏之名於百世之下者則鮮矣以要言之全在子之盡心於道以光像季法輪政不在父母之賢不也苟摩耶之聖而悉達不能持堅牢願力為大法王安有佛母之名流布於此土哉廬陵遇上人旋里省母出紙求語乃發余緒言以策其不逮云送明然上人居山序古之善輔叢林者皆非苟然也有以道輔之有以才智輔之有以力輔之有以身命輔之是皆舍逸趨勞棄甘就苦至於衝寒冒暑含耻忍垢惟孜孜播真風揚道化以振末學為念嗟乎古今之下凡有道尊宿起于一方而波旬之徒往往謗聲四合矧無道者乎然其謗之之聲未及尊宿所聞而先入乎輔者之耳苟非金剛正眼洞燭幽微莫不遭其惑者余兩結草廬有明然上人者忘其所惑以相輔及歸家山主院之三年歲荐饑饉而我二千指宴坐空山十利之具陳三德之畢備至于望門而來者咸使之飫飽禪悅要其所自皆上人匄食以輔之也今余將謝事上人以匄食之鉢懸之太虛空中擬俟彌勒下生復從而輔之誓不入他人行戶也因疑而問之余豈有道尊宿者哉當此象龍蹴踏八面昇騰皆期爾以輔之無乃太峻乎上人作而為歌曰水邊有山可以縛茅廬山中有屋可以藏幻軀屋下有柴牀可以結雙趺牀前有尺土可以開地爐所以無用者一箇黑鉢盂既無著處懸之太虛我非所輔休塗糊天高地遠道何孤惟有斂袵退縮真良圖極目誰非大丈夫不須特地做規模豈不見釋迦老子二千年外黃金髑髏也會枯謾言遺臭在江湖爭似我自今已去不為一物度朝晡佛法從教說有無止止堂偈序余聞真寂不動之體與奔匯之水行空之雲逐日之蹄摶風之翮無間然也嗟夫人之未悟妄見遷流卒莫之已如小兒旋走見屋廬動是故聖人垂善巧方便教之令止謂止者何息也定也安住不動寂滅無為者也外止其境內止其心止境於外則心無所迷止心於內則境無所惑且不惑於境即境惟心不迷於心即心惟境心乎境乎止止之義明矣或曰心可止乎境可止乎謂心可止則益其迷謂境可止則滋其惑矣如教中謂是法住法位世間相常住審如是則心可止乎境可止乎不然如是法住法位止也世間相常住亦止也子或未至言語道斷心行處滅之地擬逃吾止止之說猶日中之避影也雖然殊不知言語道斷心行處滅亦未甞不在吾止止之間是謂無止之止性體本具雖三世佛祖見超物表識達機先未有能出吾止止之義者天竺靈山法師某講觀之暇甞搆精舍於越山扁其堂曰止止或問其故乃曰吾之所聞異於是蓋非心思言議之所能及也遂為之歌歌曰萬境之體詮曰心一心之用表為境道人非境亦非心心境俱非非亦泯止止之名堂兮奚語默動靜之所該堂之名止止兮豈思惟分別之能領止非止兮我獨知非止止兮人莫省一團風月啓晴櫩萬象森羅照清影設利偈序設利之體圓常湛寂充塞法界無處不有隨眾生心循業發現金剛不可比其堅日月不可奪其耀豈肉眼所能識哉自靈山以降此土西天散為種種佛事若必以色像求之不惟不識設利而亦重欺佛祖也甞有信士得先師所剪髮安奉久之忽設利纍纍如貫珠遠近傳唱觀者踵至先師聞之累欲奪而委諸穢壤今祖意上人亦得於遺髮之表及蒙山闍維之餘并辟支佛所遺者珍藏秘護以為至寶然蒙山辟支固非我所知者而先師實無此物謂其有乃謗先師也上人即啟函而示余曰贓物見在爾何諱焉余於是說偈以解之偈曰圓明湛寂真設利靈燄神光貫三際開士由之百福尊菩薩依之二嚴備十萬里傳西祖意五色祥光吞大地棒喝交馳珠走盤覿面相呈無忌諱先師一髮不留根勿將聲色輕相戲百寶摩尼一顆珠非俗非真非聖諦五目不得覩其蹤十聖那能知子細上人如未獲此珠懸崖撒手非容易驪龍頷下月團團禹門千尺還重閉赤手推開逴得歸有意氣兮添意氣回觀八斛四斗多添得眾生眼中翳觀音菩薩補陀巖示現偈序觀世音菩薩以太虛空為體以五須彌為寶髻四大海為口門日月兩曜為眼光森羅萬象為垂身瓔珞一切眾生於其毛孔裏出生入死由是菩薩以此興大悲心發無上願施十四無畏現三十二身上合諸佛慈心下應眾生悲仰無端被吾兩淛運使琴軒瞿公向小白華巖偷眼一看直得無地藏身文彩彌露乃援毫引墨盡意發揮時有梅山喜公奮辭舞筆作為長篇揭露殆盡而海粟待制以雄才豪辯向無所見處議論風生筆舌雷動但末後一句留以遺幻住子同為證明乃為說偈以𭣣之偈曰妙圓通體超諸礙包𮖐色空含法界見與不見二俱離始識大悲觀自在琴軒居士佛眼通白華巖畔追靈蹤狹路相逢避不及似鏡照鏡空合空引墨援毫書所見揭破浮雲呈日面盡十方空一普門妙相塵塵俱露現梅華山裏老禪翁滄海一粟夫子馮浩浩春雷鼓筆舌巨篇長偈真豪雄俾我重圓末後句口縫未開先吐露若以耳聞非所聞不以耳聞非所據我昔曾遊碧海東海王抱日扶桑紅怒浪搖金光閃爍照開朶朶青芙蓉無位真人潛洞府洞裏潮音喧萬皷珊瑚樹頭月徘徊水晶簾外蛟龍舞波神拔劒驅長鯨吞空浪雪粘青冥撒出龍堂珠萬斛寳光射透瑠璃屏法身驚入一毛孔一毛孔裏波濤涌爾時大士失却盤陀石上吉祥草與薝蔔華但見玉煙翠霧埋雙踵有眼共見耳共聞妙圓通體鐵渾侖最初末後句非句萬里潮聲撼海門觀音菩薩瑞相偈序聖人無體隨念斯彰念興則諸聖同叅念泯則一真絕待以吾莊嚴善功德心即觀世音之寶冠瓔珞也以吾確乎不可拔之正念即觀世音所坐之盤陀巖石也以吾慈悲利物深廣之誓願即觀世音所居之大海也以吾親近聖賢叅隨不倦即觀世音之善財童子也以吾寬厚仁慈以恭以敬即奉觀世音之月蓋長者也以吾一切處不違菩薩願不捨大悲心即觀世音三十二應之妙色身也以吾居一切處遇順遇逆了無畏怯即觀世音十四無畏法也昔丞相史公躬詣海岸不獲瞻覩方生慢易回首惟見碧芙蕖華萬朶芬披隨浪而現遂勒石以記其事非現宰官身說法而何至大四年兩淛運使瞿公霆發按部鄞郡放舟直駕巖下首覩聖像毛髮不遺即命工造其所覩之像者二一奉之鶴砂普福院一奉之天目大覺正宗禪寺皆公施心所現之伽藍也復以誠心所現之觀世音歸之得不宜乎公自述記文一篇以示無窮之信此又非現宰官身說法而何公甞囑余序之後五年為延祐乙卯公之子時學刻其記文隨大士像置之可觀樓上復俾予筆以記之既不得辭贅之以偈心鏡光明皎如月聖人智體無生滅一念纔興即現前古今凡聖相融攝海岸人招海岸人不知誰現宰官身紫金光聚圓通體應現何曾隔一塵萬峯圍繞蓮華國龍象倚闌看不足鼓鐘鏜鞳間燈香出生世代光明福示善助道者居山序至大戊申冬余謝院事之明年將荷五臺之策有善助道者從余遊抵淮隂道阻遂返棹儀真助乃操吾舟絕大江至鐵甕城下束短髮易小袖練裙烏帽舉止便捷剌篙川行引繩岸牽風帆怒張𭣣縱不違雨篷平鋪掀覆以時柂之轉摺縈如游龍纜之解縛操持若神其素服篙師之役者皆推其能至若寒暑晦冥風霜雨雪篙師告憊而助益治舟無惰容又明年客有促吾舟而命之歸者助趨吾前乃逆問之曰舟在乎曰將舍之曰汝操舟之藝在乎曰將棄之若然則無所復用於汝也助無以對乃謂之曰汝甞駕吾舟於要匯空繩網布峻檣林立舳艫交錯過若行雲開闔萬變而汝之心目與手為之一貫少失顧盻則互相衝擊殆四山交逼之不若也故菩薩子操第一義諦之舟與一切是非聲色交接於三有要匯亦如是也使暫時不在墮于順逆之淵又不止於相衝擊也今將罷若役復若形放汝林下苟能一注其衝擊解紛之心目於平居宴處間則道可學禪可叅生死可了煩惱可斷無施而不可者審如是則舟可舍乎藝可棄乎豈無用耶安有用耶汝其不委吾復為汝歌之歌曰去年放吾之舟兮絕長江之迅流今年藏吾之舟兮將返乎山丘假汝操之之術兮吾乘之而遠遊視今昔之大幻兮傾逆浪之輕漚勿謂無吾之舟兮將舍是而何求勿謂有吾之舟兮離蹤跡之去留憶昔佛與祖兮以慈為舟葦為舟盃為舟鐵為舟更有一箇大闡提漢要以大地撑為舟如是之舟汝能操不如其不委兮提起從前閒話頭挨拶不入處一齊透過吸乾鯨海兮萬象全𭣣生死無拘兮誰與儔一華五葉序先師枯槁身心於巖穴之下畢世不改其操人或高之必蹙頞以告之曰此吾定分使拘此行欲矯世逆俗則罪何可逃余竊聆其說私有所得閱二十年每與同叅道者俯首茅茨論及之不覺成編題為山房夜話又擬寒山百首以寓禪叅之旨復閱楞嚴因講學者致詰遂假或問以答之又以禪者不求心悟惟尚言通例引信心銘為證故辭而闢之以破其義解及幻跡所至結茅以居皆名幻住勉為相從者所請引起葛藤故稱家訓前後成篇者五戲以一華五葉目之亟欲投之水火時幻眾曰一華是幻五葉亦幻幻無自性任其安立使棄之却成實法流布也請序其所以昭示來者由是振筆以從之非敢與大方之家共焉一華五葉後序少室一華開五葉狼藉叢林豈堪說刼外春風吹幻根幽芳似向枝頭泄山房夜話話無端波斯嚼冰牙齒寒黃金鑄成泥彈子白日青天誰共看謾擬寒山詩百首重重語不離窠臼靈龜曳尾跡何多笑破虛空半邊口那堪註解信心銘剛以不平攻不平葛藤露布拽不斷瞎却空王雙眼睛况是靈山巧徵辯心既無心見何見阿難逼得口生膠一棚傀儡無方便幻住菴甞歌一篇又將家訓錯流傳為人一句沒牆壁飯飽弄筯誰不然自買由來還自賣豈但傍觀生笑怪都緣口業未易消乃爾償他文字債幻人拍掌笑呵呵蟭螟奮怒吞禪河南泉問主趙州勘婆祕魔义下神號鬼哭雲門顧外虎視鷹拏摟空師子窟掃盡野狐窠一華五葉還如何長處更無多延祐丙辰冬幻住沙門明本復說此偈以為後序云校訛七十五葉第九行垂誤作乖從南改正七十八葉第十行頭南作頂七十八葉十九行盤南作補音釋逴敕角切鏜鞳鏜音湯鞳吐合切鏜鞳鐘鼓聲憊蒲拜切病也匯胡對切水回合也舳艫舳音軸船後持柁處艫音盧船頭剌櫂處傀儡傀苦猥切儡魯猥切摟力侯切探取也

body:
  text: 叅學門人北庭臣僧慈寂上進佛祖讚盧舍那佛讚并序佛身無相隨念現形佛身無為依作而住當其念之未起作之未興所謂佛身與虛空合有劒門上人智慧者嘗發大心刺十指血染雜華藏海之文八十一軸以其筋膜日積月累聚為舍那佛像經書既畢佛身亦圓高二寸許眉目可覩毛髮微露冠纓衣褶靡不分明飾以黃金奉以朱隨處供養惟見若聞莫不稱異彼上人者返觀十指了無痕跡經自何來佛從何見初心既滅所作亦忘惟佛與經昭然不隱如是了知盡法界性及微塵剎起滅不停動靜無間如我佛身等無有異以此一盧舍那依幻而見如是了知百億盧舍那大而虛空身小而微塵身未有一佛不依幻而見者以其所見白於幻住比丘明本於是歡喜合掌而說伽陀以讚之稽首盧舍那安住雜華藏金色妙相好燦如日月輪縮作二寸身從十指中現指相寂不動現理無所為悟此舍那身虛空微塵等靡不依幻住法界本空寂上人悟佛身而獲性常住如是功德聚微妙難可測我作如是觀說此妙伽陁與法界眾生同入智慧海釋迦如來十大弟子圖像讚并序釋迦如來展化權於五天之中有聲聞弟子上首者十人各擅一能而如來併其十者之能曾不滿一毛孔之法量何况一一毛孔所容受者豈心思意解而可了知耶故佛法如大海香象一飲十斛而蚊虻不過涓滴各盡其量而後已然十斛與一滴之飽無異特量之大小而所受之多寡不同耳詎謂二千年後能專其一亦未之見烏有所謂兼善其十者乎雖然須知一即十十即一互融互攝全主全賔審如是則上無師尊下無弟子展開圖畫坐立儼然傀儡一棚不加線索眼目定動肯遭𤍠瞞三搭不回更聽說偈稽首迦葉解禪定鉢盂不用重安柄多聞為最阿難陀那事還容記得麼神變目連稱上首忘却家鄉沿路走保綏清禁優波離至體誰言有犯持說法富樓那第一水中捉月爭拈得阿那律多天眼通銀山鐵壁障雙瞳羅睺密行稱無比脚底白雲千萬里論義莫敵迦旃延佛法驢年也現前長老解空為領袖究竟何曾離窠臼身子專開智慧門遇無義語渾侖吞惟有迦文都不會任有弘為俱請退四枯榮樹非斷常竹林冉冉沉蒼翠面面相看何所為行人猶在青山外歷代祖師畫像讚并序世尊教外別傳脫略義解之大旨二十八傳而至菩提達磨大師是為東土第一代禪祖初師觀東震旦人有大乘根噐乃越重溟三周寒暑以梁普通七年抵金陵尋往少林居九載得可祖領荷心法已而翩翩隻履復返流沙五傳至黃梅而橫出牛頭一枝六傳至曹溪則有南嶽青原派而為二自南嶽青原而下宗而為五南嶽出馬祖祖出百丈丈出黃檗檗出臨濟濟以金剛王寶劒之喝雷轟霆震不容掩耳別傳之道由斯而盛濟十七傳而至仰山雪巖和尚先師入巖翁之室於羣弟子未造之先誤中其毒口耳俱喪既而深棲天目影不出山三十年無一法與人領荷杭之妙行寺甞集五宗傳道之師遺像數千軸每遇歲旦展挂緇白瞻禮目之曰祖師會有好事者圖少林至天目直下相承二十八代祖師遺像歲遇少林諱日薦羞粢盛以酬遞代傳持之德明本為述小傳并偈以賛之小傳不錄少林初祖圓覺大師菩提達磨大法資始妙存直指唯不可藏汝得吾髓二祖大祖禪師慧可雪腰刃臂忘已安心十萬里師芥投以鍼三祖鑑智禪師僧璨達罪性空為法作則信此心兮唯嫌揀擇四祖大醫禪師道信縛脫兩忘威武莫屈破頭山高一枝橫出五祖大滿禪師弘忍青松未老室女懷胎黃梅東阜五葉華開六祖大鑑禪師慧能縋腰石存風旛話在一滴曹溪雄吞四海南嶽大慧禪師懷讓金雞有讖玉鏡非磚躍天馬駒實資其鞭馬祖大寂禪師道一耽耽虎視足印兩輪其遭踏者八十四人百丈大智禪師懷海不作不食大智惟昌痛難忍處扭折鼻梁黃檗斷際禪師希運神珠在額智鏡潜心棒頭眼活大樹垂隂臨濟慧照禪師義玄用金剛王作師子吼真照無私雷奔電走興化廣濟禪師存獎罰克賔飯削臨濟跡還識老僧投柺而寂汝州南院禪師慧顒同時啐啄電捲星馳未詳終始鐵𮖐摩尼汝州風穴禪師延沼濟北之道遇風欲絕荷負之誠益增餘烈汝州首山禪師省念法華放下拂袖便行動揚古路落壍墮坑汾陽禪師善昭龍袖拂開西河師子停筋便行孰云其死石霜慈明禪師楚圓惑亂神鼎彌縫李楊生機活眼不離平常袁州楊歧禪師方會總院十年親遭教壞突出金圈兒孫遍界舒州白雲禪師守端相逢一笑觸著父諱猛省得來聲光振地東山五祖禪師法演拽海會磨轉東山輪沸騰佛海一遠二勤佛果圓悟真覺禪師克勤錦帳夢回金雞報午陵跨古今蕩除佛祖平江虎丘禪師紹隆拳邊獲見已露一斑最親切處坐視耽耽天童應菴禪師曇華播屋頭春料老虎尾太白峯高甘露門啟天童密菴禪師咸傑投機以句頂門廓徹唯破沙盆萬古一傑破菴密印禪師祖先一菴破壞藞苴無餘瞎金剛眼走玉盤珠徑山無準佛鑑禪師師範用文武火行密化周鳳毛麟角一網齊𭣣仰山雪巖慧朗禪師祖欽機前語活棒頭眼開山河倒走仰嶠再來天目高峯佛日普明廣濟禪師原妙揭開天目坐斷死關峯高萬仞險絕難攀觀音上同諸佛慈心兮天下歸仁焉下合眾生悲仰兮萬物備於我矣若夫覆其頂跣其足周遊於娑婆界中以圓通三昧而為佛事者吁吾無隱乎爾趙教授請少林初祖揚子江心波少林峯頂月寥寥一片心直指成曲折謂其有傳兮胡為乎壁觀九年謂其無傳兮因甚麼花開五葉秋山落木猿晝啼行人眼底流鮮血傳上人請大鵬展翅取龍吞一攪滄溟徹底渾觸碎珊瑚枝上月至今千古暗昏昏遮漢捏怪為欠禪債此土西天重重納敗最初見梁王言不識末後受神光禮三拜凄凄隻履西歸漆桶依前不快似遮般阿師貶向師子巖頭雲蒸霧鎻千百年且看眉毛壞不壞栽松道者種得千山無空地一枝猶挂钁頭邊不因脫賺周家女衣法何緣到你傳粥薪漢子荷條柴檐眼頭空路入黃梅伎已窮賣得叢林枝葉盡嶺南無地種春風馬郎婦深願弘慈無縫𦉑乘時走入眾生界窈窕丰姿都沒賽提魚賣堪笑馬郎來納敗金沙露濕衣裾壞茜裙不把珠纓蓋特地掀開呈捏怪牽人愛曲盡許多菩薩債布袋兜率天宮降人世忘却當來下生記閑家潑具有許多勾引兒童恣游戲袒肩赤膊當神通揚眉瞬目稱三昧奪將拄杖劈頭揮一齊趂入龍華會黑拄杖橫挑布袋轉頭忘了率陀天茫茫不顧肩頭重猶要逢人乞一錢臨濟𡎺三拳於大愚肋下捋虎須於黃檗面門肆一喝如雷砰霆震搖寸舌似電激雲奔掣風顛漢世希有普天匝地皆兒孫趙州腦後萬莖雪面前三尺霜肚裏直儱侗語下絕囊藏勘破臺山婆子大坐平欺趙王萬里海門攔不住遠遺清影過遼陽我只喚作三百年浸漬不朽底陳爛葛藤椿試將此話傳諸方高麗僧請贊丹霞靈照放籃斂手提籃便走弄鬼眼睛自呈拙醜及至歸家舉似爺毒蛇不肯輕開口牛妳無端赤土塗是非從此難分剖郁山主朶朶山河眼裏塵明珠一顆匪家珍至今千古溪橋月看盡驢前馬後人政黃牛跨牛背兮執牛尾一片吟懷淨如洗鷺鷥終日自忘機何曾見儞常來此天童東巖日禪師匡廬山高太白山高較吾圓應老人面門鼻孔猶太虛之一毫腥膻露兮螻旋蟻聚槌拂動兮鬼哭神號雙眸四海空牢牢下視佛祖為兒曹道場及菴信禪師盡十方世界是古佛道場盡十方世界是雙溪橋梁不住而住兮風飛雷厲非成而成兮虎踞龍驤面目現在如何讚揚頷下眉毛十丈長南嶽鐵山瓊禪師向上機若鐵末後句如山既不得而擬議又豈容其躋攀堅密不動湛寂自閑無端將戒定慧三學編作漫天網子向萬里鯨濤之東攔空一撒直得高麗國僧俗二眾沸騰上下奔趨往還腥風遍界絕遮攔逐隊隨群入北關錢塘妙行院祖師會請讚徑山晦機熙禪師面如臨濟三角心似妙喜空廓坐斷大雄峯高踞慧日閣自徑山而至仰山肯受尊卑之束縛是風動旛動心動黑漆竹篦難湊泊風旛寺長老請讚徑山虛谷陵禪師面冷如鐵髮白如雪起集雲萬古法幢追凌霄三世道業奔走象龍掃空魔孽佛祖不敢正視天人咸被慈攝我嘗隔嶺望餘光惟見曇華開五葉天童雲外岫禪師太白峯為屏廿里松為座雲影外藏身幾多人蹉過不蹉過元是隰州古佛再來切忌機前說破且道說破後如何夜明𮆴挂須彌顛走盤珠向空中墮靈雲鐵牛定禪師那伽定裏鑄鐵為牛白雪巖下一握齊𭣣掀聖凡窠臼結盡佛祖冤讎茶陵千仞靈雲寺聲播元朝數百州高峯和尚雙髻六龍須九一十八年師子吼死關已掩三十秋惡聲萬里猶奔走既陷險機親遭毒手一回見面驀上心恩怨難教自分剖義首座請天目三千丈難方高峯之高地獄十八重莫比死關之險我曾親近十餘年不願頻將畫圖展三十年影不出山二六時情不附物逼釋迦達磨生陷鐵圍鞭白牯貍奴立地成佛便是這箇不覩是底阿師坐斷天目山深踞師子窟儞若不是我本師更要罵教儞見骨掃帚兩眉橫塵埃堆面上依俙徐十三郎彷彿高峯和尚松江江上姚道人好把香華勤供養斷崖義禪師撞漫天網解師子鈴情忘義斷石裂崖崩奪龐老金珠高揮大抹將阿爺門戶竪拄橫撑這邊那邊了無覊絆問禪問道不近人情大地山河一片雪話頭流落至今行失脚踏斷懸崖逢人更不安排取性入真入俗一任神猜鬼猜掉臂獨行時拖拽不住狹路相逢處推托不開虛空拔得無根樹要向蟭螟眼上栽中竺布衲雍禪師淛東山淛西水面目儼存真機不倚蓮華峯突兀半天桂子堂腥臊萬里玻瓈誰道匪家珍沉沉法海深無底法海院珍知客請讚校訛五十二葉第四行袖誤作神從南改正五十四葉第三行扭南作搊音釋膜暮各切胲膜也褶陟涉切襞積也傀儡傀口猥切儡落猥切傀儡木偶戲也縫直偽切以繩縣物也柺古買切老人拄杖也啐啄啐即聿切啄竹角切圈丘圓切藞苴藞盧下切莫側下切跣息典切足親地也粥薪粥音育賣也罅呼訝切孔隙也茜倉甸切染絳草名𡎺側六切砰披耕切砰磅聲也奴切乳也臊蘇高切豕膏臭也

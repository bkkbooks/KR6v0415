body:
  text: 叅學門人北庭慈寂進別傳覺心惟圓而覺惟覺而圓非覺無以大其圓非圓無以滿其覺覺不知覺而覺徧自他圓不見圓而圓周彼此謂圓也太虛不足方其形謂覺也靈鑑何能盡其用五嶽止千山之勢圓斯圓乎四溟吞萬派之聲覺斯覺矣佛祖之安宅聖賢之要路塵沙眾生之所戴十二開士之所宗實萬世之指南三界之元龜也曼殊首提本起因地之問至尊特彰圓照淨覺之名指四大標六塵摟碎無明窠窟喻空花方二月滌除生死根塵印迷悟之本虛斥有無而俱遣不存一法於不存處豈礙成褫靡隔一毫向靡隔邊何妨剗削是謂圓常要旨格外真規苟非神悟於機先豈許滯情於語下偈曰首問如來本起因擬相酬處喪天真標圓已陷無明穽謂覺難逃有漏塵出匣太阿那敢觸當臺古鏡若為親未能言外超方便盡是華胥夢裏人空裏月輪奚假再三撈摝木中火燄豈憑逐一推排焦尾巴石虎雄踞雪林無鼻孔鐵牛穩眠露地普賢昧諸幻元生覺海世尊謂真覺猶是幻源離其所離幻上何妨立幻遣其所遣空中更不容空捨方便不滯證修引妄想全歸解脫指石為玉點鐵成金無梯航處設梯航非漸次中言漸次偈曰白牯貍奴咸具足那知具足處難憑千般幻妄元依覺萬種修持緫滯能石虎空中吞皓月波斯夜半嚼寒氷遣情離謂離還遣物物全彰最上乘十方世界即摩尼珠法法依之而影現大千剎土是寶絲網物物仗此而光騰大火聚裏不許藏身塗毒鼓邊豈容側耳普眼向無方便中曲伸請問鴛鴦帳裏春正濃世尊於絕思惟處俯徇來機歌管叢中酒方勸捏聚則地水火風鐵山岌岌放開則見聞知覺玉海沉沉枕邊之槐國夢回室內之蘭膏燄炯應時圓淨敲鑼擂鼓共演真常當處等平打戶搥門併歸圓覺彈指頃孰修孰證舉世間誰悟誰迷苟非象外廓明作門前之繞偈曰無邊剎海虛明鏡積刦埋塵光未虧肯把幻緣滋幻影誰將真智起真規徒誇萬里還家日謾說千燈照室時安有住持圓覺者教人容易作思惟因疑致問離匣之寶劒為斬不平引答破疑出鼎之靈丹欲瘳既病覺體元非作用話頭不許承當剛藏隨在鑛之金曲伸三惑瞿曇示過雲之月遠闢羣迷始終生滅豈復現前聚散有無不成安住擉瞎金剛正眼何處覔生死垢心掀自己家珍孰肯認涅槃淨性燒須彌雅宜螢火束虛空慣用龜毛日麗星明成佛不成佛難逃法執風馳電激圓覺未圓覺俱墮魔垣苟非撒手懸崖一任開眼說夢偈曰罔知覺性離生滅縱悟無生覺未圓花亂長空三惑起浪平地五宗傳鑛中金出功猶在月外雲行見政纏何似橫身聲色裏從來千聖不同廛欲網重重金剛劒不待揮而自裂愛河渺渺菩提岸奚假涉而已登夢中之四聖非真鏡裏之六凡何有輪回根本吐吞彌勒口門貪欲因緣含裹如來心地生而無生卵胎濕化相而非相明暗色空迷即悟悟即迷一道齊平五性俱遣事即理理即事兩頭坐斷二障全消三世諸佛同叅一切眾生皆證超方便住圓覺止啼黃葉何多成佛果斷輪回翳眼空花不少會須是一生了辦更莫教萬刦沉淪惟務肯心不勞佇思偈曰輪回幾種問來端至理如何可自瞞一點愛源常滴瀝萬尋欲海政瀰漫徒將二障論深淺枉對羣迷說易難圓滿覺心皆已證擬思量處不相干長空皓月伶俐漢何待指標滿覺真心大丈夫豈由言顯言外承當早成途轍機前負荷已涉廉纖不許執著妄情不許深求悟理不許依憑功用不許允𮛫無為清淨慧咨詢地位階差路遙知馬力老瞿曇花分能所照覺歲久見人心真不自覺覺不真眼非自見見非眼凡夫覺聲聞覺無文鐵印向空拋祖師禪如來禪折角泥牛連夜吼地獄天堂打成一片菩提煩惱坐斷兩頭白雲自占青山明月誰分流水苟非親到故家田地更聽幻人重說偈言中不容他清淨慧階差地位叩瞿曇月行空界憑虛指花燦心田貴實叅息妄固知非正覺尋言安得是司南未曾跨過黃金限且向門前宿草菴即一而三濕紙裹金毛師子惟三而一單絲控玉角麒麟大千界不受纖塵十萬里那隔寸步威德巧於設問四門之城堞面面俱開世尊曲為指陳一道之覺源塵塵涉入即空即假即中而易分雪裏粉惟靜惟幻惟寂而難辨墨中煤須如是人明這箇事鏡裏像昭昭不隱切忌眼花器中鍠浩浩無虧休將耳聽穀𭣣則苗土俱棄功成則境觀齊捐欲知圓攝所歸之方更舉直捷根源之偈有幾種修威德問未能直捷世尊酬三重妙觀爐中雪萬種奇功水上漚夜氣冷沉深雪谷曙光遙映白雲樓無人為向靈山道那事如何著意求頭作尾連環鈎鎻而二十五重抵掌論心直指單傳而千七百箇水入水時全無差別空投空處煞有聱訛辨音躡威德之前蹤肯信龍門無宿客如來列次第而酬答那知少室有斯人即三觀離三觀玉轉珠回以一重去一重神出鬼沒前空後假斷送渾家落火坑齊寂兼中攛掇鐵牛眠死水一種是門前之繞萬般皆心外馳求擬登正覺之場更聽重宣以偈單複圓修啟辨音沉沉覺海政淵深諸論指體還迷體三觀惟心又覔心翫月靈犀蟲禦木求珠罔象芥投鍼寄言并法不隨者難免空花翳幻林圓湛深淵漚花影裏千尋浪湧軒昂大宅呌呼聲外八面火然悟迷不越見生縛脫皆由己造一箇我緜續不斷宜乎淨業咨詢四種相潛伏難知獨許世尊揭露遣神兵戰空魔壘驅智將搜破賊機使迷悶不入者蹈廓達之通衢於增益諸病時飲必瘳之靈劑擬作將來眼目難忘現在我人湯與水濕性儼存何處著寶蓮香之欲火愛與憎知覺元在豈應容演若多之狂風難思客路千差終詣祖庭一實這箇說話大似釘樁搖櫓驀劄相逢那裏洎在偈曰覺心迷悟若為通淨業那能奪至功能所頓消何相遣妄真俱盡豈情融無空作境空猶在有我談玄我未窮向古鏡邊閑照影山重重又水重重善知識是塗毒鼓耳其聲者死不移時善知識是太阿鋒觸其鋩者喪不旋踵一味生擒活捉百般大用全提普覺問依何等人移花兼蝶至世尊答遠離諸病買石得雲饒且做成作止任滅四種膏肓緫不出憎愛是非一般病痛以毒攻毒須還老耆婆肘後神方用醫奪醫不許水潦鶴口邊訛說甘草苦黃連甜果符斯語砒霜良甘露惡頗有其端與其同事處換人眼睛奚止摶財妻子別行異路時不存軌則何妨戲笑譏訶攪不渾兮澄不清近不憍兮遠不怨丈夫步驟知識軌儀且不犯風規如何通信偈曰欲開知識門前路普覺興慈意獨新狎近不憍離不怨偏邪惟敬正惟親通身是病通身藥徧界全真徧界塵話到摶財妻子處古今疑殺幾多人百廿日畫地為牢路從平處險二千年閉門作活人向靜中忙操心降鏡裏之魔開眼做夢中之佛圓覺設最後之問窮猿投林世尊垂極理之談畫蛇添足長中下三期多處添少處减正像末三法前何重後何輕合眼跳黃河且不許停機佇思赤身挨白刃又那容顧險防危一條窮性命東擲西拋萬丈冷門庭橫開竪闢安居平等性智蓬蒿鞭陝府鐵牛懺悔夙昔罪根濕紙裹嘉州大像更聽祇夜遠賛徽猷道場加行設威儀圓覺當機立問時打水杖痕人共覔釘空槌跡我全知三期政不分長短一法何須論順違話到安居平等處老婆心特為誰癡五種經名穿透百千諸佛耳孔一條覺路截斷十二開士脚頭賢善首曲為流通尼藍婆密垂守護綺筵欲散不妨鼓吹頻催戰陣將𭣣豈礙干戈盛舉閑骨董撩天索價爛葛藤徧地生枝後如是果前如是因眾器入金而金何有異多不加增少不加減羣波歸水而水自然同鐵蒺藜摟空狡兔之窠露刃劒斬斷靈龜之尾明暗色空分科列段伶俐座主難窺雲林泉石直指單傳了事衲僧罔測三毒八倒全該真體十身四智靡隔妄緣一圓一切圓何待水銀墮地一覺一切覺豈容古鏡當臺語言文字一點難容機智識情萬般虛設便與麼領荷已成途轍不於斯脫略更聽偈言以賢以善標為首最後當機欲播揚道樹不栽圓果熟靈根未種覺花香謾將修證論真假難把虛空較短長脫略語言文字外須知別有好商量真歇了和尚作圓覺十二偈叢林盛傳而未之見也余禪坐之隙披閱是經獨文殊普賢二章旨趣直捷自餘皆曲徇機宜巧施方便殊未有衲僧氣象於是每一章用禪四六提其綱要復申以偈固不敢效真歇和尚之作與宗門共之聊復自警耳乃標其名曰別傳覺心且即文字離文字置之勿論如大圓覺心果有別傳之旨乎長鯨一吸海水盡森森露出珊瑚枝音釋褫陳知切剗初諫切削平也炯古逈切光明也煞所賣切小也

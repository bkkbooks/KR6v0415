body:
  text: 叅學門人北庭慈寂進信心銘闢義解上聞夫少林不立文字直指之道方二傳而至璨大師師作信心銘五百八十四字得非遽變乃祖之風而為文字流布耶或謂不然是欲顯示其直指之道俾後之學者具正信而破邪惑也謂信者何信其廣大心體與諸佛平等無間必欲其自信而入不假修證一入信位决定不退轉也故此銘與不立文字之說並驅於千古之下而不相悖者益信大師立言之至荷法之誠也嗟今學者膠於義解不能廓悟神心洞見源底以資正信返以是銘為引證談柄之張本其金屑入眼之喻不能無及於吾大師也余因繫影于舟凡兩句下申之以語偈不敢炫耀見聞仰攀勝軌誠欲闢義解顯正悟曉同志勵自己也其有傍不甘者則余罪過當何以釋諸故以信心銘闢義解摽其名焉至道無難唯嫌揀擇神光烜赫萬靈罔測踞羣象之深淵啟重玄之大宅臨濟用金剛王發雷轟霆震之令望影尤難德山遣木上座奮風馳電走之威追蹤莫及陶形鑄象不居其有功負海擎山似覺其無力黃面漢四十九年有手只好拏空白拈賊千七百箇有口惟堪掛壁最見成難委悉擬向當陽指似伊早是門前起荊棘祖師道至道無難唯嫌揀擇義解者謂此兩句乃一篇之要綱一銘之本旨然信之一言全該悟證非信行之信也如法華之諸子於會權入實之際作信解品以述其懷吾祖目之曰至道唯佛證之曰菩提眾生昧之曰無明教中彰之為本覺皆一心之異名也至若徧該名相涉入色空異轍殊途千條萬目豈乖優劣靡隔悟迷莫不由斯而著如趙州之栢樹子楊岐之金剛圈密菴之破沙盆東山之鐵餕餡異端並起邪法難扶則知至道之話行矣該通事理融貫古今說箇無難早成剩語然聖凡染淨極目全真揀擇情生逈乖至體是謂唯嫌揀擇也下文雖殊悉稟其意闢曰依俙相似彷彿不同且至道二字任你意解謂無難之旨須相應始得自非心開神悟妙契冥符逈絕見知超出言象者望無難之旨不翅天淵於根境相對差別互陳不能當處解脫擬將箇無難不揀擇底道理存乎胷臆又豈止於認賊為子矣故於此不能忘言偈曰至道不應嫌揀擇莫言揀擇墮凡情快須擉瞎娘生眼白日挑燈讀此銘但莫憎愛洞然明白直非松曲非棘通非虛空塞非牆壁無孔鐵鎚當面擲直還松曲還棘通還虛空塞還牆壁依然野水連天碧昨夜南海波斯捉著西天正賊待到天明點火看却是東村王大伯祖師道但莫憎愛洞然明白義解者謂厭生死慕涅槃是憎愛捨煩惱趣菩提是憎愛你但於一切聖凡法中不得存毫髮欣厭之情則此心自然明白矣闢曰咄直饒你一切不欣厭坐斷主人公殊不知只箇不欣厭底已涉憎愛了也苟非親見祖師立地處與麼註解當得西來意麼偈曰似地普擎天普蓋如燈俱照日俱臨擬於明白中蹲坐脚下不知泥水深毫𨤲有差天地懸隔有定據無準則拈空塞空以的破的買石得雲饒六祖道不會移花兼蝶至達磨道不識只遮兩路葛藤引起叅天荊棘休荊棘海神不貴夜明珠滿把撮來當面擲祖師道毫𨤲有差天地懸隔義解者謂我此廣大法門雖曰悟迷無間你若愛憎揀擇之情毫𨤲不盡則霄壤相去不勝其遠矣闢曰與麼商量似則似矣是則未是何則直饒你一一無差塵塵合道也出他天地懸隔不得偈曰說箇無差共有差俱成捏目起狂花天懸地隔同今古擬涉毫𨤲事似麻欲得現前莫存順逆兩不雙一不隻放去非離拈來非即楊岐十載鑄就金圈少室九年覷破鐵壁古佛未生時月印千江大塊已鑿時風清八極道順不順謂逆何逆掛角羚羊喫鐵鞭秤鎚捏出黃金汁祖師道欲得現前莫存順逆一等義解者謂祖師到此話作兩橛何則此事本來現前教誰欲得教中謂正性無不通順逆皆方便於此若教莫存却成斷滅去也不然蓋祖師曲為初心方便委示似羙食不中飽人餐也闢曰低聲低聲祖師在你脚下縱饒一踏粉碎更叅三十年偈曰欲得現前徒逐妄不存順逆更乖真香塗刀割忘分別亦是空王眼上塵違順相爭是為心病是病非心是心非病莫將有漏笊籬喚作舀溪杓柄非離身非即身毘耶厥疾轉深日面佛月面佛馬祖沉痾愈盛情塵未盡處使甘露亦殺人鍼芥相投時用砒霜能活命自從海上競傳方無孔鐵鎚生異證祖師道違順相爭是為心病義解者謂生死無常是心病見聞覺知是心病叅禪學道是心病成佛作祖是心病會須兩忘違順雙泯聖凡萬慮俱捐一道空寂不假萬金神藥所謂心病者自然無地可寄矣闢曰吁祖庭秋晚佛法下衰抱病之流滔滔皆是無怪其然似此知解入心執藥成病者使耆婆再世遇斯等人亦無所施其巧矣偈曰順違相諍心生病違順俱忘病在心今古死人常繼踵謾傳盧扁有神鍼不識玄旨徒勞念靜盡大地是熱鐵輪盡大地是大圓鏡狸奴白牯今本不迷彌勒釋迦昔亦何證白雲淡蕩兮非卷非舒明月去來兮何動何靜聚塵沙於法界之圈陷法界於太虛之穽只如一人發真歸元十方虛空悉皆消殞時如何蟭螟吞却須彌盧胡孫驚出那伽定祖師道不識玄旨徒勞念靜義解者謂玄旨即至道異名同體若不識得豈特念靜任伊歷恒河沙劫萬種修證心外求法只益自勞此吾祖之不許也闢曰玄旨如金剛利劍不識固是喪身失命識得亦不免傷鋒犯手且有何方便能免此過偈曰玄旨是誰親識得釋迦彌勒尚茫然為憐滯寂沉空者獨宿孤峯是幾年圓同太虛無欠無餘本無欠剩却有乘除莊周配萬物為馬龍門喚十方作驢依俙還共轍彷彿不同途有水易招空界月無心難獲夜明珠祖師道圓同太虛無欠無餘叢林商量道此心在聖不加增在凡不加減如太虛之圓各各具足闢曰遮箇說話脚跨諸方者坐席未温箇箇築一肚皮惟資談柄耳及至偶嬰一毫利害則較得失之念紛然交接要教圓同太虛噬臍何及當知此事須還妙悟悟後豈更有苐二境為對為待耶偈曰蟭螟巢結瘦蚊眉直與鯤鵬接翅飛若謂太虛無少欠依前開眼陷重圍良由取捨所以不如薦福莫趙州無雪峯放出南山鱉鼻雲門打殺東海鯉魚興化赴村齋向古廟裏軃卒風暴雨丹霞燒木佛却教院主墮眉鬚疑殺人間幾丈夫祖師道良由取捨所以不如義解者謂此心既如太虛之圓無相不具一切皆如你於染淨法中瞥生取捨則不如也闢曰若是真正本色叅學上士見此等說話底人便與劈面唾不為性燥蓋像龍不足致雨故也偈曰取既非如捨不如是牛誰敢喚為驢大千沙界金剛體也是重栽頷下鬚莫逐有緣勿住空忍萬物芸芸萬靈蠢蠢離相離名有誰不稟因甚麼少室分皮分髓臨濟立主立賓引得兒孫草裏輥祖師道莫逐有緣勿住空忍義解者謂二俱虛幻擬心執著取捨紛然一念不生常居中道可為解脫道人闢曰錯待汝知是解脫已落虛幻了也若是真實悟心之士有緣空忍豈在解脫之外哉偈曰有緣莫逐還成易空忍教他勿住難難易兩頭俱斬斷祖庭依舊不相干一種平懷泯然自盡不動道場無生法忍皓月照䆫扉清風届屏枕有佛處不得住鐵𮖐燈心無佛處急走過花鋪蜀錦三千里外摘楊花十方虛空盡消殞易商量難定準海底泥牛喫鐵鞭百草頭邊風凛凛祖師道一種平懷泯然自盡義解者謂取捨之情既盡聖凡知見無依自然一切處平常一切處泯然滅闢曰白日青天莫寐語好即今眼見色耳聞聲喚甚麼作平懷不平懷偈曰泯然盡處事無涯百草頭邊正眼開生死涅槃俱捏碎不知何處著平懷止動歸止止更彌動曲談名相勞直說無繁重曲說且止如何是直說張三喫鐵棒李四忍疼痛活人入棺材死人成隊送觀音失却神通反被兒童戲弄直說且止曲說又作麼生覺花須向性天栽佛種宜將心地種祖師道止動歸止止更彌動一種義學沙門謂真心湛然常住不動無始流轉皆由妄見且動既妄動止亦妄止以妄止妄猶抱薪救焚秪益其熾矣引肇法師謂尋夫不動之作豈釋動以求靜必求靜於諸動必求靜於諸動故雖動而常靜不釋動以求靜故雖靜而不離動審如是則動無動相靜無靜相如教中謂動靜二相了然不生者蓋了知動靜皆是妄緣羣妄既消二相亦遣矣闢曰咄動是銀山靜是鐵壁或未曾一捏粉碎要教他二相不生萬里崖州未為遠在偈曰火焰差容蚊蚋泊劒鋒寧許赤身挨少林堂奧無門限把手相牽孰肯來惟滯兩邊寧知一種左轉右旋西沒東涌突出無孔鐵鎚打破上牢漆桶無位真人把須彌盧一摑直得虛空藏菩薩向十字街頭合掌告言伏惟珍重為甚麼如此祖師道惟滯兩邊寧知一種義解者謂兩邊是動靜二相一種是覿體無差乃釋上二句之辭也當知動靜二邊妄則俱妄真則全真安有二致者哉闢曰低聲低聲休將閑學解埋沒祖師心因為說偈曰是一種兮非一種是非情盡若為知休將雪裏莓苔石喚作溪邊白鷺鶿一種不通兩處失功指鹿為馬喚瓮作鐘從來將錯就錯不礙拏空塞空破蒲團三箇五箇撫掌大笑折拄杖七尺八尺滿面春風掃除佛祖病陵滅少林宗爐韛年深火政紅祖師道一種不通兩處失功一等杜撰禪和道遮兩句是結前引後之辭也謂結前則顯示一種之真理謂引後則深責空有之妄緣也闢曰若真實是箇衲僧說一種說兩處句句歸宗拍拍是令如其不爾說箇一種早落窠臼了也况兩處乎偈曰一種由來無地著二邊何處立功勛老婆只為頻叮囑累及渾家落見聞遣有沒有從空背空頭正尾正心空眼空驀面道著狹路相逢趙州栢樹子紅塵截斷一溪水東山鐵餕餡碧落衝開千尺松大象不遊於兔徑師王安肯媚狐蹤祖師道遣有沒有從空背空有等循言逐句者謂有乃妄有由遣之而故沒空本自空欲從之而故背有是空家之有空是有家之空空得有而故彰有得空而乃顯以其彰故空全是有以其顯故有全是空互融互攝而不差相在相入而無損由是而知遣之從之得非徇妄者乎闢曰咬人師子安肯與逐塊韓盧並轍依文解義曾逐塊之不若也欲望其哮吼返擲其可得乎偈曰只為桃符釘得高鬼神白日把門敲何如三尺茅簷下雲月溪山伴寂寥多言多慮轉不相應似水入水如鏡照鏡洗得法塵結成見病三世諸佛無家可歸歷代祖師何道可證為憐沒眼巡官要與空王筭命夜深轉卦盤看一片虛明冷相映所以道多言多慮轉不相應義解者謂言多去道轉遠又云神心洞照聖默為宗又引達磨道外絕諸緣內心無喘外絕諸緣則忘其言內心無喘則絕其慮矣闢曰你與麼引證了還相應也未若果未則言語云乎哉偈曰因言顯道道忘言忘到無言亦妄傳脫畧是非言象外虛空無口解談禪絕言絕慮無處不通道吾舞笏石鞏張弓西河師子長沙大蟲且當時極有餘態到今朝尚播遺風逗到祖師門下直教竄跡潜蹤何以如此豈不見道簸箕量米升渾別熨斗煎茶銚不同所以云絕言絕慮無處不通或者依文解義道絕言則言語道斷絕慮則心行處滅言語道斷則寂而照心行處滅則照而寂到此如來禪祖師禪可以一串穿過又有古人教伊休去歇去口邊醭生舌上草出等語得非是理乎闢曰與麼和會大似置堅氷於烈火之上多見其不知量也若果如其說則那討祖師來偈曰絕慮絕言同木偶何時成佛永嘉非聲前未領通玄旨拈起毛端隔鐵圍歸根得旨隨照失宗與麼與麼指西作東不與麼不與麼認有為空與麼中不與麼似網兜風不與麼中却與麼濕紙將來𮖐大蟲何以如此豈不見道歸根得旨隨照失宗一等人巧生卜度道絕言絕慮是歸根無處不通是得旨你若作歸根得旨會又却隨照失宗矣然根本無歸旨亦非得不了此意妄自認執是謂隨照苟存照之之跡則佛祖心宗不勝其失矣闢曰果有此說那苟或如是則喚將從上佛祖來喫閻羅大王鐵棒何則為他歸根得旨來偈曰隨照歸根事一同不須特地展家風偷心未向機前死得旨何曾異失宗須返照勝却前空見到行到宗通說通揭露人天眼目剖開佛祖心胷却物逐物似異非異殺人活人謂同不同緫與一齊生按下海門夜半日頭紅祖師道須返照勝却前空一等強說道理者謂以明暗色空消歸自己者是名返照當知空不自空因心故空有不自有因心故有離心無空離心無有眾生違背自心妄見空有而欲從之却之俱名顛倒闢曰錯下名言少林門下覔心了不可得誰是顛倒者偈曰本來非照何勞照說甚須與久長但見一期超象外不知二子共亡羊前空轉變皆由妄見古廟香爐一條白練直下超死越生緫是落他方便從來不信自心迷却言佛法無靈驗有靈驗立地便成佛入地獄如箭祖師道前空轉變皆由妄見義解者謂有是妄空亦是妄空有從緣變易無定欲得離妄二俱排遣闢曰咄遣則任伊遣殊不知只箇所遣之妄能遣之心俱不離妄苟不能與遣俱遣要脫他妄緣未有休日在且有何方便與遣俱遣偈曰空何有變變非空莫把山河著眼中水底波斯吹石火金烏飛上海門東不用求真惟須息見竪起生鐵脊梁橫按倚天長劒閑忙靜閙門頭緫與打成一片既精專復勇健將謂成佛作祖不隔一塵撞著三祖大師輕輕向伊道不用求真惟須息見好好看方便一等義學之者謂見有六十二種法數具陳不出斷常二見為主求真落斷見逐妄墮常見楞嚴謂言妄顯諸真妄真同二妄猶非真非真云何見所見但能離一切見全體即真不用求也闢曰是則固是且祖師道惟須息見且見作麼生息苟有息之之理展轉成見矣偈曰著意求真真復隱盡情息見見還生當門雖不栽荊棘自是無人有路行二見不住慎勿追尋鍼頭削鐵佛面剝金謂無則一塵不隔謂有則千聖難尋天曉不露夜半平沉絕對待離古今舉世盡知湖海闊出門方覺水泥深祖師道二見不住慎勿追尋義解者謂既不住妄又不住真和箇不住亦不住正與麼時繁興大用舉必全真更不假離此別尋也闢曰噫如此等相似語言那箇無一肚半肚只是要近傍他祖師未得在偈曰法法本來無所住於無所住絕追尋陽烏昨夜沉西嶺今日依然上曉林纔有是非紛然失心根非利鈍道無淺深有一句子非古非今搆不著底宴坐大圓鏡智搆得著底深入邪見稠林彌勒釋迦自知無分狸奴白牯忍俊不禁夜騎鐵馬沉滄海摸得陳年穴鼻鍼祖師道纔有是非紛然失心叢林往往道盡十方世界是沙門自己十方世界是古佛法身所以云撲落非他物縱橫不是塵也無是者也無非者一一皆是妙明心中流出闢曰如此等說話叢林喚作平實商量又喚作轉身句子莫不引斯二句為證古今之下不知污染幾多淨白田地故本色道流斥之為雜毒訶之為狐涎莫有不甘其魔魅者麼急須吐却偈曰說有是非無是非重門高啟待誰歸叅天荊棘橫官路那箇行人不掛衣二由一有一亦莫守日上月下天長地久惟有周金剛不事事白棒橫拖沿路走有問祖師西來若不劈脊便摟便言合取狗口引得森羅萬象笑眼豁開阿呵呵笑須三十年後祖師道二由一有一亦莫守義解者謂纔徇二即昧一纔守一即生二當知二是真妄一是自心真妄之二既除自心之一無住可謂解脫大道也闢曰此等語言記憶在懷謂之叅學使德山有棒未到你喫閻羅老子手中鐵棒少你一分不得在偈曰一法併教伊莫守不知莫守未為貧何如醉臥花氊上亂把黃金擲向人一心不生萬法無咎蘇州有常州有六六三十六七七四十九菴主竪起拳頭百丈展開兩手更兼千七百箇飯袋子弄出鬼面神頭鰕跳何曾出得斗祖師道一心不生萬法無咎義解者引他經論道心生種種法生心滅種種法滅諸法不自生諸法不自滅皆自一心所變一心不生諸法常住所以古人謂鐵牛不怕師子吼恰似木人見花鳥之說政類乎此闢曰然則然矣只如永嘉道誰無念誰無生若實無生無不生喚取機關木人問求佛施功早晚成似乎返是且不生底是無不生底是試定當看偈曰萬法本來無過咎一心何更有生緣叮嚀固是婆心切牧笛難教合管絃無咎無法不生不心太華山非險滄溟海不深盧仝月蝕詩有何難讀伯牙太古曲殺有知音惟有東山暗號子𭣣來無縫罅放去卒難尋攪擾幾多伶俐客摩裩擦袴到于今祖師道無咎無法不生不心義解者謂此二句返上二句而言謂無咎則萬法自消不生則一心自寂法消心寂至道之體冲然不待得而得矣闢曰昔僧問趙州學人乍入叢林乞師指示州云喫粥了也未僧云喫粥了也州云洗鉢盂去此僧悟去且道此僧當時悟無咎耶悟無法耶悟不生耶悟不心耶試定當看偈曰法法只因無咎咎心心多為不生生寒猿夜哭巫山月客路元來不可行能隨境滅境逐能沉以一重去一重路遙知馬力不以一重去一重歲久見人心兩重公案已展不縮三千里外誰是知音自從立雪人歸後幾片春雲𮖐翠岑祖師道能隨境滅境逐能沉義解者遽引永嘉道境非智而不了智非境而不生智生了境而生境了智生而了當知能是一心境是諸法能即智之異名境即法之別號境滅則能了之心亦滅心空則所現之境亦沉相即相在互攝互融初無間斷其不了者目之曰迷闢曰據如所說謂之了可乎不惟不了如飢食鹽重增其渴耳偈曰共知光影因燈現咸謂波濤仗水興燈滅水沉波影盡政堪門外喫烏藤境由能境能由境能一大藏教陳年故紙千七百則腐爛葛藤不翅止啼黃葉何殊日下孤燈拈過了也又是一層脫賺人間幾箇僧祖師道境由能境能由境能有箇依語生解漢道境不自境因能故境能不自能由境故能能仗境而生境托能而起當知生而不生心外無法起而非起法外無心祖師到此將一心萬法丸作箇蜜果子只要伊笑談一嚥闢曰因逆問之曰子曾嚥得也未如其未然世間還有嚥得者麼他日異時吞鐵丸有分在偈曰因能生所所生能能所俱忘生不生老蚌吸乾鯨海水珊瑚枝上月三更欲知兩𫨻元是一空空而不空兔角杖撑破銀山鐵壁不空而空龜毛拂展開明月清風洞山麻三斤黏皮綴骨雲門乾屎橛滯殼迷封衲僧面前放過不可祖師門下再犯難容常教肚裏如鍼刺拋向洪波白浪中祖師道欲知兩𫨻元是一空義解者商量道兩𫨻即指前之心法所言一空非太虛頑然之空非小乘斷滅之空乃靈覺無相之真空耳此空是諸佛之源萬靈之母無聲無臭昭昭於羣象之前不有不無朗朗於諸塵之表者是也闢曰是空不應有知既知不應名空苟未曾與祖師握手親到真空之海言語云乎哉偈曰夢中钁得黃金藏又跨青鸞上寶臺盡夜喜歡無著處天明只落得場獃一空同兩齊含萬象一句無私萬靈同仰遠拍祖肩清機歷掌大顛打首座聚雪埋金興化罰維那揚聲止響惟有石敢當長年整歲向百眾人前出一頭今古無人解稱賞祖師道一空同兩齊含萬象義解者卜度道心不異法是一空同兩法不異心是齊含萬象所以古云見色便見心無色心不現又教中謂森羅及萬象一法之所印故祖師發明於此闢曰講經則許你講要見祖師意何異鄭州出曹門偈曰一不成單兩不雙夜深寒月印長江無邊宇宙光吞盡又引梅花上矮䆫不見精麤寧有偏黨禪名關教名網撈摝三有眾生及第心空標榜撞著箇沒意智漢掣其檈解其紐萬目要張不張百夫欲掌不掌無心道者合如斯豈是人前呈伎倆所以道不見精麤寧有偏黨義解者謂心法既空能所俱泯則生佛體同悟迷一致故引息心銘謂何貴何賤何辱何榮何得何失何重何輕一道虛寂萬物齊平之語為證闢曰然證也證得相似其如證得太殺相似返不相似矣且如何是不相似處試定當看偈曰一喝迅雷難掩耳蟭螟負海入蚊眉泥猪癩狗齊開眼三世如來總不知校訛七十二葉第一行窠誤作窮從南改正七十八葉第三行呵呵誤作訶訶從南改正音釋烜况遠切烜赫光明也轟虎橫切雷聲饀下斬切擉則各切刺也覷七慮切伺視也鍼職深切殞于敏切沒也蟭螟蟭即消切螟莫經切蟭螟蟲名檗普擊切摑古獲切批打也鞏居悚切簸補過切簸箕揚米器熨於勿切熨㪷也醭普木切白醭摟力侯切挑也仝音同切人名蝕乘力切日月虧曰蝕擦音察揩也賺陷切市物失實也蚌步項切蛤屬撑丑庚切拄也綴陟衛切綴也钁居縛切鉏也獃五來切癡也矮鴉蟹切短也伎倆伎渠綺切倆良蔣切

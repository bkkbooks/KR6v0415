body:
  text: 參學門人北庭臣僧慈寂上進自讚繩牀枯坐兀爾忘緣面皮厚三寸鼻孔沒半邊盡世藏形避影徒勞掘地覔天鬼神推不出佛祖謾加鞭幸爾師同天目山年同大海水鄉同西浙路道同金剛圈就中一種不同處愧我未曾參得禪斷崖禪師請咄哉此僧無本可據倚中之峯依幻而住手裏三尺黑竹篦何嘗有此間家具話頭流落古伊吾風前笑倒人無數蒙古宣差請虛空有體貌墻壁具耳目惟有這箇漢完全離背觸喚作幻住漚華性海之波謂非幻住陽焰轉識田之曲不墮兩頭如何付囑常憶開沙十萬家錦團團兮華簇簇馮默菴請幻不可寫可寫非幻惟幻既非復云何讚金颷濯濯兮雲深天目萬峯玉露沉沉兮月照鴛湖兩岸不於這裏覔中峯展開圖畫從教看魏塘吳宅請渠無面目不受拘束謂是幻住則背謂非幻住則觸有時一葉扁舟有時半間破屋但不教渠作住持一切盡情皆準伏為甚麼休逼促波斯嚼氷牙齒寒蚯蚓吞鹽尾巴曲宣政院官請贊參禪禪未明學道道何悟從來只解平實商量脫略人前只成笑具年來衰病滿空身任運惟依幻而住寄言怪怪學道人動著何曾不相遇阿呵呵有甚長處馮侍制子振請磐石上蒼松底踞坐者誰元非是儞問伊佛法信口惟言不知俾之住山驀鼻橫牽不起見無所見剩雙眸聞無所聞多兩耳塊然一物人共嫌不識喜菴何所喜阿呵呵誰共委似這般兜搜面孔傳得十萬八千只宜埋向一微塵裏喜菴三藏請鴈蕩結茅廬大德庚子歲依幻住其中身心無向背鼻孔與眼睛今古常相對從來不覆藏堪嗟人錯會不錯會水澄澄而涵空竹蒼蒼而積翠望虎丘山上月光透吳中聽楓橋寺裏鐘聲騰物外休將佛祖巧相於渠儂不入它羣隊平江幻住菴請這漢無撿束辨山結茅屋生緣湯團灣受業西天目要識渠是誰不用問龜卜若非孫七郎定是郭八叔佛法無半星人緣頗相熟莫知何所長標形歸畫軸留之幻住菴又要頻叮囑夜深禪影照蒲團劫風吹入平田緑湖州幻住菴請至大己酉夏曾憩白洋曲明年役般輸荊𣗥變華屋隨順一切心元是此尊宿胸中無寸長渾不受輕觸禪衲滿門參且是無拘束太湖吐一漚容受西天目笑面當慈悲苦心含惡毒倒捋牛尾巴說法無機軸震禪請渠自贊揚合掌稱為田八叔吳縣順心菴請這箇面目無本可據既染丹青曲勞指注眉橫眼上倣佛中峯鼻搭脣邊依俙幻住更有問大同菴主面目短長問取彛菴蔣教諭丹陽大同菴請咄哉此僧有甚巴鼻大坐胡床全無義味談禪禪不曾參論道道非所契以茫茫業識當參學眼睛以擾擾幻緣為平生住計有時橫孤舟於青莎白水之上笑船子便棄渾身有時撥魁芋於寒灰冷火之中笑懶瓚不𭣣殘涕千手大悲推不向前八臂那吒捺不入地盡指南閻浮提喚作西來祖意只如斯鹵莽為人如何做得他徐十三郎之後裔西來菴俊用二上人請我不是渠渠不是我物外變通目前包𮖐間雲居此幻住身狹路相逢來合火咄咄咄我我我是甚麼一天星月影團團萬疊湖山青朵朵雲居菴請幻住不識實際實際却識幻住分明兩箇題目究竟一般情緒昔年狹路相逢今日不勞指注蘇州城裏月當秋天目山頭雲滿樹實際菴請這漢懶入骨誓願不做佛寸心空牢牢長年坐兀兀雲谷居士不識渠新興積慶濱西湖準擬開門待知識要憑幻手聊相扶只將這箇持虛壁天目山深難辨的幻相何曾有住時春滿六橋天地寂積慶菴請這箇面目有誰喜見依幻而住沒地頭舉措全無巧方便𫼡曲作直遇貴即賤本中峯諾將謂是如何入地獄如箭喜見菴請這軀難摸𢱢謂善何善道惡不惡空煩惱根去菩提縛却笑靈山話曹溪指爭似渠儂掉棒打水中捉當的諦都丁華梵何曾有兩般烏巴剌室利丹青不用頻描貌卷向柴床壁角頭片月流輝照山嶽高昌顯月長老梵名烏巴剌室利請海會菴裏水雲如歸更著這漢意欲何為謂辦道渾無孔竅謂結緣殺缺慈悲天目山氷枯雪老慶元府雷動風飛兩頭坐斷渾無事佇看人間十二時咄遮頭陀也甚偉傑髮亂如雲脊硬如鐵問渠佛法禪道便謂無可言說三十年天目山有一句繫驢橛還會麼海底烏龜頭帶雪日本如偉禪人請遮呆漢只好看殺有丰姿全無氣岸謂知道不明本地風光謂會禪罔測古人公案最無分曉處佛祖爪牙極有來由時鬼神茶飯從來伎倆只如斯一字如何可加讚普桱寺主請大德庚子相見便是這箇至治辛酉請讚也是這箇謂其無心兮吳松江水徹底深謂其有形兮天目山雲忽飛過兔角拄杖龜毛拂竿木隨身成滯貨阿呵呵中峯元不是渠儂只做此回重說破理悟上人號無心請幻住菴不記幾年天目山三千餘丈畫得像鼻孔搭唇邊畫不像眉毛橫眼上萬人海裏化機行真珠撒出紫羅帳頭陀苦行合如斯狹路相逢肯多讓逢人便與麼展開要教他識取描不成畫不就底無面目中峯大和尚善助化主請依幻而住三十載自賣由來還自買不知別有何所長盡把虛空圖五彩江山圖畫新展開全身半身俱絶待依俙只似本中峯倣佛渾如滿覺海伊兮余兮休度量他家自有公評在智滿院主號覺海請儞道渠是誰誰道渠是我萬古只如斯直下是甚麼狹路相逢處以毒攻毒和光同塵時無可不可便喚渠作幻住時如何溫州橘皮不是火幻在耳絶所聞幻在眼離所見全身半身日面月面紹隆祖道無端教石女生兒射中鐵牛特地用蓬蒿為箭幸自少藂林孰謂多方便祗將這箇錯流傳幻住家風其誰肯羡頭頭物物皆成現此是幻住真是真非幻住兩𫨻文不同一句無回互挂在水晶宮不勞重指注從來修證絶安排絶安排處全機露全機露也春風二月百花香子規聲裏山無數湖州修禪人請截斷紅塵石萬尋衝開碧落松千尺巖花朵朵水泠泠楊柳一瓶甘露滴莫便是本中峯麼不識不識道是渠不是渠謂非渠却是渠非神非鬼非馬非驢指十方空為幻住向一塵中結草廬龜毛拂挂繩床角緣木何曾捉得魚一峯居中富嫌千口少依幻而住貧恨一身多阿呵呵好大哥不妨隨處薩婆訶多禪人請月在山頭分明不露風行水上自然成文萬里飛鴻踏雪四方野鶴離羣本中峯面目易辨幻住菴真僞難分淵默忘言繩床兀坐喚作本中峯當面都蹉過不蹉過丈二眉毛頷下生笑倒東村王小大淵禪人請中峯之中喚西作東白菴之白指南作北面目現前有甚奇特眉毛𦉑裏大江橫鼻孔尖頭玄路窄三十年後忽展開笑倒東村王大伯水泠泠石齒齒淨瓶邊青松底這一箇便是儞擬追尋千萬里朱選卿頗相委拈起寸毫顛倒揮左右逢原妙無比低聲低聲本中峯來也馬頷驢腮沒兩般笑破虛空半邊觜眼如泥彈丸面如憨布袋喚作幻住頭陀漆桶元來不快撞見高平林且不存知解要覔末後句低頭禮三拜自買依前還自賣天目山心未忘幻住菴話誰領要識渠儂行藏良馬不待鞭影我相是幻畫出尤幻其不幻者如何加贊眉毛𦉑裏劒光橫廬陵米價齊霄漢觸著無明劈面揮無了辦中教了辦莫便是為人處麼首座既相知也須擡眼看堅密不動石柔和善順草又似海中巖澄湛水環繞會合老幻相彼此無缺少只有一處傳未真歲久年深當自曉抱一為天下式得一而萬事畢道人見處一亦無眼睛本橫兮鼻孔元直異路忽相逢同途誰辨的雲龍風虎漢壇高圖畫展開明歷歷儞不識我喚馬喚牛無不可我不識儞十字街頭白日鬼非儞非我空裏忽生花朵朵非我非儞雲合雲兮水投水離此四路葛藤中峯不在這裏鐵丁飯與不濕羹拈來塞破虛空觜行人不識東隱菴都只來尋馬塍裏東隱接待菴請形質既幻描寫亦幻所不幻者急著眼看是甚麼莫杜撰推不向前便是這漢既不曾讀孔仲尼之詩書又不解參老楊岐之公案何緣人見每相憐多是五百生前燒牛糞香供養作鬼神茶飯常憶東西兩馬塍二月春風如錦爛西隱接待菴請無見頂相不用丹青與麼挂起一切現成儞豈不見僧問末山境山云不露頂如何是境中人山云非男女相盡謂末山一期勦絶古今之下幾多人路見不平再煩妙筆從頭寫要見中峯眼上橫尼出白請師預贊遮箇空皮袋開口便納敗有時強說禪無人不笑怪誓死深山咬菜根通人不用頻相愛雲南通講主請無慧亦無福口裏水漉漉要開幻住法門且不受人拘束海天萬里白雲橫只此是渠真面目雲南福講主請寂而照鼻無兩竅照而寂家無四壁見得徹處頷下眉長靠得穩時機前意的鐵如意擊珊瑚枝稱鎚捏出黃金汁匡床坐看北庭花春風處處成狼藉善達密的理長老譯名慈寂號照堂請贊缺蹄不馬無角非牛聲穿兩耳色貫雙眸不與人天共轍不希佛祖同儔生涯半箇矮屋活計一葉扁舟見不見月淡遮山千尺霧識非識風清幻海一浮漚虛空手動龜毛拂仁壽菴中夜不𭣣遮山修上人號幻海請頭如木杓口似匾檐要識渠儂便是遮漢何曾悟得佛祖心剛道十方都是幻幻不幻好生剔起眉毛看趙州無雲門普到渠面前都成莽鹵匡床坐握如意柄眼裏何曾有今古青山緑水自茫茫春風吹入建寧府莫教錯認定盤星呼為幻住菴中主不寶尺璧不貴寸隂一塵絶待萬慮平沉是渠非渠勿向外尋一樹幻花成幻果十分春色滿空林空林果上人請露腹袒胸指西話東毗耶室內相逢逸翁連忙認作本中峯何異濕紙包虛空阿呵呵尉斗煎茶銚不同天目山太湖水高不見頂深莫知底盡謂渠德之流行若置郵而傳命子細撿點將來莓苔石上亂草窠伸腳元在縮腳裏吳江急𮞏鋪信人請何清翁寫幻相盡謂逼真子細看來頷下缺丈二眉毛腦後缺一點神色三十年後再相逢似與不似總奇特何以如此春風元不在花枝至體由來無揀擇全身半身是幻非幻積菴居士剛要求贊與其壽泉菴圖畫展開何似天目山覿面一看莫便是本中峯麼山明水秀古杭州生遮一枚擔板漢枯坐草窠了無向背心安未安道會不會天目山三十年澄不清撓不濁幻住菴二六時推不前約不退憶著太原孚上座揚州聞角聲却笑孔夫子三月不知肉味公伯真我住幻遮箇面目如何毀讚太虛空壓碎上唇驢鞍橋且非下頷大江日夕水東流海門潮拍西津岸影像昭章聲光蕩漾是甚麼急著眼看盛伯真請遮漢沒意智開口要觸諱撞見松間隱人指出當生羅計第一無分做佛第二容身無地只好向深山窮谷中苦行數百生更待驢年蒙授記阿呵呵也甚奇異日者松隱請校訛六十五葉一十行丰誤作手從南改正六十六葉二十行日誤作目從南改正七十葉十四行一南作幻音釋飈卑遙切旋風也捋力括切摩也莽鹵莽莫罔切鹵郎古切鹵莽苟且也摸𢱢摸慕各切𢱢桑各切摸𢱢捫搎也呆五來切塍神陵切畦埒也矮於駭切矬也尉於勿切尉斗貯火展器也銚徒弔切燒器也

body:
  text: 參學門人北庭臣僧慈寂上進佛事拈高麗金書法華經此法華經藏深固幽遠無人能到今日因甚麼却在幻住手中於斯薦得便見大海之東大海之西大海之南大海之北一會靈山儼然未散如其未委黃金自有黃金價終不和沙賣與人瞿運使卒哭藥師道場放生紅芍藥邊方舞蝶碧梧桐裏正啼鶯目前大道無遮障自是衆生沒路行由是今日藥師如來與近故少中大夫兩浙都運瞿公於一毫端上起大道場作百寶莊嚴佛事本上座因齊慶讚普為諸含識指箇路頭去也教中道三界無法何處求心心不可求法將安寄便見十方世界是清淨法身十方世界是藥師十二願海審如是有羽者聽其高飛有足者不妨遠舉帶甲者潛於深淵負鱗者縱於巨壑無一衆生不成正覺無一衆生不入圓明雖然如是只如古人道門裏出身易身裏出門難且道不涉易難如何是超然獨脫底句乃放生云衝開盡是通霄路透出無非解脫門馮將仕秉炬現成公案絶安排無位真人笑滿腮吸盡太湖㳙滴水寒梅樹樹待春開舉火把云某人八十年來只憑這箇起家立業勤倉儉廩積有餘仁居義路行無竭八十年來只憑這箇崇德慕善舉心曾不昧天真觸著通身是方便八十年來只憑這箇教子育孫挺挺羣賢繼芳躅珊珊環珮振高門八十年來只憑這箇𭣣因結果苞湯水面青溶溶善慶堂前花朵朵到這裏本來面目觸物純真自己家山不離跬步八萬四千毛竅與性空真火竅竅相通三百六十骨節與性火真空節節相拄垂光散為福德林流輝攝入光明戶且道這箇是何物聻以火把打圓相云團團轉作大圓鏡條條照出珊瑚枝盡大地人都不見只許馮公獨自知謙西堂入號無礙住千頃寺徹骨窮來三十年每於佛祖結生冤巨靈捏碎虛空骨大用塵塵總現前共惟某人師子巖前參得一句蓮華峯頂似空合空蓮華峯頂悟得一機師子巖前如鏡照鏡這邊那邊應用不缺千頃萬頃遇緣即宗拈却水火珠放下打草扇到這裏盡十方世界是金剛正體盡十方世界是無縫門出亦無礙入亦無礙且道不出不入一句作麼生舉揚鐵馬衝開青石門玉雞啄破黃金為諸禪人秉炬入生既空死亦空空到真空空不空不空空處亦還空乃舉火把云空上座還空得這箇麼火星迸出扶桑日海底波斯鼻孔紅日本人諸方直歲度火把與住持今日住持度火把與直歲且道是明甚麼邊事明日優曇華茂發淨飯王宮生悉達只從這裏便承當千古萬古阿剌剌茂直歲宗監院歸宗一味禪楊歧三腳驢兩重公案一句破除且道是那一句擲火把云臘雪堆中火一爐梵菴主象骨低頭歸去文殊是藥採來拈得梵王鼻孔觸著帝釋眼睛雖然如是未出常情且道因甚麼菴內人不知菴外事以火把打圓相云沉寒痼冷莫能治伏火靈砂下一丸能醫藥以火把打圓相云圓浴主見麼喚作圓相則背不喚作圓相則觸透過兩重關還他親眷屬蓮峯突出碓觜花杓柄兜師子足香水沉沉徹底乾普請大家齊刮目且道看甚麼擲火把云脫殼神龜飛上天無位真人火中浴舉起火把云祥柴頭見麼萬朵祥雲匝地飄藂林枝葉半肩挑今朝匾檐兩頭折千日斫柴一日燒鑑首座末後一句子儞未跨闊一萬八千里路時已嘗說了也今日古鑑發光露出晴空閃電團團無縫門開𭣣取眉間三尺劒雲南人弘知客維那不在當汝打鎚劈頭一下振起宏規掣開無縫擊破玉玻瓈正是全身放下時音釋躅厨王切迹也跬丘癸切半步也竅苦里切穴也捏乃結切握捺也㲉苦角切痼古暮切沉重也觜即委切刮古滑切摩拭也匾必典切闊薄也

body:
  text: 參學門人北庭臣僧慈寂上進説般若説般若離一切相而不礙諸相發揮般若離一切名而不礙衆名出現般若如大火聚世間所有形器嬰之者莫不遭其燒般若如太阿鋒世間所有物像觸之者莫不遭其壞般若如太虗空世間所有色法入之而無不容般若如大圓鏡世間所有相貌臨之而無不照大矣哉般若之體圓般若之用大般若之功般若之道普矣三世諸佛於無所證而證十方菩薩於無所了而了歷代知識於無所悟而悟參玄上士於無所學而學然諸佛雖證而不宰其功菩薩雖了而蔑居其德知識雖悟而莫覩其蹤上士學之而罔測其狀以至山川日月森羅萬象由之而建立依之而運行使物物各具金剛正眼窮古亘今欲窺其髣佛不可得也嗟夫衆生迷背其來舊矣轉為無邊生死曠劫逮今於此般若體上念念遷流念念起滅念念攀緣念念輪轉深沉欲海甘赴死門而吾大般若光雖未嘗少間其如瞽者居太陽之門聾者住雷霆之窟終身由之而竟莫知其聲光震耀也由是三百餘會之玄談千七百祖之絶唱皆純以一味清淨般若融為善見神藥俾瞽者明聾者聰壅者通執者化也當知瞽不自瞽依般若而瞽聾不自聾依般若而聾壅不自壅依般若而壅執不自執依般若而執是謂一切智智清淨無二無二分無別無斷故若謂聾瞽壅執之病不居般若體上則般若有所不周以其聾瞽壅執之病即般若而生則般若有時而弊其深密幽邃之旨非超出言象之表者孰能與於此所以云太末蟲處處能泊獨不能泊於火焰衆生心處處能緣獨不能緣於般若蓋知般若誠非心識所可緣也故般若離心緣相離意識相離思惟相離文字相以至離種種相如是離者非所離非能離本性離故以性自離離亦不立離既不立一切混融然舍般若無衆生心舍衆生心無般若即衆生心是般若青出於藍即般若是衆生心冰生於水苟非見忘執謝甚不可以言通而意達之也所以永嘉謂惟證乃知難可測昔僧問古德如何是般若體答云兔子懷胎又問云如何是般若用答云蚌含明月發迅雷於昏蟄麗杲日於幽衢展鷲峯無作之機啓少室不傳之妙在古德分上綽綽有餘且學人到此如何領會其或停機佇思萬里崖州直下承當劒去久矣高昌三藏法師喜菴妙公梵名般若室利命余申其義乃因引前説併為説偈般若無知亦無相非曰無相非無知有無知見二俱遣了般若體常無為無為之體即無作百草頭邊光爍爍已忘證者名醍醐見病未祛名毒藥般若非良亦非毒般若之機離背觸喚作般若沉悟坑謂非般若遭迷𢩁般若非悟亦非迷迷悟俱忘復是誰玉雞啄破琉璃㲉鐵牛觸碎珊瑚枝法身解脫即般若覿體難容分別者般若解脫即法身三事何曾隔一塵法身般若即解脫如珠走盤活鱍鱍一三三一相容攝水底蝦蟆吞却月三一一三相互融半夜金烏海底紅三既遣兮一不立虛空為紙須彌筆擬書般若兩箇字已是抱贓重呌屈一不立兮般若空龜毛繫住毗嵐風滿菴歡喜著不盡張起東南般若宗真際説太尉瀋王海印居士求法名別號遂名之曰勝光號之曰真際夫真非色像不可得而見有見非真際非境緣不可得而及可及非際真乎不可見而見之際乎不可及而及矣其不可見之真廓爾無像不可及之際洞然絶痕無像之真體之莫非神悟罔及之際混之必欲心開然真非際外之真際匪真前之際但見真則必達其際凡達際則必見其真真乎際乎猶鏡與光二者未嘗斯須少間言光則必由鏡出語鏡則必有光存光即際之真鏡乃真之際亦猶羣波共水衆器同金理體元齊事相非一嗟乎衆生於無始時來重為業習所蔽擬涉念慮即落妄緣那更馳求劒去久矣或不真誠啓悟諦實開明不撥一塵洞見源底則未免粘情帶識依文解義妄存知見墮在意根説時與真際相符用處與妄緣不隔使諸佛菩提之道果止於此則安有解脫之期也或謂離妄之謂真真之所詣之謂際謂妄者何以迷自心故見聞覺知皆妄也謂真者何以悟自心故明暗色空皆真也真無定體悟之則圓妄絶正形迷之則著全波是水了知妄外無真全水是波畢竟真中絶妄然則二名一體就中萬別千差欲教舉必全真當體必須神悟所云際者畔岸之謂也事物之極乃名邊際如色之極是空邊際空之極是色邊際是故妄不可有其邊惟真乃妄之邊真不可言其際即妄乃真之際也或謂圓同太虛無欠無餘又云心佛及衆生是三無差別又云平等真法界無佛無衆生但諸佛祖圓頓了義之談若妄若真未嘗有纖毫界限邊際復從何立耶然了義之詮固無界限既迷之境實有方隅以無界限故三塗地獄萬種泥犂千仞劒林諸熱惱海至若塵沙苦趣悉該真際使有一毫揀擇則離波別有水也以有方隅故衆生諸佛煩惱菩提苦樂順違安危得失殊形異狀名相紛然俱出妄緣悉乖真際雖曰波水同體而不可同其名也原夫此心之迷也於無妄真中卓爾妄真於絶邊際處宛然邊際但如衆緣觸目羣象當情水不可喚作山空不可呼為色各專其用不同其名明知理體無差其奈事情有異譬如水之就決也湍流不息及遇寒則結為堅冰凝然不動了知不動之堅冰全是迅湍之流水奈何迷妄之寒氣積集濃厚於一體中儼然成異或不以頓悟之慧日融之化之欲會歸真際之水其可得乎是故真際如來目之為第一義最上乘昔世尊初生時目顧四方乃顧此真際也以手指天地乃指此真際也復云惟我獨尊乃示此真際也已而棄王宮入雪山六年苦行夜半見明星悟道乃顯此真際也西天四七東土二三燈燈相續乃傳此真際也至于臨濟卷真際於喝下德山揭真際於棒端又豈特禪宗佛祖為然如三乘十二分教大小偏圓祕密開顯無邊法義種種方便皆從真際出生真際乃佛祖所詣之根本法門更無一法能過於此者真際誠一心之異名也古者謂三界無別法惟是一心作又云未達境惟心起種種分別達境惟心已分別即不生此説之下以真際之體散於森羅萬象之頂標於色空明暗之端更無毫髮能外吾真際者若以言説流布則真際豈待別有作為而後得哉若果欲與真際念念吻合念念圓融念念不痕念念無間直須是工夫熟知解泯能所忘向不知不覺處豁然開悟如獲舊物如歸故家心戶洞開性天廓爾十方世界不見纖毫過患是謂心空及第於斯時也真際二字亦無地可容矣昔僧問趙州萬法歸一一歸何處州云我在青州做一領布衫重七斤老趙州眼空四海神洞十虛融八識為真野色更無山隔斷混六情為際天光直與水相通寸心圓湛片舌瀾隨語隨默而泛應羣機機機相副或與或奪而全該大法法法同歸用之則煞有準繩操之則洞無影迹蓋其真際洞乎心府真際貫乎口門凡動靜語默曾不與真期而真自臻曾不與際約而際自至豈特趙州為然但宗門中有契有證之士靡不皆爾今日在海印居士瀋王分上間不容髮欲得諦實領荷親切承當直須向萬法歸一一歸何處話下廓爾悟明所謂古今無異路達者共同途也如或未由開悟且真際亦未嘗有𮈔毫隔越獨不能混融無間爾猶未磨之鏡在礦之金雖金體無在礦離礦之差鏡光絶已磨未磨之異奈何垢翳而光不彰礦存而金有礙又如冰之與水亦未嘗斯須隔越但冰具堅礙凝結之質而不能為水流注潤澤之用也夫善於求道者道不可將心求求而得之是妄得也但磨其汙染之塵銷其執著之礦融其迷妄之寒久之不休則光斯照而金斯純冰斯泮矣政於斯時道遠乎哉道遠乎哉嗟乎今之人但聞直指單傳不加修證咸以聰慧之資望塵領荷依文解義説處宛然滯識執情轉增迷妄是猶以堅礙之冰不期泮釋便欲與水同流多見其不知理也譬如京師王城鎮于北方普天之下凡有識者皆知北有京城惟到與未到者有差別爾其既到者雖移身於萬里之外凡一念京城則人煙市井昭然在目不能惑也其未到者至終其身不能無茫然之咎謂既到者乃悟而見之者也謂未到者乃解而知之者也悟而見之者固已極矣古人尚欲掃空悟迹剗除見刺或不爾則坐在悟邊動成窠臼蹲於見處尚滯功勳審如是則為己尚恐未周又安能為人解粘去縛也哉前所云磨鏡之塵銷金之礦融冰之寒似與本來具足少林直指之道覿體相反不然爾徒見其言下知歸機前領旨之易而不知其磨塵銷礦融寒之難歷於夙昔以致今日之易也苟不之難而欲之易是猶認礦為金指冰為水者無以異也當知妄依真而起妄真由妄而顯真真非妄而真不自居妄非真而妄無所倚妄因不立真理何存楞嚴謂言妄顯諸真妄真同二妄斯説之下不惟妄遣亦乃真祛妄遣真祛道存目擊矣邊依際而立邊際由邊而顯際際非邊而際不自著邊非際而邊不獨存邊既無方際何有界故祖師云極大同小不見邊表極小同大忘絶境界斯説之下邊融際廓洞然無間矣如是則真際與萬法會同萬法與真際交徹在迷則真際是萬法惟悟則萬法是真際悟迷俱遣得失兩融真不立而真存際不形而際遍矣止源字説一塵不飛之頃止乃剩言一漚未發已前源將安寄直下見得便知四大海水止在一源源體本空止亦何有於此絶能止所止之異無此源彼源之差即源是止萬波隨一水而𭣣即止是源一水攝萬波而寂世之不鑑其源者但見百川競注萬派橫流而欲遏之使止大似捧土塞孟津多見其不知量也何當於沿流不止之際瞪目一觀洞見源底則知此源窮古逮今澄之不加清攪之不加濁一滴不加少四海不加多以至決之非動堰之非靜者也何則使澄而後清則不得謂之止矣攪而後濁亦不得謂之止矣乃至曰動曰靜曰少曰多皆識量所遷妄見流注縱能以四鐵圍山隄防一水至萬劫不興寸浪而欲較吾止源之旨者實霄壤矣江西定侍者字止源是必有所得於止之之道豈枯形忘慮而滯於死水者可同日而語哉雲谷號説八荒一雲也天地一谷也一塵翳空萬象各立消長盈虧頃刻百態者雲之變化如是也又何待隨清風出遠岫之謂哉疾風駕雷山振海涌機動籟鳴終日不息者谷之響應如是也又何待呼而後聞扣而後應之謂哉知藏興公深窮此道自號雲谷所以跨昂霄之步如雲行空肆懸河之辨如谷答響宜其然也或曰太虛無形因雲見色天地無口由谷有聲我將空耳目於混茫之先越見聞於未然之表何乃以聲色而為號耶不然雲無心而見色即色明空谷中虛而有聲即聲顯寂假雲谷之號示聲色之體以聲色之體顯空寂之用如教中云十方世界諸如來心於中顯現如鏡中像何疑而不悟哉知藏聞而笑曰我雲無形亦不著空我谷無聲元非滯寂子所説者皆錯下注腳耳月舟字説光明奪夜之謂月直造彼岸之謂舟惟月與舟頗符斯道然道之光不特照夜而無所不燭焉道之體不獨濟岸而無往不至焉以其無不燭則喜怒哀樂如月映千江無一水而非月影以其無不至則過現未來如舟行萬國無一地而匪舟航能即而行之不患其不與道相合也脫或外此則迷雲翳其光世波搖其體而誰有此月誰有此舟者乎一上人以月舟二字表其所學余於是解之就為説偈天上一輪水中一葉上人乘之余復何説無濟字説聖人不以慈亦無意於濟人也由衆生妄自取執而繫形於空有彼此之兩途故聖人以百千方便向平白地上強自指陳以愛為河以煩惱為河以生死為河而於此河以非彼為彼以非此為此以不以彼為此不以此為彼如是兩岸隔斷中流觸目成乖覿體為礙以其礙故則此能礙彼彼能礙此彼此礙中中礙彼此塵塵涉礙法法成差使本來具足圓常不斷之旨昧之又昧矣所以大慈普濟於四十九年純以不二之道導之俾其妄消執謝而自化也知彼不二則不見有此知此不二則不見有彼知彼此不二則不見有中流知中流不二則不見有彼此如是則亘古逮今自一微塵而至不可説廣大世界海融歸至理圓證不二安有捨此求彼之心哉於是大達之士抹過兩邊不存中見掀櫓棹泯絶舟航輥底波濤了無涓滴直下內無能濟之心外無所濟之物其無濟而濟是謂大濟者也苟未達其大濟之濟則安知其為無濟乎慈禪人字無濟宜知此以自勉定叟字説泰藏主字定叟因質其義叟曰定以不動為義然則維摩大士不離丈室斷取妙喜世界置諸掌如轉陶家輪時在座者見彼世不搖動此世不改變此豈非不動者乎雞足峯中飲光尊者入滅盡三昧以伺慈氏下生此豈非不動者乎叟曰不動之理豈如是哉我嘗於一漚未發已前洞見十方平等本際圓同太虛湛如古井諸佛於衆生身中入大涅槃而衆生不知衆生於諸佛體中流轉生死而諸佛無礙至於毗嵐振海而不去大塊已鑿而不來非智力所能乃法如是也故百川競注水體不流萬竅怒號風本自寂乃至亘古今窮法界人畜草木長短纖洪互起迭興而定體自若於中欲覔一毫動相了不可得所謂是法住法位世間相常住者也嗚呼聞叟之論始信那伽常在定之語不我誣矣嗟乎二乘小見以枯心屏志絶慮忘緣為定者縱經八萬劫秪益戲論耳安得斯人亦具清淨耳根聞叟如是之説而捨小慕大乎無念字説昔鳩摩羅什法師年甫七歲隨母入寺以手捧佛鉢置之頂上鉢未及頂而遽投之母問其故乃曰我因頂鉢次悟一切諸法皆從心念而生初捧鉢時不作想念鉢方及頂忽起念云鉢如是大安得不重此念起時其鉢不勝重矣由是知念未起時一切諸法猶若太虛初無分別據什師所見謂念乃法之源也永嘉云誰無念誰無生若實無生無不生喚取機關木人問求佛施㓛早晚成據永嘉所見謂念不生處與木石等也雲南護藏主自號無念因以什師永嘉所見扣之乃曰我之無念異乎其所聞什師過在絶念之不起永嘉過在任念之自起二皆不能無念也謂無念者心體靈知湛寂不動如鏡鑑像如燈顯物其像之妍醜物之纖洪而鏡與燈不知也雖曰不知未嘗毫髮少隱也其照體本空而能顯物曾何念慮於其間哉所謂繁興大用舉必全真我嘗於見聞知覺之頃欲覔念相如毫髮許了不可得而曰無念非不念也無念之念生無生相住無住相異無異相滅無滅相非思慮計度所知惟洞徹法源者頗測其倣佛未易與纏情縛識者語也余嘉其説乃筆以志之無方字説盡塵沙法界是箇自己中邊混融表裏通徹既不可以形器拘而亦豈容囿於方隅也或迷自己於當念則囿於方隅拘於形器以其有方則仰而為上俯而為下日升則東月沉則西不敢易其毫髮由是引起遍計流墮分別交結識情惑於生死者蓋深昧其無方之自己也或曰常啼東行善財南往文殊北邁達磨西來具在典章如其無方何從得此言也余曰前不云乎囿於方隅拘以形器者不可與論無方之自己也徒見常啼之東設使自今日行至盡未來際東之又東豈知盡東無方盡方無東者乎盡東無方則方不可求盡方無東則東不可立常啼爾時惟見般若洞無向背循東求方了不可得東既無方而西南北亦復如是故古云道無方行者莫能至斯言豈欺余哉南徐遠上人號無方余為説無方之義如此音釋㲉克角切瀋音審礦古猛切金朴也瞪澄應切直視也堰於建切埭也

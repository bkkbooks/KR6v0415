body:
  text: 參學門人北庭臣僧慈寂上進拈古公案略舉詳見諸録梁武帝問達磨云如何是聖諦苐一義磨云廓然無聖又問對朕者誰磨云不識師拈云缺齒老僧手泥彈子要與東震旦人鬪富可謂不知量矣被梁王指出照乘明珠問之情知伊道箇不識馬祖見野鴨問百丈云是什麼丈云野鴨子須不見祖云野鴨聻丈云飛去也祖扭丈鼻負痛失聲祖云又道飛去也丈於言下有省師拈云設錦穽以陷獸垂香餌以釣魚惟善作者能之馬師擬獲一禽深入荒草費盡腕力打破半邊鐵網豈善作者哉石鞏凡見僧張弓架箭示之一日三平至鞏云看箭平擘胸對之云這是殺人箭那箇是活人箭鞏彈弦三下平作禮鞏云我三十年架一張弓兩隻箭只接得半箇聖人遂拗折弓箭師拈云穿百步楊透九重鼓固是眼親手便其如半箇聖人有隱身之術石鞏之技窮矣興化謂克賓維那曰汝不久為唱導之師賓云我不入這保社化曰儞會了不入不會了不入賔云總不與麼化便打來日白衆曰夜來克賓維那法戰不勝罰饡飯一堂不得喫飯即便出院師拈云有令不行有事不斷天下之公患也興化既行矣又斷矣未免旁觀者哂六祖一日見二僧論風幡義祖云非風動非幡動仁者心動師拈云嘗鼎一臠具知衆味非風動非幡動仁者心動可謂鼎之一臠矣使人不覺惡心嘔吐大覺謂興化曰我聞儞道向南方行腳一遭拄杖頭不曾撥著一箇會佛法底是否化便喝覺便打化又喝覺又打明日覺召化曰我直下疑儞這兩喝化又喝覺又打化又喝覺又打化曰某甲學得箇賓主句總被折倒了也覺曰這瞎漢脫下衲衣痛與一頓化於言下大悟師拈云二虎之下獸不容蹄兩刃之間人不容足當大覺興化棒喝交馳之際豈容心思意解於其間哉雖然只如大覺云脫下衲衣痛與一頓興化言下大悟又悟箇甚麼道理這裏見得許儞作臨濟半箇兒孫僧問夾山承和尚有言二十年住此山未曾舉著宗門中事是否山曰是僧便掀倒禪牀山休去明日普請掘一坑召僧至曰老僧二十年只說無義語便請上座打殺老僧埋向坑中上座不然自著打殺埋此坑中始得其僧束裝潛去師拈云這僧始則攙旗奪鼓終則詐敗佯輸夾山雖有添兵減竈之謀爭奈腳跟下泥深三尺臨濟三遭黃檗痛棒後向大愚肋下築拳次歸見黃檗云云師拈云汝師黃檗非干我事大愚肋下更合喫拳這風顛漢敢來這裏捋虎須黃檗面門猶缺掌在致使尿牀鬼子邪見勃興賺他後代兒孫一箇箇鼓粥飯氣溈山因劉鐵磨來云老牸牛儞來也磨云來日臺山會上有齊和尚還去麼溈山作臥勢磨便出去師拈云溈山被鐵磨一拶拶倒要起起不得鐵磨被溈山一推推轉要住住不得本上座與麼批判多少人在背後咬斷拇指月氏國王聞師子尊者有道乃越國往見尊者云大王來時好道去時亦如來時王有省師拈云飯裏沙泥中刺倣佛不同依稀相似大王來時好道去時亦如來時尊者黃金鑄面皮雲門話墮因緣師拈云雪上霜枷上杻覿面無私移星換斗要見這僧話墮處麼且待三十年後南泉歸宗麻谷三人同去見忠國師至中途南泉就地畫一圓相云道得則去歸宗坐在圓相裏麻谷作女人拜泉云恁麼則不去也師拈云南泉畫地為牢歸宗墮坑落塹麻谷恭而無禮點撿將來一人眼空四海一人舌拄梵天一人入地獄如箭百丈野狐因緣師拈云非不非是不是坐斷兩頭劒去久矣前百丈云不落後百丈云不昧看來也不較多因甚麼有墮有脫余二十年參學不能明此如有人明得此者我當舍四大為繩牀而用供養僧問雪峯臨濟四喝意旨峯云我當時初行腳時便過河北已值大師遷化不得見他所以至今不知可往見他直下子孫僧見南院院云那裏來僧具陳前意院乃展具遙禮雪峯云天下古佛也師拈云言不在口語不離舌端的有來由特地無交涉臨濟四喝豈但雪峯不知縱是他直下子孫也未夢見在不知且置只如南院遙禮雪峯是有來由耶無交涉耶這裏定當得下要見臨濟也不難南泉為兩堂首座爭猫遂斬之晚趙州歸泉舉似州乃脫草屨頂頭上而出泉云子若早歸救取猫兒師拈云南泉劒為不平離寶匣趙州藥因救病出金瓶然雖慶快一時爭奈古佛家風掃土矣臨濟云有時奪人有時奪境有時人境兩俱奪有時人境俱不奪師拈云有時奪人錯有時奪境錯有時人境兩俱奪錯有時人境俱不奪錯臨濟大師到這裏鎖却咽喉了也莫有為伊出氣者麼切忌將錯就錯臨濟謂三聖曰吾遷化後不得滅却吾正法眼聖云爭敢滅却濟云他後有人問伊又如何祗對聖便喝濟云誰知吾正法眼向這瞎驢邊滅却師拈云認他財為己物將官路當人情濟之心亦濫矣三聖當時見他道不得滅却吾正法眼便與掩却臭口猶較些子遽云爭敢滅却噫以聖較濟又何止濫而已哉靈雲有頌云三十年來尋劒客幾回葉落又抽枝自從一見桃華後直至如今更不疑玄沙云諦當甚諦當敢保老兄未徹在師拈云靈雲白日青天向桃華樹下為魅所著玄沙雖則除邪輔正激濁揚清殊不知又是鬼門上貼卦藥山和尚久不上堂院主云大衆久思法誨山云打鼓著衆集山升座一詞不措主白云和尚今日升座因甚麼一詞不措山云經有經師論有論師師拈云藥山久不上堂與對衆一詞不措將謂將謂末後道箇經有經師論有論師元來元來溈山云老僧遷化後往山前檀越家做一頭水牯牛左肋下書五字云溈山僧某甲正恁麼時道是溈山僧却是水牯牛道是水牯牛却是溈山僧師拈云道是溈山僧却是水牯牛好道是水牯牛却是溈山僧好當時有人向他面前下得這兩箇好字教他百劫千生要脫水牯牛也未得在趙州一日見文遠侍者拜佛次州以拄杖打之遠云拜佛也是好事州云好事不如無師拈云文遠云拜佛也是好事不妨軟頑趙州云好事不如無話墮了也要知趙州老人話墮處麼待伊磕破腦門即向儞道僧問汾陽如何是祖師西來意陽云青絹扇子足風凉師拈云拈得便用道出平常山高水闊地久天長青絹扇子足風凉是拈得便用耶道出平常耶誰人知此意令我憶汾陽僧問風穴語默涉離微如何通不犯穴云長憶江南三月裏鷓鴣啼處百華香師拈云這僧問處如大浸稽天無物不在波瀾之內風穴固是入水不溺爭奈全身在裏許真點胸見慈明明問佛法大意真云無雲生嶺上有月落波心明訶之真乃理前問明曰無雲生嶺上有月落波心真於言下大悟師拈云驅耕夫牛奪飢人食慈明老人未為好手真點胸雖則向這裏懸崖撒手絶後再蘇若要知佛法大意更參三十年始得玉澗頌雲門北斗藏身因緣云北斗藏身為舉揚法身從此露堂堂雲門賺殺他家子直至如今謾度量後五祖戒問其作頌之意澗乃張目視之戒曰若恁麼會雲門不直一錢公亦當無兩目後澗果如其言戒暮年亦失一目覺範和尚曰今妄意測度先德之言疑誤後昆亦可以少戒師拈云北斗藏身話豈但玉澗頌不出便是五祖戒也只得向背後義手暮年各損其目也是好采覺範謂誣謗先宗感果如是休將間學解埋沒祖師心頌古世尊初生無明滿肚惡纏身才出娘胎軟廝禁目顧四方周七步不知腳下水泥深文殊答菴摩羅女其力未充將軍有令下重圍八戶風高馬不嘶兩眼忽開天地闊太平無象到今時女子出定花落銀牀春爛熳月沉金帳夜迢遙虛堂寂寞無人共只把檀香盡意燒外道問佛有六通如何是那一通醉乘白鶴登銀闕夢跨青鸞入絳宮酒醒眼開俱不見一川桃李自春風即心是佛硬似純鋼爛似泥甜如崖蜜毒如砒渾侖吞又渾侖吐賺殺江西馬簸箕非心非佛大地衆生成正覺百千諸佛陷泥犁休將此話頻頻舉却恐閻家老子知南泉住菴被人打破碗鑊一把黃金鈍钁頭引他白日鬼來偷自從去後無蹤跡入眼青山總是愁僧問馬祖離四句絶百非答藏頭黑海頭白因緣白玉琢成西子骨黃金鑄就伍貟心蓮宮人醉歌聲咽月落吳江淚滿襟趙州無翁翁年老齒牙踈口不關風道箇無肝膽一時傾吐了苦哉邪法正難扶洗鉢盂去粥罷教伊洗鉢盂成特地費分踈是非得失渾休問真箇闍黎悟也無黃檗云不是無禪只是無師不是無禪是沒師猫兒尾上繫研槌夜深打殺街頭鼠路上行人那得知萬法歸一一歸何處斧爛柯銷局未闌天風吹鶴下瑤壇滿盤黑白輕轉袖拂蒼梧玉珮寒德山托鉢天生富貴稱雄才織翠華裾擁不開一簇管絃聲未絶醉扶公子上樓臺臨濟四喝小廝兒偏愛弄嬌絲毫不挂赤條條劣獅筋斗重擲拶得蟾蜍下碧霄香嚴上樹全提三寸殺人刀千里聞風鬼亦號沒興有人輕犯著饒伊得命也無毛嚴陽尊者問趙州放下因緣地沒朱砂赤土廩無粒米倒礱糠赤窮自是活不得又被人來指賊贓婆子燒菴三冬枯木遇春陽翠蕚寒英噴古香雪鬢老婆情未瞥冷看花樹哭檀郎木平見洛浦盤龍二老雲峯悅拈云云葉捲西風樹樹寒亂蛩吟砌夢初殘情懷自是不堪聽又把琵琶月下彈趙州勘婆生鐵蒺藜當面擲琉璃坑塹繞身開勸君莫問臺山路多少平人被活埋洞山三頓棒蹉口相酬罪莫逃放伊三頓轉忉忉使他飯袋江西去添得廬陵米價高石鞏張弓平生𠆸倆盡施呈𫼡折蓬蒿箭兩莖半箇聖人還不薦依前日午打三更僧問夾山境法眼拈云我二十年只作境會哭月狂猿攀古樹嘯風猛虎踞懸崖人間別有通霄路不必行從這裏來大事未明如喪考妣大事已明亦如喪考妣萬里山河平似掌一條官路直如絃行人若問窮通事鐵壁銀山在面前丹霞燒木佛火燒木佛丹霞罪脫落鬚眉院主災一陳東風回暖律幾多春色上梅腮則監寺參青峯法眼丙丁童子公案觸著神鋒劈面揮電光石火較猶遲不因洗耳池邊過肯信人間有是非丹霞訪龐居士靈照提籃因緣放籃斂手舉籃歸自是多情惹是非月落畫堂人去後不堪歡笑只堪悲兜率和尚三關性在甚處赤腳波斯叩海門黑風吹浪暗昏昏三更掣斷青霞鎖笑看驪龍戲子孫四大分散作麼生脫空奮雙拳窮滴滴橫擔片板赤條條夜來得箇揚州夢騎鶴腰錢跨九霄眼光落地向甚處去鐵狗銅蛇正奮瞋風刀火鋸肉成塵茫茫長夜幾經劫舉眼無親怕殺人黃龍三關我手何似佛手也解攀花折柳牀頭脫落稱槌打破竈前尉斗我腳何似驢腳轉草鞋倒著走遍四大神州寸步那曾踏著人人有箇生緣夜半胡孫駕船撞破黑風白浪踏水底青天佛手驢腳生緣三關一句齊宣更問如何即是黃龍口裏無涎達磨一日命門人各言所得遂分皮髓云云九年冷坐一旦惺惺是非易辨得失難明分張皮肉骨髓令人路見不平汝得吾皮前長後短汝得吾肉多肥少精汝得吾骨只堪餧狗汝得吾髓脫賺平生盡情為伊注破也只道得八成要見達磨大師麼嶽邊頓落千山勢海上全消萬𣲖聲校訛五十九葉第十行扭南作搊音釋扭女九切穽疾政切陷坑也擘博厄切鈲也𫼡於巧切手拉也臠力兗切塊切肉也攙楚銜切肋歷德切脅幹也鋼居郎切堅鐵也砒房脂切毒藥也钁居縳切太鉏也蛩渠容切蟋蟀也伎倆依渠綺切倆良將切

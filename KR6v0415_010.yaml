body:
  text: 參學門人北庭臣僧慈寂上進題跋跋慈受和尚般若心經注黃面瞿曇向潔白地上拋撒不淨為害滋多慈受菴主不善屏除益增狼藉舍利子在麼與我將糞箕掃帚來題琇禪師代古主答寂音尊者書寂音尊者力排古和尚説法之誤其奮辭舞筆如醫者用峻劑以攻五臟之毒殆與元氣併將蕩滌石室老人痛指寂音公論之失其雄談博辨如百萬師揮戈伐國不問仁人必欲使之血刃而後已審如是則安有古洪二師之盛譽復喧轟於宇宙哉蓋各有所據而然也後之讀其書者苟不具此正眼於是非之外文字其可憑乎題圜悟和尚心要少室不傳之妙就當人正體上舉揚無形𫨻可指無方隅可示無言説可詮無道理可陳虛洞洞空牢牢絶毫芒離朕兆圓滿湛寂真正妙明通貫十虛包含法界不可得有不可得無空由之而空空不可混色依之而色色不可齊入凡夫之迷如水中鹽味同聖人之悟似色裏膠青雪山大沙門之智辨雖淵深廓徹廣大無涯當三百餘會之發機其詞源袞袞放肆汪洋開合卷舒具大自在幽祕微密靡不揭揚獨於此事不能加一元字腳可謂極聖之大猷至神之玄府者也圜悟和尚得法於東山演祖其眼明其機活其意透其語圓不守一方便而開示參徒溢為巨編目曰心要於無言中顯言無象中垂象應機隨器解其所縛去其所重多不病繁少不病簡縱橫得要左右逢原其痛快直捷貴馬師一口吸盡西江細密操持重巖頭只守間間德嶠於心無事其為初機必使其真參實究廢寢忘餐雙泯愛憎兩忘身世機輪活脫不滯一隅捩轉面門一口咬斷返擲踞地豈容湊泊譬如大雲倐忽變化彌綸六合降注甘雨潤滋草木流布江河頃焉開霽覔其去來了不可得非得法自在疇克爾耶一種是説法之師雖臨濟德山亦將斂衽蓋嘗於般若種智積劫熏鍊故獲如是圓轉無礙者也本伏讀再過乃拜手書此以識之固不敢望師橫點首於大寂定門期不孤其所教者矣題東坡居士大悲閣記太虛無相不拒諸相發揮古鏡絶形豈礙羣形影現觀世音大士聞所聞盡覺所覺空神廓太虛智懸古鏡對機應物千手異執千眼齊觀特言其妙用之少分耳使具論其分身遍塵剎一塵為一剎一剎現一身一身千手眼未易以數量知也極理言之非神通使然凡具知覺之性者靡不如是由迷妄所蔽而不自省也豫讀東坡居士所作大悲閣記謂菩薩以無心故能普應羣機變通諸法洞無窒礙似不知菩薩妙證圓通歸復自性慧光照徹如杲日輪雖千手眼同一手眼既不拘於一多又安可以心之有無議之也哉題列子列禦寇知榮辱之在天而不知其本乎一念知生死之由命而不知其根乎自心惟欲忘形骸虛物我一是非泯視聽任天真於智慮之表超情思於得失之源乃鼓舞於老氏絶聖棄智致虛守靜之門與莊周相為表裏因觀其著書八篇故筆以曉之惟同志者擇焉題十牛圖偶觀梁山石鼓倡和十牛圖頌于餘杭接待菴之壁自尋牛而至入垂手一節一節似有程限而然思之古人立言固是一期方便殊不知賺纍後學例皆尋尋覔覔做模打樣曾未休息須知山河大地明暗色空三世十方見聞知覺皆露地白牛之影子耳多少人認此影子以為全牛倣倣佛佛不得受用矧乎又有向影子上覔影子敢保終其身不見全牛也必矣政興此歎忽規上人出紙求語故信筆以似之規曰敢問全牛今在何處余於是投筆附夜航而之武林矣跋天目禮禪師墨迹天目和尚七歲時籃侍母採桑次母戲之曰携籃者誰豁爾開悟今觀其餞侍僧省母有施為動靜憑誰力之句大似螟蛉之子殪而逢蜾裸祝之曰類我類我烏乎多見伊不自知其醜也跋牛腰佛頌軸佛身無為遍在牛腰馬腹智體不動誰分蟻穴蜂房一切處示現受生一切處成等正覺紫金聚沈潛水牯赤肉團無位真人從前話已行即今面目現在本來無位次直下絶安排雖然立處皆真總是顯奇惑衆昔唐文宗愛食蛤蜊忽遇一蛤蜊砧杵不壞尋而解開乃見觀音像於中顯現召惟政禪師問其事師曰應以菩薩身得度者即現菩薩身而為説法帝曰菩薩既已現身惟未聞其説法師曰陛下見此信耶不信耶帝曰焉敢不信師曰説法已竟文宗大悅此話垂五百年矣大德丁未杭之臨安縣里人買二牛腎剖其一中得佛像一軀高寸許非金非石結跏趺坐眉目可覩遂纍石樹奉藏之若見若聞咸生異信其廣長舌相流布法音霆震雷轟卒未之已也公恕施君諸方頌軸訪豫窮山俾為著語因筆前説以似之復為説偈無位真人赤肉團牯牛腰內總相瞞法雷震地通身口若要親聞著眼觀跋梁楷畫妙峯禪師四鬼夜移圖昔南泉謂王老師修行無力被鬼神覷破殊不知鬼神不著便白日被王老師熱瞞相傳妙峯善和尚住靈隱時為四鬼所肩而出當時賴遇妙峯若是王老師未免又作修行無力會也一種是瞞神嚇鬼顯異惑衆今日被人描貌將來不知面皮厚多少題十八尊者圍碁圖俗諦是黑子真諦是白子十八界內奪角爭先平地上逃他分𫨻生死阿羅漢起直饒看得眼睛穿轉碁盤都不是題羅漢揭厲圖諸佛海衆生海聞前輩已嘗置之一毛腹中聲聞雖超越分𫨻生死具跨虎縛龍之力而不能與境混融區區附形體與魚鱉蝦蟹浮沉於粘天鯨浪之間自謂神通不可及矣宜乎起黃檗有斫折其脛之怒雖然也是為他間事長無明跋及菴禪師設利頌軸先師嘗誤中大仰老人之毒每於所剪之髮舍利粘綴如貫珠及菴和尚與先師同出其門而舍利迸于烈火嗚呼異端並起邪法難扶豫於此不能無耻焉題古畫像四首寒拾謂豐干饒舌閭丘為豐干熱瞞一種是針芥相投要且是仁義盡從貧處斷世情偏向有錢家閭丘大守寒山拾得盡謂黃龍指洞賓之劒入地三尺殊不知性命已落神仙之手何則點石化為金玉易勸人除却是非難呂巖機禪師鳥窠和尚謂白侍郎曰薪火交煎識性不停得非險乎白公微領其旨吁當時白公因欠箇末後句反纍其師到今日措躬無地且末後句又作麼生香山居士見鳥窠居士嘗有偈云男不婚女不嫁大家團欒頭共説無生話今其夫妻子女坐立儼然且作麼生是無生話竹籬茅舍安無盡博飯栽田樂有餘龐居士家居圖校訛七十五葉十行石誤作不從南改正七十五葉十二行例誤作倒從南改正音釋眹直忍切幾微萌兆也嶠渠廟切蜾裸蜾古火切裸郎果切蜾裸細腰蜂也蛤蜊蛤古沓切蜊力脂切蛤蜊蚌屬腎時忍均水藏也嚇正作唬虛訝切誑也

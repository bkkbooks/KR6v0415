body:
  text: 叅學門人北庭慈寂進擬寒山詩有客從予而問曰叢林戶稱為叅禪且禪固不可逆測而知惟叅之一言莫識所云請釋之予曰所云叅者乃古人咨决心疑究明己事不可不由之徑也如安心懺罪洗鉢盂聞水聲之類耳蓋生死之心疑未决如墮網之欲出若沐漆而求解望見知識之容未待卸包脫屨其胷中岌岌未安之事遽衝口而問之一言不契又復往叩而他之或停餐輟飲廢寢忘勞至若風雨寒暑之不移禍福安危之莫奪其所叅之念不致洞明不已也是謂真叅餘皆似之耳非叅也何謂似如火爐頭禪牀角領納一言半句相似語蘊于情識不自知覺久之遇緣逢境忽然觸發是謂知解依通非叅也或於方冊梵夾中以聰明之資博聞廣記即其所曉處和會祖機一一合頭乃穿鑿摶量非叅也或循規守矩不犯條章靜默安舒危坐終日乃緣境攝持非叅也或搜尋難問記憶機緣堂上室中苦攻逆敵者乃狂妄時習非叅也總而言之但胷中實無為生死大事之正念或形影相弔於巖穴之下或肩駢踵接於廣眾之中各偏於所向而取著之非吾所謂叅也矣客又曰近代尊宿教人起大疑情看古人一則無義味語斯可謂之叅乎予曰傳燈諸祖各有契證初未聞有看話頭起疑情而悟者良由機緣泛出露布橫生况是學者胷中為生死之心苦不真切脚未跨門咸遭誑惑由是據師位者不得已而將箇無義味話放在伊識田中教伊吞吐不行齩嚼不破孜孜兀兀頓在面前如銀山鐵壁不許其斯須忘念日深月久情塵頓盡心境兩忘不覺不知以之悟入雖則不離善權方便亦與叅之之義幾近矣或學者不實以死生大事為任則師與資俱成途轍荊棘祖庭穢滓佛海豈叅云乎哉因往復酬酢遂引其說偶成擬寒山詩一百首非敢自廣蓋痛心於教外別傳之道將墜無何誠欲䇿發初心之士耳或謂宗門有活句死句全提半提擒縱無偏與奪自在之理子何不發明之此何時而尚欲以實法綴繫於人耶予曰世有能跨千里之步而終身不能自越其閫者予不信也彼與奪自在之師皆由叅之不謬悟之無垠蓄養深厚如千里駒輕肆其足便有追風逐日不可及之態而不自知也使彼師苟存其與奪自在之見于胷中則人法不空能所交接與魔外何別哉當知真寂體中尚無地可寄其與奪自在之迹則其可講而學耶得不重貽達者之所譏蓋識法者懼也道人其鑒諸叅禪一句子衝口已成遲擬欲尋篇目然墮水泥舉揚無半字方便有多岐曲為同叅者吟成百首詩叅禪莫執坐坐忘時易過疊足取輕安垂頭尋怠惰若不任空沉定應隨想做心華無日開徒使蒲團破叅禪莫知解解多成捏怪公案播唇牙經書塞皮袋舉起盡合頭說來無縫罅撞著生死魔漆桶還不快叅禪莫把玩流光急如鑽那肯涉思惟豈復容稽緩時刻不暫移毫𨤲無間斷撒手萬仞崖乾坤無侶伴叅禪莫涉緣緣重被緣牽世道隨時熟人情逐日添工夫情未瞥酬應力難專早不尋休歇輪回莫怨天叅禪莫習懶懶與道相反終日尚偷安長年事踈散畏聞廊下魚愁聽堂前板與麼到驢年還他開道眼叅禪莫動念念動失方便取捨任情遷愛憎隨境轉野馬追疾風狂猿攀過電蘸唾捉蓬塵癡心要成片叅禪莫毀犯動輙成過患作止誠可分開遮豈容濫內外絕安排自他俱了辨突出摩尼珠光明照天岸叅禪莫揀擇舉世皆標格曾不問閑忙何嘗分語默一念離愛憎三界自明白更擬問如何當來有彌勒叅禪莫順己動須合至理工夫要徹頭志願直到底瞥爾情念生紛然境緣起白日擬偷鈴難掩虛空耳叅禪宜自肯胷中常鯁鯁不擬起精勤自然成勇猛一念如火𤍠寸懷若氷冷冷熱兩俱忘金不重為鑛叅禪宜退步勿踏行人路橫擔一片板倒拖三尺布得失豈相干是非都不顧驀直走到家萬象開門戶叅禪宜具眼庸鄙休觀覽千里辨雌黃雙輪豈推挽洞見佛祖心爍破鬼神膽搖搖照世光不受眉毛叅禪宜朴實朴實萬無失纖毫若涉虛大千俱受屈話柄愈生踈身心轉堅密一氣直到頭捏出秤鎚汁叅禪宜努力真心血滴滴如登千仞高似與萬人敵有死不暇顧無身未堪惜冷地忽擡頭何曾離空寂叅禪宜簡徑只圖明自性了了非聖凡歷歷無欠剩擬向即是魔將離轉成病脫略大丈夫塵塵自相應叅禪宜及早遲疑墮荒草隙隂誠易遷幻軀那可保當處不承當轉身何處討寄語玄學人莫待筭筒倒叅禪宜正大切勿求奇怪真機絕覆藏至理無成壞拽倒祖師關打破魔軍寨赤手鎮家庭塵塵俱出礙叅禪宜决定莫只成話柄瞥爾墮因循灼然非究竟但欲了死生何曾惜身命一踏連底空佛魔聽號令叅禪宜捨割命根要深拔活計再掃除生涯重潑撒寸念空牢牢萬古阿剌剌放出一毫頭光明吞六合叅禪要明理理是心王體每與事交叅惟有智堪委法界即其源禪河以為底後園枯樹樁勿使重生耳叅禪要直捷一切無畏怯用處絕踈親舉起無分別法性元等平至理非曲折過去七如來與今同一轍叅禪要到家不必口吧吧履踐無生熟途程非邇遐寸心常不動跬步亦何差踏斷芒鞋耳門前日未斜叅禪要脫略何須苦斟酌道理要便行事物從教却豈是學無情自然都不著更起一絲頭茫茫且行脚叅禪要精進勿向死水浸動若蹈輕氷行如臨大陣晝夜健不息始終興無盡捱到髑髏乾光明生末運叅禪要高古備盡嘗艱苦身世等空華利名如糞土深追雪嶺蹤遠接少林武道者合如斯豈是誇能所叅禪要識破萬般皆自做榮辱與安危存亡并福禍元是現行招等因前業墮如是了了知世間無罪過叅禪要本分只守箇愚鈍豈解敘寒暄何曾會談論兀兀似枯樁堆堆如米囤一片好天真常不離方寸叅禪要孤硬素不與物諍白日面空壁清塵堆古甑遇境自忘懷隨緣非苦行昨夜煑虛空煨破沙糖甏叅禪要深信豈應從淺近直擬跨懸崖不辭挨白刃橫披古佛衣高佩魔王印道源功德山咸承慈母孕叅禪為生死豈是尋常事從始直至終出此而沒彼不啻萬劫來曾無片時止今日更遲疑又且從頭起叅禪為成道丈夫宜自保雪嶺星欲沉鰲山話將掃疾捷便身更莫打之繞轉步涉途程出門都是草叅禪為超越大地無途轍寸心千丈坑萬里一條鐵躍出威音前坐斷僧祗劫回首照菱花銳氣生眉睫叅禪為絕學擬心成大錯既脫文字禪還去空閑縛拈却死蛇頭打破靈龜殼腰間無半錢解跨揚州鶴叅禪為究竟直入金剛定兩端空悟迷一道融凡聖澄潭浸夜月太虛懸古鏡儞擬著眼看即墮瑠璃穽叅禪為直指未舉心先委動足路千條擡眸雲萬里安心鍮雜金懺罪乳加水棒喝疾如風煖熱門庭耳叅禪為己事要明還扣己得失莫回頭是非休啟齒不肯涉蹊徑直欲探源底流出自胷襟孤風絕倫比叅禪為圓頓豈分根利鈍草木尚無偏含靈皆有分一法印森羅三藏絕言論更擬覔端由道人今日困叅禪為求悟胷中絕思慮但欲破疑團决不徇言路寢食兩俱忘身心全不顧蹉脚下眠牀絆斷娘生袴叅禪為明宗道不貴依通鷲嶺花猶在熊峯髓不窮心空千古合見謝五家同情識猶分別門庭是幾重叅禪無利鈍且不貴學問妙悟在真疑至功惟發憤任說他無緣直言我有分一踏桶底穿蟭螟吞混沌叅禪無古今但勿外邊尋席上沉孤影牎前惜寸隂志密行亦密功深悟亦深打開無盡藏撮土是黃金叅禪無貴賤各各不少欠密護在真誠精操惟正念廊廟倦躋攀輿臺忘鄙厭悟來心眼空昭然無二見叅禪無奇特惟貴心無惑對境消佛魔當機泯空色問著有來由舉起無蹤跡曾不離平常通身自明白叅禪無巧妙非覺亦非照將底作光明以何為孔竅佛祖弄泥團象龍噇草料海底黑波斯却解逢人笑叅禪無限量古今稱絕唱跳下破繩牀拈起折拄杖祖令要親行佛亦難近傍子細點撿來盡是做模樣叅禪無秘訣只要生死切心下每垂涎眼中常滴血盡意决不休從頭打教徹脫或未相應輪回幾時歇叅禪無僧俗四大同機軸一念根本迷萬死常相逐推開生死門打破塵勞獄手下煙蘿共唱還鄉曲叅禪無愚智家親自為崇智者落妄知愚人墮無記拶破兩頭空轉歸中道義拈起一莖柴覆却西來意叅禪無靜閙盡被境緣罩聞見有兩般混融無一窖水底月沉沉樹頭風浩浩更擬覔家鄉路長何日到叅禪非義學豈容輕卜度拽斷葛藤根解開名相縛一句鐵渾侖千聖難穿鑿蹉口忽咬開虛空鳴嚗嚗叅禪非漸小至體絕邊表難將有限心來學無為道一證一切證一了一切了遙觀兔渡河特地成煩惱叅禪非可見可見墮方便鳥跡尚堪追電光還有現靈鑑寫羣形體用成一片擬剔兩莖眉浮雲遮日面叅禪非可聞敲唱謾區分語默影摶影放𭣣雲合雲石鼓鳴晴晝煙鐘送夕曛未能忘口耳響寂動成羣叅禪非勸誘誘引那長久超越須自心出生離佛口一步跨向前萬夫約不後作略解如斯步步無窠臼叅禪非術數單提第一句佛祖不能窺鬼神爭敢覷靜若須彌山動如大火聚徧界絕覆藏當機無覔處叅禪非息念妙性圖親見瞥起落緣塵不續墮偏漸起滅有蹤由渾侖非背面當處悟無生塵塵離方便叅禪非自許至理通今古覔處不從他得來須契祖句句合宮商門門追步武毫髮若有差惺惺成莽鹵叅禪非杜撰要了舊公案擇法任胷臆為人若氷炭道本絕踈親理爭容混濫一點更留情自他何了辦叅禪非教外亦不居教內兩頭能混融一道無向背法法契真宗處處成嘉會少存分別心直入魔軍隊叅禪絕所知有知皆自欺靈光雖洞燭當體屬無為擉瞎棒頭眼掃空繩上疑更來存此跡節外又生枝叅禪絕能所獨行無伴侶既不徇涯岸何曾立門戶空棒鞭鐵牛幻繩牽石虎機關活卓卓疑殺少林祖叅禪絕聖凡三界沒遮欄染淨遭他惑悟迷還自瞞倒卓青雲眼橫趨赤肉團欲名名不得今古許誰看叅禪絕階級坦蕩又平直擬動脚趾頭直墮心意識三界鼓狂花萬里栽荊棘舉似王老師堪嗟又堪惜叅禪絕露布機前莫罔措喝退趙州無趂出雲門顧縛住走盤珠塞斷通天路不假拈一塵兩手都分付叅禪絕有無道人何所圖空中書梵字夢裏畫神符不有何庸遣非無曷用除話頭如不薦徒費死工夫叅禪絕真妄語言難比况幻名惟兩端空花非一狀智者欲掃除愚人常近傍舉措似勤渠於法皆成謗叅禪絕修證生死那伽定三有金剛圈十虛大圓鏡徧界淨法身極目真如性動著一毛頭驢年會相應叅禪絕照覺道人休卜度擊碎明月珠剪斷黃金索拈過赤斑蛇放出青霄鶴去就不停機依前未離錯叅禪絕影像豈許做模樣象龍徒蹴踏佛祖謾勞攘徧界覔無蹤當陽誰敢向有人稱悟明快來噇拄杖叅禪最易為只要盡今時不作身前夢那生節外枝日移花上石雲破月來池萬法何曾異勞生自著疑叅禪最簡捷當念忘生滅聞見絕羅籠語言盡超越昨夜是愚癡今朝成俊傑好箇解脫門惜無人猛烈叅禪最成現元不隔條線滿眼如來光通身菩薩面圓聞聞不聞妙見見非見墮此兩重關入地獄如箭叅禪最省力不用從他覔壯士臂屈伸師王影躑纖疑或未銷操心來辨的回首望家鄉鐵壁復鐵壁叅禪最廣大一切俱無礙橫亘十方空竪窮三有界既不涉離微曾何有憎愛時暫不相當依前入皮袋叅禪最明白大用無軌則揭開三毒蛇放出六門賊徧造業因緣都成性功德勿使路人知恐他生謗惑叅禪最瞥脫不受人塗抹來去赤條條表裏虛豁豁喜時則兩與怒來便雙奪觸處不留情是名真解脫叅禪最安樂不被情塵縛真照豈思惟靈機非造作一處證無為千門成絕學窮劫墮輪回由來自擔閣叅禪最枯淡冥然忘毀讚兀兀守工夫孜孜要成辦如飲木札羹似噇鐵釘飯此心直要明不怕虛空爛叅禪最寂寞寸懷空索索四大寄禪牀雙眸懸壁角疑團不自開情竇徒加鑿但得志堅牢何愁天日薄叅禪不持戒那更存知解弗省是自瞞尚欲添捏怪生死轉堅牢輪回無縫罅坐待報緣消且來償宿債叅禪不守己硬要說道理卜度須彌山便是栢樹子但只鼓唇牙不肯憂生死禪到眼光沉噬臍無及矣叅禪不合度紛紛徇言路公案熟記持師資密傳付世道愈相攀己躬殊不顧十𠕋古傳燈轉作砧基簿叅禪不解意纔聞便深記兜率有三關曹洞列五位楞嚴選圓通雜華宣十地及話到己躬一場無理會叅禪不著物立地要成佛肯將生死心沉埋是非窟從古墮因循如今敢輕忽生鐵鑄齒牙一齩直見骨叅禪不顧身直與死為隣寸念空三際雙眸絕六親門前皆客路衣下匪家珍誰共滄溟底重重洗法塵溫陵曰法塵非相因意知顯叅禪不可緩自心須自判迷悟隔千塗首尾惟一貫掇轉鐵圍山現出金剛鑽變化不停機把伊眼睛換叅禪不屈己人天咸讚羙英氣逼叢林真風振屏几千聖共擡眸萬靈皆側耳一句絕承當敲出少林髓叅禪不求勝勝為禪人病勝乃脩羅心勝即魔軍令勝非解脫場勝是輪回穽惟佛無勝心所以稱殊勝叅禪不求名叅禪不為利叅禪不涉思叅禪不解義叅禪只叅禪禪非同一切叅到無可叅當知禪亦戲叅禪第一義全超真俗諦達磨云不識六祖道不會古月照林端高風吹嶺外兒曹共指陳呼作西來意叅禪欲悟心該古復該今仰處如天闊窮之似海深名聞三際斷體露十虛沉圓湛含空色奇花秀晚林叅禪非戲論直欲契靈知積學非他得施工是自欺精金離煆日古鏡却磨時或未忘聞見何曾出有為叅禪禪有旨旨悟亦無禪少室空餘月靈山獨剩天認聲言直指對影說單傳今古尋玄者區區亦可憐叅禪緣底事獵縣更遊州但覺千山曉那知兩鬢秋工夫增執縛學問長輕浮逗到龕幃下清燈照古愁叅禪何太急東去又西馳走殺天真佛追回小廝兒空中施棒喝靴裏動鉗鎚縱有神僊訣難教出水泥叅禪誰作唱少室有神光雪重齊腰冷刀輕隻臂亡真風陵大法英氣勵頹綱孰謂千年後門前賊獻贓叅禪無樣子樣子在當人本淨通身白元無徹骨貧胷襟懸古鏡懷抱積陽春不待重開眼何曾隔一塵叅禪作麼叅切忌口喃喃擺尾淹虀瓮低頭入草菴有言非向上無句起司南未解如斯旨前三復後三叅禪叅不盡叅盡若為論鶴放青松塢牛尋碧水村雨深苔蘚路雲掩薜蘿門更覔禪叅者歸家問世尊校訛七十三葉十八行而南作時七十七葉八行晝誤作畫從南改正音釋駢蒲眠切聯也滓壯士切濁也鑛古猛切銅鐵樸石也古禪切蓋也羊列切拕也與拖同甑子孕切甗也睫即涉切目旁毛也鍮他侯切石名似金祟遂切神禍也攘人樣切札側八切廝相咨切養馬者

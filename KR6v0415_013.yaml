body:
  text: 參學門人北庭慈寂進楞嚴徵心辨見或問玄樞密運亘剎土而無法不周靈鑑高懸統沙界而有形莫隱有形莫隱之謂見無法不周之謂心曾無外見之心寧有離心之見類純金之鑄像猶湛水之興波舍像無以覔其金全金是像撥波何以求其水即水生波名雖異而似差體常一而無別是以世尊據玄樞之正體設問多端阿難昧靈鑑之真光指歸七處或問阿難正當七處指陳之頃為是故指以祛末世衆生之惑耶惟復果不知而墮此迷悶耶答不見其智不知其愚愚為發智之端智乃遣愚之本如來抱大雄之正智靈鑑昭然阿難示小乘之偏愚玄樞昧矣然而智不待遣愚而養智如來徵而無徵愚不待發智而守愚阿難答而非答乘一時之方便開萬古之圓聞者大哉阿難之慈也聞過去佛所説法要阿難悉能通記無遺於其心法固不能詳知而具悉豈不能槩領也蓋憫傷末世示此愚蒙深欲曲盡如來之本懷以為後學之據耳或問阿難七處所指皆心所不在則人皆謂之無心可乎答心離四句當體不涉其有無道絶百非應念豈論其離在昧之則是非蜂起了之則凡聖情融然阿難指處孰曰心之不在惟是不了心源墮於偏小致使如來曲盡玄辨以攻其偏且心之為理者一切衆生各各具足况人為萬物最靈而不具心體者乎若曰無心誠為自惑或問七處所指既偏究竟孰當為正答象軀不隱隱歸羣士之盲空體無方方在衆人之執象不為盲而故隱空豈因執而定方聖心曷有正偏偏正各因其所見耳請以喻明之如有一人曾於七處住止偶遭人問月出沒於何地首則曰月自水東出而水西沒謂昔居水國乃爾見之又云月自山頂出而山下沒曾居山中見之又云月自城頭出而城外沒昔居城中見之又或指月出沒於舟之左右樓之上下村之前後郭之東西皆其曾居而見之遂成執於胸中而智者咸不許其説當知彼所指處未嘗非月也惟是月實不於此七處出沒原其所指之謬者無他雖處處見月惟未曾仰天一見耳如阿難所指處不曰非心但未曾親自回光一照耳或問據爾所喻則阿難所指之處而此心曷嘗不在焉答無形之形豈眼目之可見非在而在奚蹤迹之能尋離彼離此而卓爾獨存匪中匪邊而湛然常住此一切衆生歷劫由之而不自知者然世之言大者莫越虛空塵沙法界咸為虛空之所包括如來云當知虛空生汝心內猶如片雲點太清裏又云空生大覺中如海一漚發且虛空最大於吾妙明心中特片雲一漚耳由是而知心之體量豈凡愚所能測哉阿難示同迷惑為妄見所障指歸七處豈非棄百千大海而認一浮漚體目為全潮故如來亦不能不以此徵之其偏小之執到此昭然莫隱也或問心體既遍於山河大地緣何離身外咸無知覺豈曰心遍而不具知覺耶答萬竅並號扶搖莫知其有力羣幽洞燭晨曦自若其無功至理未嘗不融迷妄以之自惑耳汝謂離身不具知覺且置之勿論言身內之知覺者特不過飯之而飽衣之而暖染之則垢澡之則淨至於順喜逆嗔樂榮苦辱與夫博通事物記持古今而已汝元不思如上所緣皆似知覺而非知覺也何謂似乃因根境相對虛妄緣塵和合而有非真知覺如來之徵辨者政所以發明於此也汝猶不悟尚復認此為知覺且汝身中咸捨此妄則何以為知覺乎或曰此身既曰亦無知覺豈可同土木耶答此身離却虛妄緣氣政同土木無殊或曰如是虛妄必從何起答亦無起處但是你一念自背真覺之體即其真覺轉為如上等虛妄緣塵或曰悟達之士寧有飯而不飽衣而不暖者乎知則亦同虛妄不知則還同土木耶答汝言不知則真覺之體安有暫時不在之理乎子不聞迷而為識悟而為智換名不換體也故經云根塵同源縛脫無二識性虛妄猶如空花何謂識認體為我執持分別之謂也何謂智了體非我離諸分別之謂也或曰悟達之者見山不曰水見僧不曰俗謂之無分別可乎答真寂體中本具靈鑑分別而與識分別異者識乃起心分別者也智乃無念分別者也或曰既云無念憑何分別答子不見世間所謂明鏡者乎鏡乃無情不具諸識安有念體而妍則現妍醜隨現醜豈曰不分別蓋其體明故洞鑒乃爾似分別而實無有能分別之念也與吾靈鑑之體何殊所以云萬竅因風而號羣幽由日而燭則風何意於號萬竅而動日何念於燭羣幽而來皆體本如然似有為而實無能為之心耳爾如體此則終日喫飯不妨言飽實無嚼破粒米之能終日著衣何礙言溫安有曾挂寸絲之執所以云修習空花梵行宴坐水月道場凡聖情忘是非見盡真知靈覺一道齊平豈分其身內身外乎據所問云身外咸無知覺今復問汝汝今離此四大身外覺有物耶覺無物耶若曰不覺有物應同土木既曰有覺能了知耶不能了知耶縱汝失心不能了知認明為暗指色為空雖曰謬陳非無知覺况是縱手所指虛空物象大小美惡靡不明辨苟非知覺孰臻於此忽然之間妄惑頓空執情銷落則知十方虛空是大圓鏡不加磨拭而照古照今三千剎海即楞嚴王豈假證修而融凡融聖到此則所謂虛妄知覺將無地可寄矣故永明和尚以一心萬法為體就如來一代時教中撮出要文乃成宗鏡謂以一心為宗照萬法為鏡雖百卷之文繁大意惟欲揀辨虛妄獨顯無念之真覺耳當知永明未作宗鏡時一心未嘗不照萬法也豈特永明然迦文未出靈鷲山時一心亦未嘗不照萬法也此理混今古而無變隨語默而不遷極而論之惟在當人脫略見聞赤身領荷實非言通而意達者故永嘉大師謂若以知知寂此非無緣知此破依文字能所而知此靈知之體也即經所謂知見立知即無明本何則蓋欲妙契靈鑑體中本具無念之知此無念之知不容別有所知也又云若以自知寂亦非無緣知謂雖不假文字因緣等以夙根不昧生而能知言非無緣者謂尚存能知之迹耳故經云自心取自心非幻成幻法何則蓋真寂體中之知覺元不因一法而具也苟不依體而證儻存毫末許言其知見者皆墮戲論汝言身內外者豈特戲論斯實狂愚矣或問衆生知覺與如來知覺同耶異耶答衆生食鹽曰鹹諸佛乃云不淡諸佛指火云熱衆生則曰不寒雖遮表之詮異途而知覺之性同轍苟真妄而不隔則生佛以何殊然而知覺約有兩種一曰真知真覺一曰妄知妄覺此兩種似同而異雖異而同故凡聖以之區分迷悟以之隔越也如圓覺序謂血氣之屬必有知凡有知者必同體此正指真知之體一切衆生本來具足與諸佛常住法身覿體不別此體湛然常寂廓爾靈知名之曰心遍含法界雖諸世間相剎那剎那生住異滅而此體不動也故如來所徵者直欲顯此心耳此心離一切名相及與聖凡染淨因緣自然真妄和合以至見聞覺知等法所謂妄者即是今此四大為身根塵相對蘊藏隂識隨處執持而生分別所以取捨愛憎念念遷流而不自息者也此之妄體由根塵虛妄和合似有其體根塵忽消此妄亦滅此即阿難所指之心也而如來云胡不斥之哉故曰此虛妄心離却前塵畢竟無體又曰由塵發知因根有相相見無性同於交蘆此所謂似同而異也或問此虛妄體為是依真而有為是離真別有若曰依真而有則妄即是真若曰離真別有則宛成二體答依真立妄似結水以成氷由妄顯真若見煙而知火固是堅氷即水奈何氷無流動之形雖曰猛火即煙而乃火無鬱㶿之象執之則千塗各立了之則一道齊平法界之理既然則如來不容其默矣良由衆生未達聖人善權方便隨其語言而生執縛於無同異中熾然同異如來所以對同立異真妄斯彰破異立同真妄俱泯而經中舉一巾六結立喻詳明一巾喻真六結喻妄非一巾無以成六結真為妄所依非六結無以顯一巾妄為真所倚故如來謂解結因次第六解一亦亡則知羣妄既消一真何有以妄望真雖異而同也或問真該妄末妄徹真源真妄既同而生佛之途常異者何也答起而無生諸佛入涅槃于衆生識海寂而常動衆生墮生死於諸佛心源理求之則全同事推之則逈隔雖曰同具知覺之體諸佛自空劫以來如理而解如解而行如行而證而衆生有迷而未解者有解而未行者有行而未證者以故異之耳然迷而未解者固未可論而况口談實相而意逐攀緣迹履空宗而情沉有海虛叨了解之優名實墮凡愚之劣行然真妄同源言其性具古今之下未聞有不絶妄而返真不遣真而契理者惟頓漸之等差耳此約事行而言若約理則十法界同具一心經云心佛衆生三無差別豈生佛之果異耶其所異而不能同者乃妄未遣也真未泯也見未亡也總而言之惟心之所以未明也或問真妄之外別有心耶別無心耶答屋是總名依屋以顯其成壞心為正體因心以發其妄真曲引喻文重下注腳一心喻虛空也真喻明也妄喻暗也當明時空與之俱明暗時空與之俱暗真妄似與心同也非虛空無以顯其明暗則真妄不離心也極而究之則虛空之體今古廓然了不為明暗之所遷乃知一心與真妄泮然矣至此則列羣峯於五嶽咸消高下之形引萬派於四溟共失淺深之迹豈真妄之復云乎哉或問六根具含妙用而如來單辨其見者何也答五色可盲老子未盡傾肝膽千里能視離婁欠剔起眉毛覩薄伽梵忽起愛源遇摩登伽幾沉欲海不因樵子徑爭到葛洪家手頭撥動金剛錍髑髏揭盡根塵瞙其所以單辨其見者首因阿難謂我以眼見如來三十二相之説乃辨之耳一根既了六處同明今分其所見有二一者如來以心體靈知了了不昧之為見是謂真見二者阿難依衆生執以眼對前塵諸有色象之為見是謂妄見其言妄者離種種前塵則無有見其言真者不涉前塵乃至因緣和合等相指真寂體中廓爾靈鑑豈日輪黑月使之能見哉而如來與阿難揀辨前塵不出八種各還所屬乃顯其離塵無見也所言不汝還者非汝而誰即破妄顯真耳或問眼對前塵既不名見今我眼中謂之無見可乎答山青水緑本色人鑑在機先夜暗晝明靈利漢視超色表舉措消歸自己縱橫肯墮前塵苟不如斯實為顛倒何則豈不聞如來謂若曰眼見諸己死人眼目現在云何不見又云譬如盲人忽得眼光名為眼見若有眼人處於暗室忽得燈光當名燈見燈能顯色是眼非燈眼能顯色是心非眼於此了悟則眼實何見之有哉或問若物即見是見非物若物非見云何見物此説謂見與物似同似異答頽甎齊古鏡當機莫隱其暗明巨闥倚高垣覿體難藏其通塞雙與則物生見起雙奪則見泯物沉豈同異云乎哉以要言之物不是見見不是物見能顯物物能顯見物非見而不物見非物而不見矣如其不委更聽下文若物即見不須更覔含元殿是見非物一切聖賢如電拂若物非見彩雲遮却神仙面云何見物龜毛束斷虛空骨阿難早不解回頭幾致釋迦同受屈一塵不有遍大千未亡見者休尋覔或問即物顯見理既昭然今見物時即名見見如何答燈鏡交光相在相入而塵塵合妙網珠接影互融互攝而處處分身撥開百草頭邊突出萬人海裏停機則失擬心即乖將尋自是螢光欲取便成魚目何則經云若見是物則汝亦可見吾之見此如來謂若見是物則我之見亦與物等物既可見則汝亦可見吾之見也又云吾不見時何不見吾不見之處若見不見自然非彼不見之相此如來謂物非隱顯見有離在若見是物則物無隱而不見之説以見非物故則見有離在見當離物之時名為不見之處云見不見者謂吾當離物了無可見之時汝若果能見吾離物不見之處則我之見果與物等如是則自然非彼離物不見之相也以其見實非物故使其見若離物則不見矣復云若不見吾不見之地自然非物者謂既不能見吾不見之地則我之見自然非物矣此一𫨻意義重疊詳陳曲喻主意在於破彼認物為見之謬直欲俾其知云見不是物也或問離物惟見惟見即心見見之時見非是見又何謂也答離雲玉鑑照之則影落千潭出匣龍泉用之則尸橫萬里大火聚豈容湊泊金剛圈不許撮拏撥著便轉已墮功勛提得即行早成途轍原夫如來直指靈鑑心體不特破根塵相對之妄亦乃破離妄絶對之真蓋真妄兩途皆衆生無始時來之見病也故云見明之時見不是明此乃破妄顯真又云見見之時見非是見與真俱遣矣故偈云言妄顯諸真妄真同二妄猶非真非真云何見所見如來到此可謂詞窮理極矣然真妄既遣謂見猶離見見不能及者獨指靈鑑之體內外圓明離諸聞見故維摩亦云法非見聞覺知若求見聞覺知是則見聞覺知非求法也蓋謂見聞覺知皆依虛妄根塵和合而有何當赤身挨入徒手揭開妙明真心廓爾無際以之為見則麗杲日於長空以之為聞則啓蟄雷於虛谷豈復為浮光幻影之所籠絡者哉或問久為妄所纏欲斷絶之未有其方請教之答我不識妄從何起而你欲斷妄若妄從心起則妄可斷而心亦可斷心既可斷則諸佛之一乘菩薩之六度緣覺之十二緣聲聞之四諦天人之十善皆可斷也使其果可斷則眼之所見耳之所聞乃至舌味意緣水濕火熱風動地堅世出世間俱可斷也如上諸緣不可斷故則汝所謂妄者亦無有可斷之理也曰苟不可斷則未免相續去也咄是何言歟其起心斷妄尚爾不許而豈容其相續耶據爾云則爾之妄體果有斷滅之時也苟未嘗斷滅則何續之云乎汝元不知自無始劫前最初不覺瞥興寸念違背真心引起遷流逮今新新不住乃至諸佛出世祖師西來皆汝妄情之所執受欲絶此妄當明自心自心一明則無邊妄緣覿體融會矣辭曰妄非心明而不絶心非妄絶而匪明心明則絶妄而明妄絶則明心而絶妄絶故色空明暗不礙眼光何見之可辨心明故聞見覺知𭣣歸毫末何心之可徵誠為祖禰不了殃及後人更或有疑請求達者徵七處於二千年外阿難獨未曾迷拈一花於百萬衆前迦葉何嘗解悟裂開一味平等之體演出萬般差別之名教海斯彰兔角杖挑潭底月禪關遽啓龜毛繩縛樹頭風走殺天下參禪人惑倒世間求佛者蓋為當時鹵莽虛延幻影浮光今日思惟觸著銀山鐵壁客有以徵辨之疑見請余故引問答之義相酬不過借彼杖繩謾爾控他風月英靈上士獲真心於形名未兆之先俊邁衲僧具妙見於言象不該之表詎肯按圖索馬指迹云牛掃空生佛之狂言蕩盡妄真之魔説爾如加誚我何敢辭校訛二十七葉第十行致疑當作政音釋竅苦弔切穴也㶿蒲沒切蒸熱貌錍逋眉切

body:
  text: 參學門人北庭臣僧慈寂上進針銘貪瞋癡針并序一迷根乎自心縱而為貪抑而為瞋合而為癡良由迷無自性由不守正念而生以其生故曰貪曰瞋曰癡皆一迷之異名也聖人不以砒霜鴆酒為毒而以此為毒者以其喪壞法身淪溺慧命也今三有界中衆苦充滿無有一物不本乎貪等一中其毒則殺盜淫業四面紛合卒莫之避良可哀也惟悟達自心洞契法源之士能奪其縱之之貪以求道返其抑之之瞋以治心轉其合之之癡以利人資長法化則貪瞋癡果何物耶乃為針曰惟貪如海瞋以火喻癡比同雲依一心住心迷則來心悟乃去優劣聖凡不離當處勿強分別毋勞指注如手掌兮放開捏聚戒定慧針并序一悟根乎自心揀而為戒守而為定融而為慧良由悟無自性因不失正念而生以其生故曰戒曰定曰慧皆一悟之異名也聖人不以栴檀沉水為香乃以此為香者以其光明雲臺盤結不散莊嚴法性之上妙具也今雜華法界衆寶充滿無有一物不自吾戒定慧而生焉一熏其香則法報化之跡隨念出現其有尚存悟理未盡功勳者執其存之之戒以違宗泥其守之之定以礙理放其融之之慧以失妙欲望其超然於寂照圓明之戶未知其可也戒定慧云胡不辨哉乃為針曰由戒而定即定以慧三法互融了無向背熏之為香充塞大地聞惟在心嗅不以鼻功用兩忘動靜一致如走盤珠不可思議喜針并序世之所謂喜者由適情遂欲而生焉道人不爾必使情消欲盡動與理融不遭愛見諸魔之所惑其喜也政未易以足蹈手舞既其情狀者焉針曰至哉之喜徹法源底曰如意輪契解脫體愛見不住情欲何倚劫外春回花開碓觜怒針并序為物所忤怒氣結為心火至使面赤髮立不蹈禍機不已也聖賢則不然其一怒如金剛王劒諸煩惱魔嬰其鋒者應念斬截然後致萬物於無諍之地則其怒也豈徒然哉針曰聖賢奮怒不墮諸數却煩惱魔成大法聚嗟凡夫瞋燒然無度當處撲滅神機獨露哀針并序凡夫哀聖賢亦哀凡夫結情妄而致哀聖賢乃哀其所謂哀也於是發為辭章悲奮激切必使其感愕於中脫略情妄則其哀也豈可與凡夫同日而語哉針曰聖賢悲極咸致斯哀辭章奮切含吐無涯淳醨道喪其誰不懷凡愚自若傷己焉哉樂針并序樂莫樂於道道為天下之極樂捨道而求樂是猶棄食而求飽也世之昧者縱聲色之欲而為樂一報忽盡變化萬殊不知與苦循環豈其所謂樂哉針曰三界無樂動遭業縛達人大觀目之倒錯寂滅真常非修非作當處現成地平天廓雲居菴銘并序天地之氣凝而為雲動則彌布十虛靜則卷歸無所物其似之三界如雲也萬法如雲也卷舒不定開合無時推而窮之則道人之心亦如雲也道人所居亦如雲也無意而行隨處而寓曾何有為於世哉乘月二禪素服杜多行鑿巖闢址縛屋於七寶山之隂扁曰雲居乃有得於理也乞銘於幻住道人乃屬其銘曰八荒一雲天地一廬寥寥四壁孰與同居以雲之舒彌綸十虛以雲之卷𭣣入無餘道人住處豈同舒卷窗牖不扄戶庭深遠清風徘徊明月繾綣雲間僧間水流石轉萬法不到柴關自掩懶禪室銘并序余嘗譏世之尚懶者謂處俗必盡其義入真當盡其道盡義則務四民之役盡道乃營六度之勤聖賢不能免也苟尚懶則二途俱失豈道人之所用心哉或者謂禪者之學乃懶之尤者也何則其忘形骸於休歇之地滅情妄於空寂之門泯見聞於解脫之淵絶去來於不動之域𭣣視而色不惑其目返聽而聲不亂其耳忘緣而境不入其心息慮而事不遷其念則其混世之跡飄然若行空之雲廓爾如流澗之月得非懶之尤者乎余曰據爾之言似非懶者之能事徒見其四體不勤宴休閒逸政恐勤勞於事者莫之能及也南屏書記恭行已需余以懶禪室銘因以或者之言告之恭曰非也世有不為者有無為者不為之者雖強使其為而不肯為也無為之者雖欲為之而無所為也二者皆似懶而非懶也吾之懶禪異於是非不為也非無為也不涉名言則不得為懶矣欲知吾懶之至要雖成佛亦有所不願又何禪之願哉余乃為之銘曰吾之懶即禪兮聖眼莫窺吾之懶非禪兮凡心那知雪嶺之六載高臥兮徒自勞疲少室之九年壁觀兮妄自驅馳濟北之金剛王兮亂鳴熱碗德嶠之木上座兮何異蒿枝總不入此行戶兮自遊自嬉三界無事兮萬法何羈既非不為兮尤非無為毗婆尸佛早留心兮罔逃達者之譏習懶成癖兮舉世莫醫千七百人之豪唱絶呌兮徒自針錐我懶我禪兮如師子獨行不求伴侶從教門外打之繞者吁嗟其已而已而鐵圍室銘并序衆生結業濃厚所陷之地皆鐵圍也毗嵐鼓扇而莫拔劫燒洞熾而不融佛手雖能揭五百力士所不能動之石望鐵圍亦未嘗不斂袵而退堅乎確哉所以稱鐵圍也聞禪者有纖毫未透如隔鐵圍何言之甚耶曰不甚也特取其堅確不可破而喻之耳使盡言禪學之密旨鐵圍可碎而此旨不可穿鑿也何則當其未有所入也以迷為鐵圍及其既入也以證為鐵圍既忘證入之境以悟為鐵圍及其與悟俱遣而存有所了以了為鐵圍了無可了不住了知知了俱捐鐵圍宛爾蓋心法之粘綴有不可取喻而辨者德山所謂毫釐繫念三塗業因瞥爾情生萬劫羈鎖此說乃鐵圍之遮詮也今之學者純沉識網深墮情窠愛憎之羣習儼存生佛之二見猶在強加排遣動涉功勳自言混入靈源豈解全該識量於斯諦審又奚止鐵圍而已哉泉南順藏主以禪宴之所扁曰鐵圍乃有警於自他也乞銘於幻住道者乃引前說以序之復為銘曰天地爐冶太虛模範鑄迷妄鐵火無明炭危乎高哉遠絶畔岸百匝千重凛不可犯四聖六凡生沉活陷禪盡覺空未離羈絆無事無為是金鎖難脫略丈夫莫容易看來讀此銘墮三尺暗西來井泉銘并序少林初祖遠逾數萬里而西來直指人人本具之道道若泉之在地無處不遍也大同菴既成庖人乏水而汲諸鄰彛菴居士念其勞乃命工師鑿井于門之東其深四十尺有泉隱隱自西而至甃成禪者引綆汲之首以一甌奉佛清甘香冽名其泉曰西來蓋不亂其所至之方也當泉之未至也視之窅然凛凛將壓人為鑿井者危之鑿者不惟無所畏而益加鋭焉若與泉約而必其所遇人之求道能積日纍歲猶鑿井之深入無畏其不與道會者吾不信也禪者請銘銘曰泉之在地道之在人配之大同鑿土深入勇鋭無怯克成至功四十尺下有泉西來泄泄溶溶其體既重其氣益冽且盈且豐以沃吾渴以浣吾頰所須悉充少林直指趙州庭柏如空合空泉依幻涌幻復銘泉非始非終咨爾諸禪西來一滴萬派同宗勿汙勿壅朝探暮汲如保厥躬惟菴與泉若內外護永播玄風音釋砒昔兮切毒藥名觜即委切繾綣繾詰戰切綣區願切繾綣不分離貌癖四亦切瘕癖也
